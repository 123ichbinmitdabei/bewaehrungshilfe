<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Bewährungshilfe-Assistent</title>
<!-- iOS Web App support: when added to home screen, runs as fullscreen app -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="BH-Assistent" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#2E5984" />
<!-- Touch icon (180x180 inline SVG as data-URL) -->
<link rel="apple-touch-icon" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180"><rect width="180" height="180" fill="%232E5984"/><text x="90" y="120" font-size="100" text-anchor="middle" fill="white" font-family="Arial">📁</text></svg>' />
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="%232E5984"/><text x="32" y="46" font-size="36" text-anchor="middle" fill="white" font-family="Arial">📁</text></svg>' />
<!-- Inline web app manifest (works as data URI for local-file usage) -->
<link rel="manifest" href='data:application/manifest+json,{"name":"Bewährungshilfe-Assistent","short_name":"BH-Assistent","start_url":".","display":"standalone","background_color":"%23f7f8fb","theme_color":"%232E5984","orientation":"portrait"}' />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f8fb;
    --card: #ffffff;
    --primary: #2E5984;
    --primary-soft: #e6eef7;
    --primary-light: #4a78b3;
    --accent: #5BA572;
    --skip: #9ca3af;
    --skip-bg: #f3f4f6;
    --text: #1f2937;
    --text-soft: #6b7280;
    --border: #e5e7eb;
    --warn: #d97706;
    --danger: #dc2626;
    --input-bg: #ffffff;
  }
  [data-theme="dark"] {
    --bg: #0f172a;
    --card: #1e293b;
    --primary: #60a5fa;
    --primary-soft: #1e3a5f;
    --primary-light: #93c5fd;
    --accent: #6ee7b7;
    --skip: #64748b;
    --skip-bg: #334155;
    --text: #f1f5f9;
    --text-soft: #94a3b8;
    --border: #334155;
    --warn: #fbbf24;
    --danger: #f87171;
    --input-bg: #0f172a;
  }
  [data-theme="dark"] .field input,
  [data-theme="dark"] .field textarea,
  [data-theme="dark"] .field select,
  [data-theme="dark"] .row-grid .field-mini input {
    background: var(--input-bg);
    color: var(--text);
  }
  [data-theme="dark"] .row-card { background: #0f172a; }
  [data-theme="dark"] .summary-card { background: linear-gradient(135deg, #1e3a5f, #1a2e4a); }
  [data-theme="dark"] .reset-btn { color: var(--danger); }
  /* Dark Mode: btn-secondary darker so text bleibt lesbar */
  [data-theme="dark"] .btn-secondary {
    background: #334155;
    color: var(--text);
    border-color: #475569;
  }
  [data-theme="dark"] .btn-secondary:hover {
    background: #475569;
    border-color: #64748b;
  }
  [data-theme="dark"] .btn-secondary:disabled {
    background: #1e293b;
    color: var(--text-soft);
  }
  /* Dark Mode: skip-btn darker, sonst weiß auf dunkel */
  [data-theme="dark"] .skip-btn {
    background: #334155;
    color: var(--text-soft);
    border-color: #475569;
  }
  [data-theme="dark"] .skip-btn:hover {
    background: #475569;
    color: var(--text);
  }
  /* Dark Mode: print-toolbar buttons */
  [data-theme="dark"] .print-toolbar button {
    background: #334155;
    color: var(--primary-light);
  }
  /* Print view stays light always for consistent printing */
  [data-theme="dark"] .print-view { background: white; color: black; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    /* iOS safe-area support for fullscreen PWA mode */
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    -webkit-text-size-adjust: 100%;
  }
  /* Prevent zoom on input focus on iOS */
  input, textarea, select { font-size: 16px !important; }
  input.text-field, .field input, .field textarea, .row-grid .field-mini input,
  .modal-field input { font-size: 16px; }
  .app { max-width: 1100px; margin: 0 auto; padding: 16px; }
  .header {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px 22px; margin-bottom: 16px;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px;
  }
  .header h1 { font-size: 20px; color: var(--primary); }
  .header .sub { color: var(--text-soft); font-size: 13px; margin-top: 2px; }
  .btn {
    border: none; border-radius: 10px; padding: 10px 18px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all .15s; font-family: inherit;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-light); }
  .btn-secondary { background: white; color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--bg); }
  .btn-success { background: var(--accent); color: white; }
  .btn-success:hover { background: #4d8b5e; }
  .btn-large { padding: 14px 28px; font-size: 16px; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .progress-bar {
    height: 6px; background: var(--border); border-radius: 999px;
    overflow: hidden; margin-top: 12px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--primary-light));
    transition: width .3s ease;
  }
  /* HOME / DOC PICKER */
  .home-hero {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 32px 28px; margin-bottom: 20px; text-align: center;
  }
  .home-hero h1 { font-size: 28px; color: var(--primary); margin-bottom: 8px; }
  .home-hero p { color: var(--text-soft); max-width: 600px; margin: 0 auto; }
  .doc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
  .doc-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 22px; cursor: pointer; transition: all .2s;
    display: flex; flex-direction: column;
  }
  .doc-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(46, 89, 132, 0.12);
    border-color: var(--primary-light);
  }
  .doc-card .icon { font-size: 32px; margin-bottom: 12px; }
  .doc-card h3 { font-size: 17px; color: var(--primary); margin-bottom: 6px; }
  .doc-card .desc { color: var(--text-soft); font-size: 13px; flex-grow: 1; margin-bottom: 14px; }
  .doc-card .progress-info {
    font-size: 12px; color: var(--text-soft);
    display: flex; align-items: center; gap: 6px;
  }
  .doc-card .progress-info.started { color: var(--accent); font-weight: 600; }
  /* WIZARD */
  .layout { display: grid; grid-template-columns: 280px 1fr; gap: 16px; }
  @media (max-width: 820px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { order: 2; }
  }
  .sidebar {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 12px; height: fit-content; position: sticky; top: 16px;
  }
  .sidebar h3 {
    font-size: 11px; text-transform: uppercase; letter-spacing: .5px;
    color: var(--text-soft); padding: 8px 12px 6px;
  }
  .sidebar ul { list-style: none; }
  .sidebar li {
    padding: 9px 12px; border-radius: 8px; font-size: 13px;
    cursor: pointer; display: flex; align-items: center; gap: 8px;
    color: var(--text); transition: background .15s;
  }
  .sidebar li:hover { background: var(--primary-soft); }
  .sidebar li.active { background: var(--primary-soft); color: var(--primary); font-weight: 600; }
  .sidebar li .check {
    width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; flex-shrink: 0;
  }
  .sidebar li.done .check { background: var(--accent); border-color: var(--accent); color: white; }
  .sidebar li.partial .check { background: #fbbf24; border-color: #fbbf24; color: white; }
  .main {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 24px;
  }
  .section-head { margin-bottom: 18px; border-bottom: 1px solid var(--border); padding-bottom: 14px; }
  .section-head h2 { font-size: 20px; color: var(--primary); display: flex; align-items: center; gap: 10px; }
  .section-head .meta { color: var(--text-soft); font-size: 13px; margin-top: 4px; }
  .field {
    display: grid; grid-template-columns: 1fr auto; gap: 10px;
    align-items: center; padding: 10px 0;
    border-bottom: 1px dashed var(--border);
  }
  .field:last-child { border-bottom: none; }
  .field label { font-size: 14px; color: var(--text); }
  .field.skipped label { text-decoration: line-through; color: var(--skip); }
  .field-input-wrap { display: flex; gap: 8px; align-items: center; }
  .field input, .field textarea, .field select {
    border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px; font-size: 14px; font-family: inherit;
    width: 180px; transition: border-color .15s; background: white;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft);
  }
  .field input.text-field, .field textarea { width: 320px; }
  .field input.skipped, .field textarea.skipped { background: var(--skip-bg); color: var(--skip); pointer-events: none; }
  .field .currency { font-size: 13px; color: var(--text-soft); width: 22px; text-align: right; }
  .skip-btn {
    border: 1px solid var(--border); background: white; border-radius: 8px;
    padding: 6px 10px; font-size: 11px; color: var(--text-soft);
    cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .skip-btn:hover { background: var(--skip-bg); color: var(--text); }
  .skip-btn.active { background: var(--skip); color: white; border-color: var(--skip); }
  .nav { display: flex; justify-content: space-between; margin-top: 20px; gap: 12px; flex-wrap: wrap; }
  .info-box {
    background: var(--primary-soft); border-left: 3px solid var(--primary);
    border-radius: 6px; padding: 11px 14px; margin: 10px 0; font-size: 13px;
  }
  /* CHECKBOX GROUP */
  .checkbox-group { display: flex; flex-direction: column; gap: 8px; }
  .checkbox-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 12px; border-radius: 8px; cursor: pointer;
    border: 1px solid transparent; transition: all .15s;
  }
  .checkbox-item:hover { background: var(--bg); }
  .checkbox-item.checked { background: var(--primary-soft); border-color: var(--primary-light); }
  .checkbox-item input { margin-top: 3px; cursor: pointer; }
  .checkbox-item span { font-size: 14px; }
  /* DYNAMIC ROWS */
  .rows-section { display: flex; flex-direction: column; gap: 14px; }
  .row-card {
    border: 1px solid var(--border); border-radius: 10px; padding: 14px;
    background: #fafbfc; position: relative;
  }
  .row-card .row-num {
    position: absolute; top: -9px; left: 12px;
    background: var(--primary); color: white; font-size: 11px; font-weight: 700;
    padding: 2px 9px; border-radius: 999px;
  }
  .row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 600px) { .row-grid { grid-template-columns: 1fr; } }
  .row-grid .field-mini { display: flex; flex-direction: column; gap: 4px; }
  .row-grid .field-mini label { font-size: 11px; color: var(--text-soft); text-transform: uppercase; letter-spacing: .3px; }
  .row-grid .field-mini input {
    border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px;
    font-size: 14px; font-family: inherit; width: 100%;
  }
  .row-grid .field-mini input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-soft); }
  /* Wide textarea fields (e.g. notes) span full row width */
  .row-grid .field-mini-wide {
    grid-column: 1 / -1;
    display: flex; flex-direction: column; gap: 4px;
  }
  .row-grid .field-mini-wide label { font-size: 11px; color: var(--text-soft); text-transform: uppercase; letter-spacing: .3px; }
  .row-grid .field-mini-wide textarea {
    border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px;
    font-size: 14px; font-family: inherit; width: 100%;
    background: var(--input-bg); color: var(--text);
    resize: vertical; min-height: 56px;
  }
  .row-grid .field-mini-wide textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-soft); }
  .row-card .row-actions { display: flex; justify-content: flex-end; margin-top: 10px; }
  .row-delete {
    background: none; border: none; color: var(--danger);
    font-size: 12px; cursor: pointer; padding: 4px 8px;
  }
  .row-delete:hover { text-decoration: underline; }
  .add-row-btn {
    background: var(--primary-soft); border: 2px dashed var(--primary-light);
    color: var(--primary); padding: 12px; border-radius: 10px;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s;
  }
  .add-row-btn:hover { background: #d9e6f3; }
  /* SUMMARY (EAR) */
  .summary-card {
    background: linear-gradient(135deg, var(--primary-soft), #f0f4fa);
    border-radius: 12px; padding: 18px; margin: 14px 0;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
  }
  @media (max-width: 600px) { .summary-card { grid-template-columns: 1fr; } }
  .summary-item .label {
    font-size: 11px; text-transform: uppercase; color: var(--text-soft);
    letter-spacing: .5px; margin-bottom: 3px;
  }
  .summary-item .value { font-size: 20px; font-weight: 700; color: var(--primary); }
  .summary-item.saldo .value.positive { color: var(--accent); }
  .summary-item.saldo .value.negative { color: var(--danger); }
  /* SAVE INDICATOR */
  .save-indicator { font-size: 12px; color: var(--text-soft); display: flex; align-items: center; gap: 6px; }
  .save-indicator.saving { color: var(--warn); }
  .save-indicator.saved { color: var(--accent); }
  .save-indicator.error { color: var(--danger); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
  /* REVIEW */
  .review-list { background: var(--bg); border-radius: 8px; padding: 14px; margin: 12px 0; max-height: 400px; overflow-y: auto; }
  .review-list .item { padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 13px; display: flex; justify-content: space-between; gap: 12px; }
  .review-list .item:last-child { border-bottom: none; }
  .review-list .item.skipped { color: var(--skip); text-decoration: line-through; }
  .review-list .item .v { color: var(--primary); font-weight: 600; max-width: 60%; text-align: right; }
  .review-list h4 { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-soft); margin: 12px 0 6px; }
  .review-list h4:first-child { margin-top: 0; }
  .reset-btn { background: none; border: none; color: var(--danger); font-size: 12px; cursor: pointer; padding: 4px 8px; }
  .reset-btn:hover { text-decoration: underline; }
  /* Attachment styles */
  .attachments-area {
    margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border);
  }
  .attachment-list {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px;
  }
  .attachment-item {
    position: relative; border: 1px solid var(--border); border-radius: 8px;
    padding: 6px; background: var(--card); display: flex; flex-direction: column;
    align-items: center; gap: 4px; min-width: 80px; max-width: 110px;
  }
  .attachment-item img {
    width: 80px; height: 80px; object-fit: cover; border-radius: 4px;
    cursor: pointer;
  }
  .attachment-item .pdf-icon {
    width: 80px; height: 80px; display: flex; align-items: center; justify-content: center;
    background: var(--bg); border-radius: 4px; font-size: 32px;
  }
  .attachment-item .name {
    font-size: 10px; color: var(--text-soft);
    max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .attachment-item .size { font-size: 9px; color: var(--text-soft); }
  .attachment-item .delete {
    position: absolute; top: -6px; right: -6px;
    background: var(--danger); color: white; border: none;
    width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  .att-action-btn {
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    padding: 2px 6px; cursor: pointer; font-size: 11px; color: var(--text);
    line-height: 1;
  }
  .att-action-btn:hover { background: var(--primary-soft); color: var(--primary); }
  .attach-upload-btn {
    background: var(--primary-soft); border: 1px dashed var(--primary-light);
    color: var(--primary); padding: 6px 12px; border-radius: 8px;
    font-size: 12px; cursor: pointer; transition: all .15s;
  }
  .attach-upload-btn:hover { background: #d9e6f3; }
  /* Lightbox for viewing attachments */
  .lightbox {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .lightbox img { max-width: 95%; max-height: 90vh; border-radius: 8px; }
  .lightbox iframe { width: 95%; height: 90vh; border: none; background: white; border-radius: 8px; }
  .lightbox-close {
    position: absolute; top: 20px; right: 20px;
    background: white; color: black; border: none;
    width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
    font-size: 22px; display: flex; align-items: center; justify-content: center;
  }
  /* Storage indicator on home */
  .storage-bar {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 16px; margin-top: 12px; font-size: 12px; color: var(--text-soft);
  }
  .storage-bar-fill {
    height: 6px; background: var(--border); border-radius: 999px;
    overflow: hidden; margin-top: 6px;
  }
  .storage-bar-fill > div {
    height: 100%; background: var(--accent); transition: width .3s;
  }
  .storage-bar.warn .storage-bar-fill > div { background: var(--warn); }
  .storage-bar.full .storage-bar-fill > div { background: var(--danger); }
  /* Deadline warning on cards */
  .deadline-info {
    margin-top: 8px; padding: 6px 10px; border-radius: 6px;
    font-size: 12px; display: flex; align-items: center; gap: 6px;
  }
  .deadline-info.ok { background: rgba(91, 165, 114, 0.1); color: var(--accent); }
  .deadline-info.warn { background: rgba(217, 119, 6, 0.1); color: var(--warn); }
  .deadline-info.danger { background: rgba(220, 38, 38, 0.1); color: var(--danger); }
  /* Modal for quick-add */
  .modal-backdrop {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); z-index: 999;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal {
    background: var(--card); border-radius: 14px; padding: 24px;
    max-width: 460px; width: 100%; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal h3 { color: var(--primary); margin-bottom: 14px; }
  .modal-close-btn {
    background: none; border: none; font-size: 22px; cursor: pointer;
    color: var(--text-soft); padding: 4px 8px;
  }
  .modal-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
  .modal-field label { font-size: 12px; color: var(--text-soft); text-transform: uppercase; letter-spacing: .3px; }
  .modal-field input {
    border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
    font-size: 15px; font-family: inherit; background: var(--input-bg); color: var(--text);
  }
  .modal-field input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }

  /* === Signature Pad === */
  .sig-canvas-wrap {
    position: relative; width: 100%; max-width: 600px; margin: 0 auto;
    border: 2px dashed var(--border); border-radius: 10px;
    background: #ffffff; aspect-ratio: 3 / 1; overflow: hidden;
  }
  .sig-canvas-wrap canvas {
    display: block; width: 100%; height: 100%;
    touch-action: none; cursor: crosshair;
  }
  .sig-canvas-line {
    position: absolute; left: 8%; right: 8%; bottom: 18%;
    border-bottom: 1px solid #94a3b8; pointer-events: none;
  }
  .sig-canvas-hint {
    position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%);
    text-align: center; color: #94a3b8; font-size: 14px; pointer-events: none;
    font-style: italic;
  }
  /* Inline display of saved signature in wizard / print */
  .sig-display {
    background: #ffffff; border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px; margin: 8px 0; display: inline-block;
    max-width: 100%;
  }
  .sig-display img {
    background: #ffffff;
  }
  .sig-meta {
    font-size: 11px; color: #475569; margin-top: 4px;
    border-top: 1px solid #e5e7eb; padding-top: 4px;
  }
  .sig-remove-btn {
    margin-top: 6px; font-size: 12px; padding: 4px 10px;
  }
  .sig-add-btn {
    background: var(--primary-soft); color: var(--primary);
    border: 1px dashed var(--primary); padding: 8px 14px;
    border-radius: 8px; cursor: pointer; font-size: 14px;
    font-weight: 600; display: inline-flex; align-items: center; gap: 6px;
  }
  .sig-add-btn:hover { background: var(--primary); color: white; }

// STORAGE WRAPPER (localStorage primary, fallback to window.storage, then memory)
// ============================================
const memStorage = {};
const Storage = {
  hasLocal: (() => {
    try { localStorage.setItem("__t", "1"); localStorage.removeItem("__t"); return true; }
    catch (e) { return false; }
  })(),
  hasClaude: typeof window !== "undefined" && !!window.storage,

  async get(key) {
    if (this.hasLocal) { try { return localStorage.getItem(key); } catch(e){} }
    if (this.hasClaude) { try { const r = await window.storage.get(key); return r?.value || null; } catch(e){} }
    return memStorage[key] || null;
  },
  async set(key, val) {
    if (this.hasLocal) { try { localStorage.setItem(key, val); return; } catch(e){} }
    if (this.hasClaude) { try { await window.storage.set(key, val); return; } catch(e){} }
    memStorage[key] = val;
  },
  async del(key) {
    if (this.hasLocal) { try { localStorage.removeItem(key); } catch(e){} }
    if (this.hasClaude) { try { await window.storage.delete(key); } catch(e){} }
    delete memStorage[key];
  }
};

function todayISO() {

  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

// === AUTO-FORMAT HELPERS ===
// Auto-format date input: 15032025 → 15.03.2025, 15-3-25 → 15.03.2025
function autoFormatDate(s) {
  if (!s) return s;
  // Already formatted? Don't touch
  if (/^\d{1,2}\.\d{1,2}\.\d{2,4}$/.test(s) || /^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // Plain digits like 15032025 or 1532025
  let digits = s.replace(/\D/g, "");
  if (digits.length === 8) return `${digits.slice(0,2)}.${digits.slice(2,4)}.${digits.slice(4)}`;
  if (digits.length === 6) return `${digits.slice(0,2)}.${digits.slice(2,4)}.20${digits.slice(4)}`;
  return s;
}
// Auto-format time: 0900 → 09:00, 9 → 09:00 (only if reasonable)
function autoFormatTime(s) {
  if (!s) return s;
  if (/^\d{1,2}:\d{2}$/.test(s)) return s;
  let digits = s.replace(/\D/g, "");
  if (digits.length === 4) return `${digits.slice(0,2)}:${digits.slice(2)}`;
  if (digits.length === 3) return `0${digits.slice(0,1)}:${digits.slice(1)}`;
  return s;
}
// Compute net hours from von/bis/pause
function computeNetHours(von, bis, pauseMin) {
  if (!von || !bis) return null;
  const vm = von.match(/^(\d{1,2}):(\d{2})$/);
  const bm = bis.match(/^(\d{1,2}):(\d{2})$/);
  if (!vm || !bm) return null;
  const start = parseInt(vm[1]) * 60 + parseInt(vm[2]);
  const end = parseInt(bm[1]) * 60 + parseInt(bm[2]);
  if (end <= start) return null;
  const pause = parseInt(pauseMin || "0", 10) || 0;
  const netMin = end - start - pause;
  if (netMin <= 0) return null;
  // Format as decimal hours German-style
  const h = netMin / 60;
  return h.toLocaleString("de-DE", { minimumFractionDigits: h % 1 === 0 ? 0 : 1, maximumFractionDigits: 2 });
}

// === iOS INSTALL DETECTION ===
// === PLATFORM DETECTION ===
function getPlatformInfo() {
  if (typeof navigator === "undefined") return { os: "unknown", browser: "unknown", canInstall: false };
  const ua = navigator.userAgent || "";
  const platform = navigator.platform || "";

  // OS Detection
  let os = "unknown";
  if (/iPad/.test(ua) || (platform === "MacIntel" && navigator.maxTouchPoints > 1)) os = "ipados";
  else if (/iPhone|iPod/.test(ua)) os = "ios";
  else if (/Android/.test(ua)) os = "android";
  else if (/CrOS/.test(ua)) os = "chromeos";
  else if (/Win/.test(platform) || /Windows/.test(ua)) os = "windows";
  else if (/Mac/.test(platform)) os = "macos";
  else if (/Linux|X11/.test(platform) || /Linux/.test(ua)) os = "linux";

  // Browser Detection (order matters - some browsers spoof others)
  let browser = "unknown";
  if (/Edg\//.test(ua)) browser = "edge";
  else if (/SamsungBrowser/.test(ua)) browser = "samsung";
  else if (/OPR\/|Opera/.test(ua)) browser = "opera";
  else if (/Firefox\//.test(ua) || /FxiOS/.test(ua)) browser = "firefox";
  else if (/CriOS/.test(ua)) browser = "chrome"; // Chrome on iOS
  else if (/Chrome\//.test(ua)) browser = "chrome";
  else if (/Safari\//.test(ua) && !/Chrome|CriOS|FxiOS|EdgiOS/.test(ua)) browser = "safari";

  // Standalone (already installed as PWA)
  const standalone = (typeof window !== "undefined" &&
    ((window.navigator && window.navigator.standalone === true) ||
     (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches)));

  // Can the browser install as PWA?
  // iOS Safari: yes (manual via share sheet)
  // Android Chrome/Edge/Samsung: yes
  // Desktop Chrome/Edge: yes
  // Desktop Safari/Firefox: limited (Safari macOS 14+ supports it, Firefox no)
  let canInstall = false;
  if (os === "ios" || os === "ipados") canInstall = browser === "safari";
  else if (os === "android") canInstall = ["chrome", "samsung", "edge", "opera"].includes(browser);
  else if (os === "windows" || os === "linux" || os === "chromeos") canInstall = ["chrome", "edge", "opera"].includes(browser);
  else if (os === "macos") canInstall = ["chrome", "edge", "safari"].includes(browser);

  return { os, browser, canInstall, standalone };
}

function isIosSafari() {
  const p = getPlatformInfo();
  return (p.os === "ios" || p.os === "ipados") && p.browser === "safari";

  const p = getPlatformInfo();
  return p.os === "android" && ["chrome", "samsung", "edge"].includes(p.browser);
}

}

// === PIN-LOCK ===
// Simple hash for PIN - not crypto secure, just to deter casual peeks
function hashPin(pin) {
  let h = 0;
  for (let i = 0; i < pin.length; i++) {
    h = ((h << 5) - h) + pin.charCodeAt(i);
    h |= 0;
  }
  // Add a salt to make it slightly less obvious
  return "bh_" + (h ^ 0xdeadbeef).toString(36);
}
async function setPin(pin) {
  if (!pin || pin.length < 4) {
    alert("PIN muss mindestens 4 Stellen haben.");
    return false;
  }
  await Storage.set(PIN_STORAGE_KEY, hashPin(pin));
  return true;
}
async function checkPin(pin) {
  const stored = await Storage.get(PIN_STORAGE_KEY);
  return stored && stored === hashPin(pin);
}
async function removePin() {
  await Storage.del(PIN_STORAGE_KEY);
  await Storage.del(PIN_RECOVERY_KEY);
}
// Recovery question/answer storage
async function setPinRecovery(question, answer) {
  if (!question || !answer) return false;
  // Normalize answer: lowercase, trim, no spaces
  const normalized = answer.toLowerCase().trim().replace(/\s+/g, "");
  await Storage.set(PIN_RECOVERY_KEY, JSON.stringify({
    question: question,
    answerHash: hashPin(normalized)
  }));
  return true;
}
async function getPinRecoveryQuestion() {
  const raw = await Storage.get(PIN_RECOVERY_KEY);
  if (!raw) return null;
  try {
    const data = JSON.parse(raw);
    return data.question || null;
  } catch(e) { return null; }
}
async function checkPinRecovery(answer) {
  const raw = await Storage.get(PIN_RECOVERY_KEY);
  if (!raw) return false;
  try {
    const data = JSON.parse(raw);
    const normalized = (answer || "").toLowerCase().trim().replace(/\s+/g, "");
    return data.answerHash === hashPin(normalized);
  } catch(e) { return false; }
}
let pinSetupMode = false;
let pinSetupStep = 1; // 1: enter PIN, 2: confirm PIN, 3: enter recovery Q, 4: enter recovery A
let pinSetupTemp = "";
let pinSetupRecoveryQ = "";
let pinRecoveryMode = false; // true when user clicked "PIN vergessen?"

function startPinSetup() {
  pinSetupMode = true;
  pinSetupStep = 1;
  pinSetupTemp = "";
  pinSetupRecoveryQ = "";
  state.pinLocked = true;
  render();
}
async function disablePin() {
  if (!confirm("PIN-Schutz wirklich entfernen?")) return;
  await removePin();
  state.pinLocked = false;
  showSaveToast("PIN-Schutz deaktiviert");
  render();
}
function startPinRecovery() {
  pinRecoveryMode = true;
  render();
}
function cancelPinRecovery() {
  pinRecoveryMode = false;
  render();
}
async function submitPin() {
  const inp = document.getElementById("pin-input");
  if (!inp) return;
  const val = inp.value.trim();

  if (pinRecoveryMode) {
    // Check recovery answer
    const ok = await checkPinRecovery(val);
    if (!ok) {
      inp.classList.add("error");
      setTimeout(() => inp.classList.remove("error"), 400);
      inp.value = "";
      return;
    }
    // Recovery successful - let user set new PIN
    pinRecoveryMode = false;
    pinSetupMode = true;
    pinSetupStep = 1;
    pinSetupTemp = "";
    showSaveToast("Antwort korrekt - bitte neue PIN setzen");
    render();
    return;
  }

  if (pinSetupMode) {
    if (pinSetupStep === 1) {
      if (val.length < 4) {
        inp.classList.add("error");
        setTimeout(() => inp.classList.remove("error"), 400);
        return;
      }
      pinSetupTemp = val;
      pinSetupStep = 2;
      inp.value = "";
      render();
    } else if (pinSetupStep === 2) {
      if (val !== pinSetupTemp) {
        inp.classList.add("error");
        setTimeout(() => inp.classList.remove("error"), 400);
        inp.value = "";
        pinSetupStep = 1;
        pinSetupTemp = "";
        render();
        return;
      }
      // PIN matches - save it
      await setPin(val);
      // Now move to recovery question step
      pinSetupStep = 3;
      pinSetupTemp = val;
      inp.value = "";
      render();
    } else if (pinSetupStep === 3) {
      // val is the recovery question text
      if (val.length < 5) {
        inp.classList.add("error");
        setTimeout(() => inp.classList.remove("error"), 400);
        return;
      }
      pinSetupRecoveryQ = val;
      pinSetupStep = 4;
      inp.value = "";
      render();
    } else if (pinSetupStep === 4) {
      // val is the recovery answer
      if (val.length < 2) {
        inp.classList.add("error");
        setTimeout(() => inp.classList.remove("error"), 400);
        return;
      }
      await setPinRecovery(pinSetupRecoveryQ, val);
      pinSetupMode = false;
      pinSetupStep = 1;
      pinSetupTemp = "";
      pinSetupRecoveryQ = "";
      state.pinLocked = false;
      showSaveToast("PIN und Wiederherstellungs-Frage gesetzt");
      render();
    }
  } else {
    // Normal unlock
    const ok = await checkPin(val);
    if (!ok) {
      inp.classList.add("error");
      setTimeout(() => inp.classList.remove("error"), 400);
      inp.value = "";
      return;
    }
    state.pinLocked = false;
    render();
  }
}

// === CALENDAR EXPORT (.ics) ===
function pad(n) { return String(n).padStart(2, "0"); }
function toIcsDate(date, hour, minute) {
  const yyyy = date.getFullYear();
  const mm = pad(date.getMonth() + 1);
  const dd = pad(date.getDate());
  const h = hour !== undefined ? pad(hour) : "12";
  const m = minute !== undefined ? pad(minute) : "00";
  return `${yyyy}${mm}${dd}T${h}${m}00`;
}
function escapeIcs(s) {
  return String(s || "").replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\n/g, "\\n");
}
function downloadIcs(filename, content) {
  const blob = new Blob([content], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showSaveToast("Kalender-Datei erstellt");
}
function exportNextBhTerminToCalendar() {
  const datum = state.docs.bhtermine?.answers?.["naechster.datum"];
  const uhrzeit = state.docs.bhtermine?.answers?.["naechster.uhrzeit"] || "10:00";
  const ort = state.docs.bhtermine?.answers?.["naechster.ort"] || "";
  const vorbereitung = state.docs.bhtermine?.answers?.["naechster.vorbereitung"] || "";
  if (!datum) { alert("Kein nächster Termin eingetragen."); return; }
  const date = parseDateGuess(datum);
  if (!date) { alert("Datumsformat nicht erkannt."); return; }
  const tm = uhrzeit.match(/^(\d{1,2}):(\d{2})$/);
  const h = tm ? parseInt(tm[1]) : 10;
  const m = tm ? parseInt(tm[2]) : 0;
  const endH = h + 1, endM = m;
  const uid = "bh-termin-" + date.getTime() + "@bewaehrungshilfe-app";
  const dtstamp = toIcsDate(new Date());
  const dtstart = toIcsDate(date, h, m);
  const dtend = toIcsDate(date, endH, endM);
  const bh = state.shared.bewaehrungshelfer || "Bewährungshelfer/in";
  const summary = `Termin bei ${bh}`;
  const description = vorbereitung ? `Was besprechen:\n${vorbereitung}` : "";
  const ics = [
    "BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Bewährungshilfe-Assistent//DE",
    "CALSCALE:GREGORIAN", "METHOD:PUBLISH",
    "BEGIN:VEVENT",
    `UID:${uid}`,
    `DTSTAMP:${dtstamp}`,
    `DTSTART:${dtstart}`,
    `DTEND:${dtend}`,
    `SUMMARY:${escapeIcs(summary)}`,
    description ? `DESCRIPTION:${escapeIcs(description)}` : "",
    ort ? `LOCATION:${escapeIcs(ort)}` : "",
    "BEGIN:VALARM",
    "ACTION:DISPLAY",
    `DESCRIPTION:${escapeIcs(summary)}`,
    "TRIGGER:-PT1H",
    "END:VALARM",
    "BEGIN:VALARM",
    "ACTION:DISPLAY",
    `DESCRIPTION:${escapeIcs(summary)}`,
    "TRIGGER:-P1D",
    "END:VALARM",
    "END:VEVENT", "END:VCALENDAR"
  ].filter(l => l).join("\r\n");
  downloadIcs(`BH-Termin_${pad(date.getDate())}.${pad(date.getMonth()+1)}.${date.getFullYear()}.ics`, ics);
}

// Lazy-load JSZip from CDN, only when bundling is requested
let jszipLoading = null;
function loadJSZipLib() {
  if (window.JSZip) return Promise.resolve();
  if (jszipLoading) return jszipLoading;
  jszipLoading = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
    s.onload = () => resolve();
    s.onerror = () => reject(new Error("Konnte ZIP-Bibliothek nicht laden. Bitte Internetverbindung prüfen."));
    document.head.appendChild(s);
  });
  return jszipLoading;
}

// Collect all attachments for a doc as Blobs with structured filenames
async function collectDocAttachments(docId) {
  const ds = state.docs[docId];
  const result = []; // { folder, filename, blob }
  if (!ds || !ds.attachments) return result;
  const doc = DOCS[docId];
  for (const secId of Object.keys(ds.attachments)) {
    const sec = doc.sections.find(s => s.id === secId);
    const secLabel = sec ? sec.title : secId;
    const map = ds.attachments[secId];
    for (const rowIdxStr of Object.keys(map)) {
      const rowIdx = parseInt(rowIdxStr);
      const atts = map[rowIdxStr] || [];
      const row = (ds.rows && ds.rows[secId] && ds.rows[secId][rowIdx]) || {};
      // Build a row label - try common id labels
      const rowParts = [];
      if (row.datum) rowParts.push(row.datum);
      if (row.bezeichnung) rowParts.push(row.bezeichnung.substring(0, 30));
      if (row.art) rowParts.push(row.art);
      if (row.betrag) rowParts.push(row.betrag + "EUR");
      const rowLabel = rowParts.length > 0 ? rowParts.join("_") : `Zeile-${rowIdx + 1}`;
      const safeRowLabel = rowLabel.replace(/[^a-zA-Z0-9äöüÄÖÜß_-]/g, "_").substring(0, 60);
      for (let i = 0; i < atts.length; i++) {
        const att = atts[i];
        try {
          const resp = await fetch(att.dataUrl);
          const blob = await resp.blob();
          const ext = att.name.includes(".") ? att.name.split(".").pop() : (att.type === "pdf" ? "pdf" : "jpg");
          const filename = `${String(i + 1).padStart(2, "0")}_${safeRowLabel}.${ext}`;
          result.push({
            folder: secLabel.replace(/[^a-zA-Z0-9äöüÄÖÜß_-]/g, "_"),
            filename: filename,
            blob: blob,
            originalName: att.name,
          });
        } catch (e) {
          console.error("Fehler beim Lesen von Beleg:", att.name, e);
        }
      }
    }
  }
  return result;
}

// Build the docx for a doc (returns blob), or null if not supported
async function buildDocBlob(docId) {
  await loadDocxLib();
  if (docId === "ear") return await buildEarDocx();
  if (docId === "zeit") return await buildZeitDocx();
  if (docId === "thera") return await buildTheraDocx();
  if (docId === "schadens") return await buildSchadensDocx();
  if (docId === "sozial") return await buildSozialDocx();
  return null; // kosten, asservate, bhtermine, uebersicht: no docx, only print
}

// Build a ZIP containing the doc + all attachments
async function buildDocBundleZip(docId) {
  await loadJSZipLib();
  const doc = DOCS[docId];
  const userName = (state.shared.name || "").replace(/[^a-zA-Z0-9äöüÄÖÜß_-]/g, "_");
  const docTitle = doc.title.replace(/[^a-zA-Z0-9äöüÄÖÜß_-]/g, "_");
  const baseName = userName ? `${docTitle}_${userName}` : docTitle;

  const zip = new JSZip();

  // 1) Docx of main document (if available)
  const docBlob = await buildDocBlob(docId);
  if (docBlob) {
    zip.file(`${baseName}.docx`, docBlob);
  } else {
    // For docs without docx (kosten, asservate): include a Readme as text
    const note = `Hauptdokument "${doc.title}"\n\nFür dieses Dokument gibt es keinen Word-Export. Bitte nutze die Druck-Funktion in der App und speichere das Ergebnis als PDF, dann lege es in diesen Ordner.`;
    zip.file(`${baseName}_HINWEIS.txt`, note);
  }

  // 2) Attachments
  const atts = await collectDocAttachments(docId);
  if (atts.length > 0) {
    const folder = zip.folder("Belege");
    // Group by section
    const folderMap = {};
    atts.forEach(a => {
      if (!folderMap[a.folder]) folderMap[a.folder] = folder.folder(a.folder);
      folderMap[a.folder].file(a.filename, a.blob);
    });
    // Add an index file
    let index = `Belege-Übersicht für: ${doc.title}\n`;
    if (state.shared.name) index += `Name: ${state.shared.name}\n`;
    if (state.shared.aktenzeichen) index += `Aktenzeichen: ${state.shared.aktenzeichen}\n`;
    index += `Erstellt: ${todayDE()}\n\n`;
    index += `Anzahl Belege: ${atts.length}\n\n`;
    index += atts.map((a, i) => `${i + 1}. ${a.folder}/${a.filename}  (Original: ${a.originalName})`).join("\n");
    folder.file("00_Inhaltsverzeichnis.txt", index);
  }

  return await zip.generateAsync({ type: "blob" });
}

// Download the ZIP bundle for a document
// === DIGITAL SIGNATURE SYSTEM ===
// Captures signatures via canvas (touch / mouse / stylus) and saves as base64 PNG with timestamp.
// NOT a qualified electronic signature (eIDAS) - but has evidentiary value for everyday confirmations
// like volunteer hours, therapy attendance, payment receipts. Same legal status as DHL parcel-tablet signatures.

const SIG_CANVAS_W = 600;
const SIG_CANVAS_H = 200;

function openSignaturePad(opts) {
  // opts: { title, subtitle, onSave: (dataUrl, timestamp, signerName) => void, askName: bool, defaultName: string }
  const existing = document.getElementById("sig-modal");
  if (existing) existing.remove();

  const modal = document.createElement("div");
  modal.id = "sig-modal";
  modal.className = "modal-backdrop";
  modal.innerHTML = `
    <div class="modal sig-modal-card" style="max-width:680px;" onclick="event.stopPropagation()">
      <h3 style="margin:0 0 6px;">${esc(opts.title || "Digitale Unterschrift")}</h3>
      <p style="margin:0 0 14px; font-size:14px; color:var(--text-soft);">${esc(opts.subtitle || "Unterschreibe mit Finger, Maus oder Stylus im Feld unten.")}</p>
      ${opts.askName ? `
        <label style="display:block; margin-bottom:10px;">
          <span style="font-size:13px; font-weight:600; color:var(--text);">Name der unterschreibenden Person</span>
          <input type="text" id="sig-name-input" value="${esc(opts.defaultName || "")}" placeholder="z.B. Dr. Müller, Caritas Marburg, Max Mustermann" style="width:100%; margin-top:4px; padding:8px 10px; border:1px solid var(--border); border-radius:8px; font-size:15px; box-sizing:border-box; background:var(--input-bg); color:var(--text);">
        </label>` : ""}
      <div class="sig-canvas-wrap">
        <canvas id="sig-canvas" width="${SIG_CANVAS_W}" height="${SIG_CANVAS_H}"></canvas>
        <div class="sig-canvas-line"></div>
        <div class="sig-canvas-hint">Hier unterschreiben</div>
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:14px;">
        <button onclick="clearSignaturePad()" class="btn-secondary" style="flex:1; min-width:120px;">🗑 Löschen</button>
        <button onclick="cancelSignaturePad()" class="btn-secondary" style="flex:1; min-width:120px;">Abbrechen</button>
        <button onclick="saveSignaturePad()" id="sig-save-btn" style="flex:2; min-width:140px;">✓ Übernehmen</button>
      </div>
      <p style="margin:14px 0 0; font-size:12px; color:var(--text-soft);">💡 Tipp: Auf Tablet/Smartphone mit dem Finger oder Stylus unterschreiben - das funktioniert genauso wie bei einem DHL-Paketboten.</p>
    </div>`;
  modal.onclick = (e) => { if (e.target === modal) cancelSignaturePad(); };
  document.body.appendChild(modal);
  setupSignatureCanvas();
  // Stash callback in module-level state
  window._sigCallback = opts.onSave;
  window._sigAskName = !!opts.askName;
}

function setupSignatureCanvas() {
  const canvas = document.getElementById("sig-canvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  // High-DPI support
  const dpr = window.devicePixelRatio || 1;
  if (dpr > 1) {
    canvas.width = SIG_CANVAS_W * dpr;
    canvas.height = SIG_CANVAS_H * dpr;
    canvas.style.width = SIG_CANVAS_W + "px";
    canvas.style.height = SIG_CANVAS_H + "px";
    ctx.scale(dpr, dpr);
  }
  ctx.lineWidth = 2.2;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = "#1e293b";

  let drawing = false;
  let hasInk = false;
  let lastX = 0, lastY = 0;

  function getXY(e) {
    const rect = canvas.getBoundingClientRect();
    let cx, cy;
    if (e.touches && e.touches[0]) {
      cx = e.touches[0].clientX; cy = e.touches[0].clientY;
    } else {
      cx = e.clientX; cy = e.clientY;
    }
    return { x: cx - rect.left, y: cy - rect.top };
  }

  function start(e) {
    e.preventDefault();
    drawing = true;
    const p = getXY(e);
    lastX = p.x; lastY = p.y;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    // Hide hint on first stroke
    if (!hasInk) {
      hasInk = true;
      const hint = document.querySelector(".sig-canvas-hint");
      if (hint) hint.style.display = "none";
    }
  }
  function move(e) {
    if (!drawing) return;
    e.preventDefault();
    const p = getXY(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    lastX = p.x; lastY = p.y;
  }
  function end(e) {
    if (!drawing) return;
    e.preventDefault();
    drawing = false;
  }

  // Mouse
  canvas.addEventListener("mousedown", start);
  canvas.addEventListener("mousemove", move);
  canvas.addEventListener("mouseup", end);
  canvas.addEventListener("mouseleave", end);
  // Touch
  canvas.addEventListener("touchstart", start, { passive: false });
  canvas.addEventListener("touchmove", move, { passive: false });
  canvas.addEventListener("touchend", end, { passive: false });
  canvas.addEventListener("touchcancel", end, { passive: false });

  window._sigHasInk = () => hasInk;
}

function clearSignaturePad() {
  const canvas = document.getElementById("sig-canvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const hint = document.querySelector(".sig-canvas-hint");
  if (hint) hint.style.display = "";
  window._sigHasInk = () => false;
}

function cancelSignaturePad() {
  const m = document.getElementById("sig-modal");
  if (m) m.remove();
  window._sigCallback = null;
}

function saveSignaturePad() {
  const canvas = document.getElementById("sig-canvas");
  if (!canvas) return;
  if (!window._sigHasInk || !window._sigHasInk()) {
    alert("Bitte zuerst unterschreiben.");
    return;
  }
  let signerName = "";
  if (window._sigAskName) {
    const inp = document.getElementById("sig-name-input");
    signerName = inp ? inp.value.trim() : "";
    if (!signerName) {
      alert("Bitte den Namen der unterschreibenden Person eintragen.");
      if (inp) inp.focus();
      return;
    }
  }
  // Compress: render to smaller JPEG (saves ~70% vs PNG, no visible quality loss)
  // Target: 400x133px (3:1 ratio matches canvas), JPEG quality 0.8
  const TARGET_W = 400;
  const TARGET_H = 133;
  const tmp = document.createElement("canvas");
  tmp.width = TARGET_W;
  tmp.height = TARGET_H;
  const tctx = tmp.getContext("2d");
  tctx.fillStyle = "#ffffff";
  tctx.fillRect(0, 0, TARGET_W, TARGET_H);
  tctx.imageSmoothingEnabled = true;
  tctx.imageSmoothingQuality = "high";
  tctx.drawImage(canvas, 0, 0, TARGET_W, TARGET_H);
  const dataUrl = tmp.toDataURL("image/jpeg", 0.8);
  const timestamp = new Date().toISOString();
  // Gather a lightweight device fingerprint to strengthen evidentiary value
  const device = collectDeviceFingerprint();
  const cb = window._sigCallback;
  cancelSignaturePad();
  if (typeof cb === "function") cb(dataUrl, timestamp, signerName, device);
}

// Collect a lightweight device fingerprint for stronger signature evidence
// Note: We deliberately avoid invasive fingerprinting. Just enough info to
// distinguish "signed on the user's iPad in their kitchen" from "signed on a different device".
function collectDeviceFingerprint() {
  try {
    const ua = (navigator.userAgent || "").substring(0, 120);
    const lang = navigator.language || "";
    const w = (window.screen && window.screen.width) || 0;
    const h = (window.screen && window.screen.height) || 0;
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "";
    const offset = new Date().getTimezoneOffset();
    return {
      userAgentShort: shortenUA(ua),
      language: lang,
      screen: w + "x" + h,
      timezone: tz,
      tzOffset: offset,
    };
  } catch (e) {
    return null;
  }
}

// Boil down browser UA to a friendly device name like "iPhone Safari", "Windows Chrome"
function shortenUA(ua) {
  if (!ua) return "";
  let device = "";
  if (/iPhone/.test(ua)) device = "iPhone";
  else if (/iPad/.test(ua)) device = "iPad";
  else if (/Android/.test(ua)) device = "Android";
  else if (/Macintosh/.test(ua)) device = "Mac";
  else if (/Windows/.test(ua)) device = "Windows";
  else if (/Linux/.test(ua)) device = "Linux";
  let browser = "";
  if (/Edg\//.test(ua)) browser = "Edge";
  else if (/Chrome\//.test(ua)) browser = "Chrome";
  else if (/Firefox\//.test(ua)) browser = "Firefox";
  else if (/Safari\//.test(ua)) browser = "Safari";
  return [device, browser].filter(Boolean).join(" ") || "Unbekannt";
}

// Format signature timestamp as "28.04.2026, 14:32"
function fmtSigTimestamp(iso) {
  if (!iso) return "";
  try {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return "";
    const dd = String(d.getDate()).padStart(2, "0");
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const yyyy = d.getFullYear();
    const hh = String(d.getHours()).padStart(2, "0");
    const mi = String(d.getMinutes()).padStart(2, "0");
    return `${dd}.${mm}.${yyyy}, ${hh}:${mi} Uhr`;
  } catch (e) { return ""; }
}

// Render a signature inline (in wizard or print)
function renderSignatureBlock(sig, opts) {
  // sig: { dataUrl, timestamp, signerName, device } or null
  // opts: { showRemove: bool, onRemove: string (JS expression), maxHeight: number, showDevice: bool }
  if (!sig || !sig.dataUrl) return "";
  const maxH = opts && opts.maxHeight ? opts.maxHeight : 80;
  const showDevice = !opts || opts.showDevice !== false;
  const deviceStr = (showDevice && sig.device && sig.device.userAgentShort) ? ` · auf ${esc(sig.device.userAgentShort)}` : "";
  return `
    <div class="sig-display">
      <img src="${sig.dataUrl}" alt="Unterschrift" style="max-height:${maxH}px; max-width:100%; display:block;">
      <div class="sig-meta">
        ${sig.signerName ? `<strong>${esc(sig.signerName)}</strong> · ` : ""}Digital unterzeichnet am ${esc(fmtSigTimestamp(sig.timestamp))}${deviceStr}
      </div>
      ${opts && opts.showRemove && opts.onRemove ? `<button class="btn-secondary sig-remove-btn" onclick="${opts.onRemove}">🗑 Unterschrift entfernen</button>` : ""}
    </div>`;
}

// === SIGNATURE STATE HELPERS ===

// Each doc gets a `signatures` map in its state:
//   ds.signatures = {
//     gesamt: { dataUrl, timestamp, signerName },           // Document-level "by signer" (Therapeut, Einrichtung, Geschädigter)
//     gesamt_proband: { dataUrl, timestamp, signerName },   // Document-level "by user" (proband)
//     row_<sectionId>_<rowIdx>: { dataUrl, timestamp, signerName }  // Per-row
//   }

function ensureSignaturesObj(docId) {
  const ds = state.docs[docId];
  if (!ds.signatures) ds.signatures = {};
  return ds.signatures;
}

function getSignature(docId, key) {
  const ds = state.docs[docId];
  if (!ds || !ds.signatures) return null;
  return ds.signatures[key] || null;
}

function setSignature(docId, key, sig) {
  const sigs = ensureSignaturesObj(docId);
  sigs[key] = sig;
  debouncedSave();
}

function removeSignature(docId, key) {
  const ds = state.docs[docId];
  if (!ds || !ds.signatures) return;
  delete ds.signatures[key];
  debouncedSave();
  render();
}

// Open pad for document-level signature (e.g. Therapeut on Therapie doc)
function signDocument(docId, key, opts) {
  // opts: { title, subtitle, askName, defaultName }
  openSignaturePad({
    title: opts.title || "Unterschrift",
    subtitle: opts.subtitle || "",
    askName: opts.askName !== false,
    defaultName: opts.defaultName || "",
    onSave: (dataUrl, timestamp, signerName, device) => {
      setSignature(docId, key, { dataUrl, timestamp, signerName, device });
      render();
    }
  });
}

// Safe dispatcher to avoid quote-escaping issues in inline onclick attributes.
// Stores opts in a global registry, called by short ID-based handlers.
window._sigOpts = {};
function _registerSigOpts(opts) {
  const id = "sig_" + Math.random().toString(36).substring(2, 11);
  window._sigOpts[id] = opts;
  return id;
}
function dispatchSignDoc(optsId) {
  const opts = window._sigOpts[optsId];
  if (!opts) { console.error("Sig opts not found:", optsId); return; }
  signDocument(opts.docId, opts.key, opts);
}
function dispatchSignRow(optsId) {
  const opts = window._sigOpts[optsId];
  if (!opts) { console.error("Sig opts not found:", optsId); return; }
  signRow(opts.docId, opts.sectionId, opts.rowIdx, opts);
}

// Open pad for per-row signature (e.g. each Sozialstunden row)
function signRow(docId, sectionId, rowIdx, opts) {
  const key = `row_${sectionId}_${rowIdx}`;
  openSignaturePad({
    title: opts.title || "Unterschrift für diese Zeile",
    subtitle: opts.subtitle || "",
    askName: true,
    defaultName: opts.defaultName || "",
    onSave: (dataUrl, timestamp, signerName, device) => {
      setSignature(docId, key, { dataUrl, timestamp, signerName, device });
      render();
    }
  });
}

function getRowSignature(docId, sectionId, rowIdx) {
  return getSignature(docId, `row_${sectionId}_${rowIdx}`);
}

function removeRowSignature(docId, sectionId, rowIdx) {
  removeSignature(docId, `row_${sectionId}_${rowIdx}`);
}

async function downloadDocBundle(docId) {
  const btn = event && event.target;
  const origText = btn ? btn.textContent : "";
  if (btn) { btn.disabled = true; btn.textContent = "📦 Erstelle ZIP..."; }
  try {
    const blob = await buildDocBundleZip(docId);
    const doc = DOCS[docId];
    const userName = (state.shared.name || "").replace(/[^a-zA-Z0-9äöüÄÖÜß_-]/g, "_");
    const docTitle = doc.title.replace(/[^a-zA-Z0-9äöüÄÖÜß_-]/g, "_");
    const filename = userName ? `${docTitle}_${userName}.zip` : `${docTitle}.zip`;
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    if (btn) { btn.textContent = "✓ ZIP heruntergeladen"; setTimeout(() => { btn.disabled = false; btn.textContent = origText; }, 2200); }
  } catch (e) {
    console.error(e);
    alert("ZIP-Erstellung fehlgeschlagen: " + (e.message || "Unbekannter Fehler"));
    if (btn) { btn.disabled = false; btn.textContent = origText; }
  }
}

async function shareDocument(docId) {
  const doc = DOCS[docId];
  if (!navigator.share) {
    alert("Teilen wird auf diesem Gerät nicht unterstützt.\n\nNutze stattdessen den Knopf „📦 ZIP mit Belegen“ - die ZIP-Datei kannst du dann manuell per Mail anhängen oder über andere Wege versenden.");
    return;
  }
  try {
    if (docId === "uebersicht") {
      const text = `Status-Übersicht für ${state.shared.name || ""}\nAktenzeichen: ${state.shared.aktenzeichen || ""}\nStand: ${todayDE()}\n\n(Bitte vollständige Übersicht aus der App ausdrucken oder als PDF speichern.)`;
      await navigator.share({ title: doc.title, text: text });
      return;
    }

    // Check if doc has attachments
    const docsWithAttachments = ["schadens", "sozial", "kosten", "asservate"];
    const hasAtts = docsWithAttachments.includes(docId) && countAllAttachments(docId) > 0;

    // Build files list - main doc + all attachments
    const files = [];
    const userName = (state.shared.name || "").replace(/[^a-zA-Z0-9äöüÄÖÜß_-]/g, "_");
    const docTitle = doc.title.replace(/[^a-zA-Z0-9äöüÄÖÜß_-]/g, "_");

    // Main doc as docx if available, else skip (user must use Print)
    const docBlob = await buildDocBlob(docId);
    if (docBlob) {
      const filename = `${docTitle}${userName ? "_" + userName : ""}.docx`;
      files.push(new File([docBlob], filename, { type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" }));
    }

    // Attachments
    if (hasAtts) {
      const atts = await collectDocAttachments(docId);
      for (const a of atts) {
        const safeName = `${a.folder}_${a.filename}`;
        files.push(new File([a.blob], safeName, { type: a.blob.type }));
      }
    }

    if (files.length === 0) {
      // Fallback: only text
      const text = `${doc.title}\n${state.shared.name ? "Name: " + state.shared.name + "\n" : ""}${state.shared.aktenzeichen ? "Aktenzeichen: " + state.shared.aktenzeichen + "\n" : ""}Stand: ${todayDE()}\n\n(Dokument bitte aus der App ausdrucken oder als PDF speichern.)`;
      await navigator.share({ title: doc.title, text: text });
      return;
    }

    // Check if device can share files
    if (navigator.canShare && !navigator.canShare({ files: files })) {
      // Fallback: try ZIP download
      const fallback = confirm("Datei-Teilen wird auf diesem Gerät leider nicht unterstützt.\n\nMöchtest du stattdessen alles als ZIP-Datei herunterladen?");
      if (fallback) await downloadDocBundle(docId);
      return;
    }

    await navigator.share({
      title: doc.title,
      text: buildEmailBody(doc.title) + (hasAtts ? "\n\n(Belege sind als zusätzliche Dateien beigefügt.)" : ""),
      files: files,
    });
  } catch (e) {
    if (e.name === "AbortError") return;
    console.error(e);
    // If too-many-files or other share-error, offer ZIP fallback
    const fallback = confirm("Teilen fehlgeschlagen: " + (e.message || "Unbekannter Fehler") + "\n\nMöchtest du stattdessen alles als ZIP-Datei herunterladen?");
    if (fallback) await downloadDocBundle(docId);
  }
}

// Share a single attachment (image/pdf) via system share sheet
async function shareAttachment(secId, rowIdx, attId) {
  const att = getAttachments(secId, rowIdx).find(a => a.id === attId);
  if (!att) return;
  if (!navigator.share) {
    alert("Teilen wird auf diesem Gerät nicht unterstützt. Lade den Beleg runter und versende ihn manuell.");
    return;
  }
  try {
    const resp = await fetch(att.dataUrl);
    const blob = await resp.blob();
    const file = new File([blob], att.name, { type: blob.type });
    if (navigator.canShare && !navigator.canShare({ files: [file] })) {
      alert("Datei-Teilen wird auf diesem Gerät nicht unterstützt.");
      return;
    }
    await navigator.share({ title: "Beleg: " + att.name, files: [file] });
  } catch (e) {
    if (e.name === "AbortError") return;
    alert("Fehler beim Teilen: " + e.message);
  }
}

function downloadAttachment(secId, rowIdx, attId) {
  const att = getAttachments(secId, rowIdx).find(a => a.id === attId);

  const a = document.createElement("a");
  a.href = att.dataUrl;
  a.download = att.name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

// === PAST APPOINTMENT DETECTION ===
function isDateInPast(dateStr) {
  const d = parseDateGuess(dateStr);
  if (!d) return false;
  // Compare to today (start of day)
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  return d < today;
}

function deleteAttachment(secId, rowIdx, attId) {
  const list = getAttachments(secId, rowIdx).filter(a => a.id !== attId);
  setAttachments(secId, rowIdx, list);
  render();
}
// When deleting a row, also drop its attachments and re-index
function shiftAttachmentsAfterRowDelete(secId, deletedIdx) {
  const ds = getDocState();
  if (!ds.attachments || !ds.attachments[secId]) return;
  const map = ds.attachments[secId];
  const newMap = {};
  Object.keys(map).map(k => parseInt(k, 10)).filter(k => !isNaN(k)).sort((a,b) => a-b).forEach(idx => {
    if (idx === deletedIdx) return;
    const newIdx = idx > deletedIdx ? idx - 1 : idx;
    newMap[newIdx] = map[idx];
  });
  ds.attachments[secId] = newMap;
}

// Compress an image file to a smaller JPEG dataURL
function compressImage(file, maxDim = 1600, quality = 0.8) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e => { img.src = e.target.result; };
    reader.onerror = () => reject(new Error("Datei konnte nicht gelesen werden"));
    img.onload = () => {
      let { width, height } = img;
      if (width > maxDim || height > maxDim) {
        const scale = Math.min(maxDim / width, maxDim / height);
        width = Math.round(width * scale);
        height = Math.round(height * scale);
      }
      const canvas = document.createElement("canvas");
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "white"; ctx.fillRect(0, 0, width, height);
      ctx.drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = () => reject(new Error("Bild konnte nicht verarbeitet werden"));
    reader.readAsDataURL(file);
  });
}
// Read PDF as base64 (no compression possible)
function readAsDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = () => reject(new Error("Datei konnte nicht gelesen werden"));
    reader.readAsDataURL(file);
  });
}
async function handleAttachmentUpload(secId, rowIdx, fileList) {
  const files = Array.from(fileList);
  if (files.length === 0) return;
  const list = getAttachments(secId, rowIdx);
  for (const file of files) {
    try {
      let dataUrl, type, size;
      if (file.type.startsWith("image/")) {
        dataUrl = await compressImage(file);
        type = "image";
      } else if (file.type === "application/pdf") {
        // PDFs can be large - warn if > 2 MB
        if (file.size > 2 * 1024 * 1024) {
          if (!confirm(`Die PDF "${file.name}" ist ${(file.size/1024/1024).toFixed(1)} MB groß und kann den lokalen Speicher schnell füllen. Trotzdem hinzufügen?`)) continue;
        }
        dataUrl = await readAsDataUrl(file);
        type = "pdf";
      } else {
        alert(`Datei "${file.name}" kann nicht hinzugefügt werden. Nur Bilder (JPG, PNG, HEIC) und PDFs sind erlaubt.`);
        continue;
      }
      // Estimate size of base64 dataUrl in bytes (approx 3/4 of base64 length)
      size = Math.round(dataUrl.length * 0.75);
      list.push({
        id: "att_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8),
        name: file.name, type, size, dataUrl
      });
    } catch (e) {
      alert(`Fehler bei "${file.name}": ${e.message}`);
    }
  }
  setAttachments(secId, rowIdx, list);
  render();
}

// === STORAGE USAGE ===
function calcStorageUsage() {
  // Total bytes used in localStorage by our app
  let bytes = 0;
  if (Storage.hasLocal) {
    try {
      Object.keys(localStorage).forEach(key => {
        if (key.startsWith("ear_") || key.startsWith("zeit_") || key.startsWith("thera_") ||
            key.startsWith("schadens_") || key.startsWith("sozial_") || key.startsWith("uebersicht_") ||
            key.startsWith("bh_")) {
          bytes += (localStorage.getItem(key) || "").length;
        }
      });
    } catch(e) {}
  }
  // Roughly 5MB limit on most browsers
  const limit = 5 * 1024 * 1024;
  return { bytes, limit, pct: Math.min(100, Math.round((bytes / limit) * 100)) };
}

// === DEADLINES ===
// Returns { kind, message, days } for a doc, or null if no deadline
function getDeadlineInfo(docId) {
  if (docId === "schadens") {
    const fristStr = state.docs.schadens?.answers?.["auflage.frist"];
    const gesamt = parseMoney(state.docs.schadens?.answers?.["auflage.gesamt"]);
    if (!fristStr || typeof fristStr !== "string") return null;
    const fristDate = parseDateGuess(fristStr);
    if (!fristDate) return null;
    // Calc paid - check this FIRST before any other condition
    const rows = (state.docs.schadens?.rows?.zahlungen) || [];
    const gezahlt = rows.reduce((s, r) => s + parseMoney(r.betrag || ""), 0);
    const rest = Math.max(0, gesamt - gezahlt);
    if (gesamt > 0 && rest === 0) return { kind: "ok", message: "✓ Vollständig gezahlt" };
    const days = daysUntil(fristDate);
    if (days < 0) return { kind: "danger", message: `⚠ Frist überschritten (vor ${-days} Tagen)` };
    if (days <= 30) return { kind: "warn", message: `⏰ Frist in ${days} Tagen (${moneyOnly(rest)} € noch offen)` };
    if (days <= 90) return { kind: "warn", message: `Frist in ${days} Tagen` };
    return { kind: "ok", message: `Frist in ${days} Tagen` };
  }
  if (docId === "sozial") {
    const fristStr = state.docs.sozial?.answers?.["auflage.frist"];
    const stundenGesamt = parseMoney(state.docs.sozial?.answers?.["auflage.stunden_gesamt"]);
    if (!fristStr || typeof fristStr !== "string") return null;
    const fristDate = parseDateGuess(fristStr);
    if (!fristDate) return null;
    const rows = (state.docs.sozial?.rows?.stunden) || [];
    const stundenSum = rows.reduce((s, r) => s + parseMoney(r.stunden || ""), 0);
    const rest = Math.max(0, stundenGesamt - stundenSum);
    if (stundenGesamt > 0 && rest === 0) return { kind: "ok", message: "✓ Stunden vollständig geleistet" };
    const days = daysUntil(fristDate);
    if (days < 0) return { kind: "danger", message: `⚠ Frist überschritten (vor ${-days} Tagen, noch ${rest.toLocaleString("de-DE")} h offen)` };
    if (days <= 30) return { kind: "warn", message: `⏰ Frist in ${days} Tagen (${rest.toLocaleString("de-DE")} h noch offen)` };
    if (days <= 90) return { kind: "warn", message: `Frist in ${days} Tagen` };
    return { kind: "ok", message: `Frist in ${days} Tagen` };
  }
  return null;
}
function parseDateGuess(s) {
  if (!s) return null;
  // Defensive: handle skipped fields (objects with skipped:true), numbers, etc.
  if (typeof s !== "string") {
    if (typeof s === "object" && s !== null && s.skipped) return null;
    if (typeof s === "object" && s !== null && typeof s.value === "string") s = s.value;
    else if (typeof s === "number") s = String(s);
    else return null;
  }
  if (!s) return null;
  // Try ISO format first (YYYY-MM-DD)
  let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
  // Try DD.MM.YYYY
  m = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if (m) return new Date(parseInt(m[3]), parseInt(m[2])-1, parseInt(m[1]));
  // Try MM/YYYY
  m = s.match(/^(\d{1,2})\/(\d{4})/);
  if (m) return new Date(parseInt(m[2]), parseInt(m[1])-1, 28); // end of month-ish
  return null;
}
function daysUntil(date) {
  const ms = date - new Date();
  return Math.ceil(ms / (1000 * 60 * 60 * 24));
}

async function loadAllState() {
  for (const id of Object.keys(DOCS)) {
    const raw = await Storage.get(DOCS[id].storageKey);
    if (raw) {
      try {
        const data = JSON.parse(raw);
        if (data && typeof data === "object") {
          state.docs[id] = { ...state.docs[id], ...data };
        }
      } catch(e) {}
    }
    // Clamp currentIdx if it's out of bounds (schema may have changed across versions)
    const max = DOCS[id].sections.length - 1;
    if (typeof state.docs[id].currentIdx !== "number" || state.docs[id].currentIdx < 0 || state.docs[id].currentIdx > max) {
      state.docs[id].currentIdx = 0;
    }
    // Auto-fill "Erstellt am" with today if empty (only for non-auto-generated docs)
    if (!DOCS[id].autoGenerated) {
      const erstelltKey = "personal.erstellt";
      if (!state.docs[id].answers[erstelltKey]) {
        state.docs[id].answers[erstelltKey] = todayISO();
      }
    }
  }
  // Load shared data
  const sharedRaw = await Storage.get(SHARED_STORAGE_KEY);
  if (sharedRaw) {
    try {
      const d = JSON.parse(sharedRaw);
      if (d && typeof d === "object") state.shared = d;
    } catch(e){}
  }
  // Backfill state.shared from existing doc data (in case shared was empty / from older version)
  Object.keys(SHARED_FIELD_MAP).forEach(docId => {
    const map = SHARED_FIELD_MAP[docId];
    Object.keys(map).forEach(fieldKey => {
      const sharedKey = map[fieldKey];
      if (!state.shared[sharedKey]) {
        const val = state.docs[docId]?.answers?.[fieldKey];
        if (typeof val === "string" && val) state.shared[sharedKey] = val;
      }
    });
  });
  // Load theme
  const theme = await Storage.get(THEME_STORAGE_KEY);
  if (theme === "dark" || theme === "light") {
    state.theme = theme;
    applyTheme();
  }
  // Load notes
  const notesRaw = await Storage.get(NOTES_STORAGE_KEY);
  if (notesRaw) {
    try {
      const parsed = JSON.parse(notesRaw);
      if (Array.isArray(parsed)) state.notes = parsed;
    } catch(e){}
  }
  // Check for PIN - if set, lock immediately
  const pinHash = await Storage.get(PIN_STORAGE_KEY);
  if (pinHash && pinHash.length > 0) {
    state.pinLocked = true;
  }
}

  const wahrgenommen = rows.some(r => {

// PUNKT 14: HEUTE-ÜBERSICHT
// ============================================
// Returns array of "today" items based on app data
// Check if a row's status field indicates it has been handled (not "pending")
// Returns true if status contains keywords like "wahrgenommen", "abgesagt", "verpasst", "bezahlt", "erledigt"
function isStatusHandled(status) {
  if (!status || typeof status !== "string") return false;
  const s = status.toLowerCase();
  return /wahrgenommen|abgesagt|verpasst|nicht.?(da|wahrgenommen|erschienen)|bezahlt|erledigt|stattgefunden|nicht.?statt/.test(s);
}

function getTodayOverview() {
  const items = [];
  const now = new Date();
  const today = new Date(now); today.setHours(0,0,0,0);
  const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
  const inWeek = new Date(today); inWeek.setDate(inWeek.getDate() + 7);

  // Helper: classify a date relative to today and produce a label
  function classifyDate(d) {
    if (!d) return null;
    const dd = new Date(d); dd.setHours(0,0,0,0);
    const diffDays = Math.round((dd - today) / (1000*60*60*24));
    if (diffDays === 0) return { kind: "danger", label: "Heute", days: 0 };
    if (diffDays === 1) return { kind: "warn", label: "Morgen", days: 1 };
    if (diffDays > 1 && diffDays <= 7) return { kind: "info", label: `In ${diffDays} Tagen`, days: diffDays };
    if (diffDays < 0 && diffDays >= -7) return { kind: "danger", label: `Vor ${Math.abs(diffDays)} Tag${Math.abs(diffDays) !== 1 ? "en" : ""} (vergangen)`, days: diffDays };
    return null; // Outside the 7-day window
  }

  // 1. BH-Termin: nächster (gespeichertes Feld)
  const naechsterDatum = state.docs.bhtermine?.answers?.["naechster.datum"];
  if (naechsterDatum) {
    const d = parseDateGuess(naechsterDatum);
    const cls = d ? classifyDate(d) : null;
    if (cls && cls.days >= 0) {
      const uhrzeit = state.docs.bhtermine.answers?.["naechster.uhrzeit"] || "";
      items.push({ kind: cls.kind, icon: "📅", text: `${cls.label} BH-Termin${uhrzeit ? " um " + uhrzeit : ""}` });
    }
  }

  // 2. BH-Termine aus Tabelle (gespeicherte Termine)
  const bhRows = state.docs.bhtermine?.rows?.termine || [];
  bhRows.forEach((row, idx) => {
    if (!row.datum) return;
    const d = parseDateGuess(row.datum);
    const cls = d ? classifyDate(d) : null;
    if (!cls) return;
    // Skip if already handled (status set)
    if (isStatusHandled(row.status)) return;
    // Skip if already covered by "naechster.datum"
    if (naechsterDatum && row.datum === naechsterDatum) return;
    const uhr = row.uhrzeit || "";
    items.push({
      kind: cls.kind, icon: "📅",
      text: `${cls.label} BH-Termin${uhr ? " um " + uhr : ""}${row.themen ? ": " + row.themen.substring(0, 40) : ""}`,
      action: { type: "appointment", docId: "bhtermine", sectionId: "termine", rowIdx: idx, kind: "bh" }
    });
  });

  // 3. Therapie-Termine
  const theraRows = state.docs.thera?.rows?.termine || [];
  theraRows.forEach((row, idx) => {
    if (!row.datum) return;
    const d = parseDateGuess(row.datum);
    const cls = d ? classifyDate(d) : null;
    if (!cls) return;
    // Skip if already handled (status field added when user confirms)
    if (isStatusHandled(row.status)) return;
    const uhr = row.uhrzeit || row.von || "";
    items.push({
      kind: cls.kind, icon: "🧠",
      text: `${cls.label} Therapie-Termin${uhr ? " um " + uhr : ""}`,
      action: { type: "appointment", docId: "thera", sectionId: "termine", rowIdx: idx, kind: "thera" }
    });
  });

  // 4. Sozialstunden-Einsätze
  const sozialRows = state.docs.sozial?.rows?.stunden || [];
  sozialRows.forEach((row, idx) => {
    if (!row.datum) return;
    const d = parseDateGuess(row.datum);
    const cls = d ? classifyDate(d) : null;
    if (!cls) return;
    // Skip if already handled
    if (isStatusHandled(row.status)) return;
    const uhr = row.von || "";
    const taet = row.taetigkeit ? ": " + row.taetigkeit.substring(0, 40) : "";
    items.push({
      kind: cls.kind, icon: "🤝",
      text: `${cls.label} Sozialstunden-Einsatz${uhr ? " ab " + uhr : ""}${taet}`,
      action: { type: "appointment", docId: "sozial", sectionId: "stunden", rowIdx: idx, kind: "sozial" }
    });
  });

  // 5. Schadens: anstehende Zahlungen (Ratenzahlung)
  const schadensRows = state.docs.schadens?.rows?.zahlungen || [];
  schadensRows.forEach((row, idx) => {
    if (!row.datum) return;
    const d = parseDateGuess(row.datum);
    const cls = d ? classifyDate(d) : null;
    if (!cls) return;
    // Only show as upcoming if no payment has been made yet for this row (no betrag set)
    if (row.betrag) return; // Already paid - don't remind
    if (isStatusHandled(row.status)) return;
    const betrag = row.bemerkung ? " " + row.bemerkung.substring(0, 30) : "";
    items.push({
      kind: cls.kind, icon: "💶",
      text: `${cls.label} Schadens-Zahlung${betrag}`,
      action: { type: "payment", docId: "schadens", sectionId: "zahlungen", rowIdx: idx }
    });
  });

  // 6. Verfahrenskosten: anstehende Zahlungen
  const kostenRows = state.docs.kosten?.rows?.zahlungen || [];
  kostenRows.forEach((row, idx) => {
    if (!row.datum) return;
    const d = parseDateGuess(row.datum);
    const cls = d ? classifyDate(d) : null;
    if (!cls) return;
    if (row.betrag) return; // Already paid
    if (isStatusHandled(row.status)) return;
    items.push({
      kind: cls.kind, icon: "💸",
      text: `${cls.label} Verfahrenskosten-Zahlung`,
      action: { type: "payment", docId: "kosten", sectionId: "zahlungen", rowIdx: idx }
    });
  });

  // 7. Schadens: Frist nahe?
  const schadensFrist = state.docs.schadens?.answers?.["auflage.frist"];
  if (schadensFrist) {
    const fristD = parseDateGuess(schadensFrist);
    if (fristD) {
      const days = daysUntil(fristD);
      const gesamt = parseMoney(state.docs.schadens?.answers?.["auflage.gesamt"]);
      const rows = state.docs.schadens?.rows?.zahlungen || [];
      const gezahlt = rows.reduce((s, r) => s + parseMoney(r.betrag || ""), 0);
      const rest = Math.max(0, gesamt - gezahlt);
      if (rest > 0 && days >= 0 && days <= 30) {
        items.push({ kind: days <= 7 ? "danger" : "warn", icon: "💶", text: `Schadens-Auflage: ${moneyOnly(rest)} € offen, Frist in ${days} Tag${days !== 1 ? "en" : ""}` });
      } else if (rest > 0 && days < 0) {
        items.push({ kind: "danger", icon: "💶", text: `Schadens-Frist überschritten: ${moneyOnly(rest)} € noch offen` });
      }
    }
  }

  // 8. Sozial: Frist nahe?
  const sozialFrist = state.docs.sozial?.answers?.["auflage.frist"];
  if (sozialFrist) {
    const fristD = parseDateGuess(sozialFrist);
    if (fristD) {
      const days = daysUntil(fristD);
      const stundenGesamt = parseMoney(state.docs.sozial?.answers?.["auflage.stunden_gesamt"]);
      const rows = state.docs.sozial?.rows?.stunden || [];
      const stundenSum = rows.reduce((s, r) => s + parseMoney(r.stunden || ""), 0);
      const rest = Math.max(0, stundenGesamt - stundenSum);
      if (rest > 0 && days >= 0 && days <= 30) {
        items.push({ kind: days <= 7 ? "danger" : "warn", icon: "⏱", text: `Sozial-Auflage: ${rest.toLocaleString("de-DE")} h offen, Frist in ${days} Tag${days !== 1 ? "en" : ""}` });
      } else if (rest > 0 && days < 0) {
        items.push({ kind: "danger", icon: "⏱", text: `Sozial-Frist überschritten: ${rest.toLocaleString("de-DE")} h noch offen` });
      }
    }
  }

  // 9. Verfahrenskosten: Zahlungsfristen (offene Bescheide)
  const kostenFrist1 = state.docs.kosten?.answers?.["geldstrafe.frist"];
  const kostenFrist2 = state.docs.kosten?.answers?.["gerichtskosten.frist"];
  [["geldstrafe", kostenFrist1, "Geldstrafe"], ["gerichtskosten", kostenFrist2, "Gerichtskosten"]].forEach(([_, frist, label]) => {
    if (!frist) return;
    const fristD = parseDateGuess(frist);
    if (!fristD) return;
    const days = daysUntil(fristD);
    if (days >= 0 && days <= 14) {
      items.push({ kind: days <= 3 ? "danger" : "warn", icon: "💸", text: `${label}: Zahlungsfrist in ${days} Tag${days !== 1 ? "en" : ""}` });
    } else if (days < 0 && days >= -14) {
      items.push({ kind: "danger", icon: "💸", text: `${label}: Zahlungsfrist seit ${Math.abs(days)} Tag${Math.abs(days) !== 1 ? "en" : ""} überschritten` });
    }
  });

  // 10. Offene Notizen für nächsten BH-Termin
  const openBh = state.notes.filter(n => !n.done && n.category === "bh");
  if (openBh.length > 0 && naechsterDatum) {
    const d = parseDateGuess(naechsterDatum);
    if (d && d >= today && (d - today) / (1000*60*60*24) <= 7) {
      items.push({ kind: "info", icon: "📝", text: `${openBh.length} offene Notiz(en) für nächsten BH-Termin` });
    }
  }

  // Sort: most urgent first (danger > warn > info), then by closest date
  const kindOrder = { danger: 0, warn: 1, info: 2 };
  items.sort((a, b) => (kindOrder[a.kind] ?? 9) - (kindOrder[b.kind] ?? 9));

  return items;
}

// Sozial special: prompt user about auto-calculating stunden
function handleSozialDone(docId, sectionId, rowIdx, row) {
  const calculated = calculateNetHours(row.von, row.bis, row.pause);
  let action = "manual";
  if (calculated !== null && calculated > 0 && row.von && row.bis) {
    // We can calculate - ask user
    const msg = `Sozialstunden-Einsatz als erledigt markieren.\n\n` +
      `Aus deinen Eingaben (${row.von}–${row.bis}, Pause ${row.pause || 0} Min) wären das ${calculated.toLocaleString("de-DE", { maximumFractionDigits: 2 })} h netto.\n\n` +
      `OK   = ${calculated.toLocaleString("de-DE", { maximumFractionDigits: 2 })} h automatisch eintragen\n` +
      `Abbrechen = Nur Status setzen, Stunden später eintragen`;
    if (confirm(msg)) {
      row.stunden = calculated.toLocaleString("de-DE", { maximumFractionDigits: 2 });
    }
  }
  row.status = "wahrgenommen";
  saveAndRefresh(docId);
}

// Calculate net hours from von/bis/pause (returns number or null)
function calculateNetHours(von, bis, pause) {
  if (!von || !bis) return null;
  const parseTime = s => {
    const m = String(s).match(/^(\d{1,2})[:.]?(\d{0,2})$/);
    if (!m) return null;
    const h = parseInt(m[1]); const mi = parseInt(m[2] || "0");
    if (isNaN(h) || isNaN(mi) || h > 23 || mi > 59) return null;
    return h * 60 + mi;
  };
  const v = parseTime(von); const b = parseTime(bis);
  if (v === null || b === null) return null;
  let mins = b - v;
  if (mins < 0) mins += 24 * 60; // crossed midnight (rare)
  const pauseMin = pause ? parseInt(String(pause).replace(/[^\d]/g, "")) || 0 : 0;
  mins -= pauseMin;
  if (mins <= 0) return null;
  return mins / 60;
}

// Handle payment confirmation
function confirmPayment(refId, status, ev) {
  if (ev) ev.stopPropagation();
  const action = _getActionRef(refId);
  if (!action) return;
  const { docId, sectionId, rowIdx } = action;
  const rows = state.docs[docId]?.rows?.[sectionId];
  if (!rows || !rows[rowIdx]) return;
  const row = rows[rowIdx];

  if (status === "paid") {
    // Ask user for amount (most likely they want to enter it now)
    const docName = DOCS[docId].title;
    const dateStr = row.datum || "(ohne Datum)";
    const suggested = row.bemerkung && /\d/.test(row.bemerkung) ? row.bemerkung.match(/\d+[,\.]?\d*/)?.[0] : "";
    const amount = prompt(`Zahlung am ${dateStr} (${docName}) als bezahlt markieren.\n\nWelchen Betrag hast du gezahlt? (€)`, suggested || "");
    if (amount === null) return; // User cancelled
    const cleaned = amount.trim();
    if (!cleaned) {
      // No amount - just set status
      row.status = "bezahlt";
    } else {
      row.betrag = cleaned;
      row.status = "bezahlt";
    }
  } else if (status === "postponed") {
    if (!confirm(`Zahlung wirklich als „verschoben" markieren?\n\nDer Eintrag bleibt erhalten, aber verschwindet aus der Erinnerungsliste. Du kannst später ein neues Datum eintragen.`)) {
      return;
    }
    row.status = "verschoben";
  }
  saveAndRefresh(docId);
}

// Common save + refresh helper for action handlers
function saveAndRefresh(docId) {

          </div>

  }
  return `

const esc = s => String(s || "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[c]);
const isSkipped = a => a && typeof a === "object" && a.skipped === true;
const valueOf = a => (a && typeof a === "string") ? a : "";
