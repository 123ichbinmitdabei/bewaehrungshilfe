  }
  trs.push(new D.TableRow({ children: [
    docxCell("Geleistete Stunden bisher", { width: widths.slice(0,5).reduce((a,b)=>a+b,0), bold: true, shade: "FFF2CC" }),
    docxCell(stundenSum.toLocaleString("de-DE") + " h", { width: widths[5], bold: true, shade: "FFF2CC" }),
    docxCell("", { width: widths[6] + widths[7], shade: "FFF2CC" }),
  ]}));
  // need to rebuild last row to merge cells correctly - simpler: just add 3 cells matching widths
  trs.pop();
  trs.push(new D.TableRow({ children: [
    docxCell("Geleistete Stunden bisher (netto)", { width: widths[0]+widths[1]+widths[2]+widths[3]+widths[4], bold: true, shade: "FFF2CC" }),
    docxCell(stundenSum.toLocaleString("de-DE") + " h", { width: widths[5], bold: true, shade: "FFF2CC", align: D.AlignmentType.CENTER }),
    docxCell(" ", { width: widths[6], shade: "FFF2CC" }),
    docxCell(" ", { width: widths[7], shade: "FFF2CC" }),
  ]}));
  const stundenTable = new D.Table({
    width: { size: widths.reduce((a,b)=>a+b,0), type: D.WidthType.DXA },
    columnWidths: widths, rows: trs
  });

  // Progress table
  const stundenGesamt = parseMoney(v("auflage","stunden_gesamt").value || "");
  let progressTbl = null;
  if (stundenGesamt > 0) {
    const rest = Math.max(0, stundenGesamt - stundenSum);
    const pct = Math.round((stundenSum / stundenGesamt) * 100);
    const c1 = Math.floor(LAND_CONTENT_W * 0.5), c2 = LAND_CONTENT_W - c1;
    progressTbl = new D.Table({
      width: { size: LAND_CONTENT_W, type: D.WidthType.DXA },
      columnWidths: [c1, c2],
      rows: [
        new D.TableRow({ tableHeader: true, children: [
          docxCell("Position", { width: c1, bold: true, shade: COLOR_SUB }),
          docxCell("Stunden", { width: c2, bold: true, shade: COLOR_SUB }),
        ]}),
        new D.TableRow({ children: [
          docxCell("Auflage Gesamtstunden", { width: c1 }),
          docxCell(stundenGesamt.toLocaleString("de-DE") + " h", { width: c2 }),
        ]}),
        new D.TableRow({ children: [
          docxCell("Geleistet bisher", { width: c1, shade: COLOR_ZEILE }),
          docxCell(stundenSum.toLocaleString("de-DE") + " h", { width: c2, shade: COLOR_ZEILE }),
        ]}),
        new D.TableRow({ children: [
          docxCell("Fortschritt", { width: c1 }),
          docxCell(pct + " %", { width: c2 }),
        ]}),
        new D.TableRow({ children: [
          docxCell("Noch zu leisten", { width: c1, bold: true, shade: "FFF2CC" }),
          docxCell(rest.toLocaleString("de-DE") + " h", { width: c2, bold: true, shade: "FFF2CC" }),
        ]}),
      ]
    });
  }

  const noteVal = v("anmerkung", "notes");
  let secNum = 1;
  const children = [
    new D.Paragraph({ children: [new D.TextRun({ text: "Sozialstunden-Nachweis", bold: true, size: 32, color: "1F3864" })], alignment: D.AlignmentType.CENTER, spacing: { after: 80 } }),
    new D.Paragraph({ children: [new D.TextRun({ text: "Gemeinnützige Arbeit / Bewährungsauflage", italics: true, size: 22, color: "555555" })], alignment: D.AlignmentType.CENTER, spacing: { after: 240 } }),
  ];
  const personalT = infoTbl(personalPairs, LAND_CONTENT_W);
  if (personalT) { children.push(docxH1(`${secNum++}. Persönliche Angaben`), personalT); }
  const auflageT = infoTbl(auflagePairs, LAND_CONTENT_W);
  if (auflageT) { children.push(docxH1(`${secNum++}. Auflage`), auflageT); }
  const einrT = infoTbl(einrPairs, LAND_CONTENT_W);
  if (einrT) { children.push(docxH1(`${secNum++}. Einrichtung`), einrT); }
  children.push(new D.Paragraph({ children: [new D.PageBreak()] }));
  children.push(docxH1(`${secNum++}. Stunden-Nachweis`));
  children.push(docxP("Jeder Einsatz wird durch Unterschrift / Stempel der Einrichtung bestätigt.", { italics: true, size: 18, color: "666666", after: 120 }));
  children.push(stundenTable);
  if (progressTbl) {
    children.push(new D.Paragraph({ children: [new D.PageBreak()] }));
    children.push(docxH1(`${secNum++}. Fortschritt`), progressTbl);
  }
  if (!noteVal.skipped && noteVal.value) {
    children.push(docxH1(`${secNum++}. Anmerkungen`));
    noteVal.value.split("\n").forEach(l => children.push(docxP(l || " ")));
  }
  children.push(new D.Paragraph({ spacing: { before: 360 }, children: [new D.TextRun({ text: "" })] }));
  children.push(docxSignatureBlock(LAND_CONTENT_W, "sozial", { counterRoleLabel: "Bestätigung durch Einrichtung", probandLabel: "Bewährter / Bewährte" }));

  const doc = new D.Document({
    creator: "Bewährungshilfe-Assistent",
    styles: { default: { document: { run: { font: "Arial", size: 20 } } } },
    sections: [{
      properties: { page: { size: { width: PAGE_W, height: PAGE_H, orientation: D.PageOrientation.LANDSCAPE }, margin: { top: MARGIN, right: MARGIN, bottom: MARGIN, left: MARGIN } } },
      children
    }]
  });
  return await D.Packer.toBlob(doc);
}

// ============================================
// INIT
// ============================================
function checkBrowserCompat() {
  // Detect known-incompatible browsers (very old ones)
  // Required features: localStorage, fetch, Promise, async/await, template literals
  const required = {
    localStorage: typeof localStorage !== "undefined",
    fetch: typeof fetch !== "undefined",
    Promise: typeof Promise !== "undefined",
    asyncAwait: (async () => {})().constructor === Promise,
  };
  const missing = Object.entries(required).filter(([k, v]) => !v).map(([k]) => k);
  if (missing.length > 0) {
    document.body.innerHTML = `
      <div style="max-width:560px; margin:60px auto; padding:30px; background:#fef3c7; border:2px solid #f59e0b; border-radius:14px; font-family:sans-serif;">
        <h2 style="color:#92400e; margin-bottom:10px;">⚠ Dein Browser ist zu alt</h2>
        <p style="margin-bottom:14px;">Diese App benötigt einen modernen Browser (Stand 2018 oder neuer). Folgende Funktionen fehlen: ${missing.join(", ")}.</p>
        <p style="margin-bottom:14px;"><strong>Was tun?</strong> Aktualisiere deinen Browser oder verwende einen anderen:</p>
        <ul style="padding-left:20px; margin-bottom:14px;">
          <li>Chrome (alle Plattformen)</li>
          <li>Edge (Windows, macOS)</li>
          <li>Firefox (alle Plattformen)</li>
          <li>Safari (iOS, macOS)</li>
        </ul>
        <p style="font-size:12px; color:#92400e;">Erkannter Browser: ${navigator.userAgent || "unbekannt"}</p>
      </div>`;
    return false;
  }
  // Warn (but don't block) on Internet Explorer / very old Safari
  const ua = navigator.userAgent || "";
  if (/MSIE|Trident\//.test(ua)) {
    console.warn("Internet Explorer wird nicht unterstützt - bitte einen modernen Browser nutzen.");
  }
  return true;
}

(async () => {
  if (!checkBrowserCompat()) return;
  await loadAllState();
  render();
})();
</script>
