}
function formatMoney(n) {
  return n.toLocaleString("de-DE", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
}
function moneyOnly(n) {

}
function getDocState() { return state.docs[state.activeDocId]; }
function getSharedKey(secId, fId) {
  const map = SHARED_FIELD_MAP[state.activeDocId];
  return map ? map[`${secId}.${fId}`] : null;
}
function getAnswer(secId, fId) {
  const ds = getDocState();
  if (!ds) return undefined;
  const local = ds.answers[`${secId}.${fId}`];
  if (local !== undefined) return local;
  // Fall back to shared value if field is shared and not yet touched in this doc
  const sk = getSharedKey(secId, fId);
  if (sk && state.shared[sk]) return state.shared[sk];
  return undefined;
}
function setAnswer(secId, fId, val) {
  getDocState().answers[`${secId}.${fId}`] = val;
  // Sync to shared store if this is a shared field
  const sk = getSharedKey(secId, fId);
  if (sk && typeof val === "string") {
    state.shared[sk] = val;
    // Also propagate to other docs that have already touched this shared field,
    // so they don't show a stale value when revisited
    Object.keys(SHARED_FIELD_MAP).forEach(docId => {
      if (docId === state.activeDocId) return;
      const otherMap = SHARED_FIELD_MAP[docId];
      Object.keys(otherMap).forEach(otherKey => {
        if (otherMap[otherKey] === sk) {
          const other = state.docs[docId]?.answers?.[otherKey];
          // Only overwrite if other doc already has a string value (not skipped, not untouched)
          if (typeof other === "string") {
            state.docs[docId].answers[otherKey] = val;
          }
        }
      });
    });
  }
  debouncedSave();
}
function getRows(secId) {
  const ds = getDocState();
  if (!ds.rows) ds.rows = {};
  if (!ds.rows[secId]) ds.rows[secId] = [];
  return ds.rows[secId];
}
function setRows(secId, rows) {
  if (!getDocState().rows) getDocState().rows = {};
  getDocState().rows[secId] = rows;
  debouncedSave();
}
function getChecks(secId) {
  const ds = getDocState();
  if (!ds.checks) ds.checks = {};
  if (!ds.checks[secId]) ds.checks[secId] = {};
  return ds.checks[secId];
}
function toggleCheck(secId, opt) {
  const checks = getChecks(secId);
  checks[opt] = !checks[opt];
  debouncedSave();
}
function sectionStatus(sec) {
  if (sec.type === "review") return "empty";
  if (sec.type === "rows") {
    const rows = getRows(sec.id);
    return rows.length > 0 ? "done" : "empty";
  }
  if (sec.type === "checkboxes") {
    const checks = getChecks(sec.id);
    return Object.values(checks).some(v => v) ? "done" : "empty";
  }
  if (sec.type === "signatures") {
    const docId = state.activeDocId;
    const sigs = state.docs[docId] && state.docs[docId].signatures;
    if (!sigs) return "empty";
    if (sigs.gesamt_proband || sigs.gesamt) return "done";
    return "empty";
  }
  if (!sec.fields) return "empty";
  const total = sec.fields.length; if (total === 0) return "empty";
  let touched = 0;
  sec.fields.forEach(f => {
    const a = getAnswer(sec.id, f.id);
    if (isSkipped(a) || (a && a.length > 0)) touched++;
  });
  if (touched === 0) return "empty";
  if (touched === total) return "done";
  return "partial";
}
function totalsBySide() {
  let ein = 0, aus = 0, einHH = 0;
  if (state.activeDocId !== "ear") return { ein, aus, einHH, saldo: 0 };
  const ans = getDocState().answers;
  DOCS.ear.sections.forEach(sec => {
    if (sec.type !== "money") return;
    sec.fields.forEach(f => {
      const a = ans[`${sec.id}.${f.id}`];
      if (isSkipped(a)) return;
      const n = parseMoney(a);
      if (sec.side === "ein") ein += n;
      if (sec.side === "aus") aus += n;
    });
  });
  // Add household member income from rows
  const hhRows = (getDocState().rows && getDocState().rows.haushalt_ein) || [];
  hhRows.forEach(r => { einHH += parseMoney(r.betrag || ""); });
  return { ein, einHH, aus, saldo: (ein + einHH) - aus };
}

    const wrap = document.createElement("div");
    wrap.id = "modalOverlay";
    wrap.innerHTML = renderOnboardingModal();
    document.body.appendChild(wrap);
  }
  if (resetModalOpen) {
    const wrap = document.createElement("div");
    wrap.id = "modalOverlay";
    wrap.innerHTML = renderResetModal();
    document.body.appendChild(wrap);
  }
  attachListeners();
  attachAutoFormatListeners();
}

// Auto-format listeners: applied to all date/time/hours fields after every render
function attachAutoFormatListeners() {
  document.querySelectorAll("[data-rowkey]").forEach(el => {
    const parts = el.dataset.rowkey.split("|");
    const colId = parts[2];
    if (/^(datum)$/.test(colId)) {
      el.addEventListener("blur", e => {
        const formatted = autoFormatDate(e.target.value);
        if (formatted !== e.target.value) {
          e.target.value = formatted;
          // Trigger input event so it gets saved
          e.target.dispatchEvent(new Event("input", { bubbles: true }));
        }
      });
    }
    if (/^(von|bis|uhrzeit)$/.test(colId)) {
      el.addEventListener("blur", e => {
        const formatted = autoFormatTime(e.target.value);
        if (formatted !== e.target.value) {
          e.target.value = formatted;
          e.target.dispatchEvent(new Event("input", { bubbles: true }));
        }
      });
    }
    // Auto-compute net hours from von/bis/pause for sozial.stunden
    if (parts[0] === "stunden" && /^(von|bis|pause)$/.test(colId)) {
      el.addEventListener("blur", () => {
        const idx = parseInt(parts[1], 10);
        const rows = state.docs.sozial?.rows?.stunden || [];
        const row = rows[idx];
        if (!row) return;
        // Only auto-fill if stunden field is empty
        if (row.stunden && row.stunden.toString().trim()) return;
        const computed = computeNetHours(row.von, row.bis, row.pause);
        if (computed) {
          row.stunden = computed;
          state.docs.sozial.rows.stunden = rows;
          debouncedSave();
          // Update the visible stunden input
          const stundenInput = document.querySelector(`[data-rowkey="stunden|${idx}|stunden"]`);
          if (stundenInput) stundenInput.value = computed;
        }
      });
    }
  });
}

function renderHome() {
  let cards = "";
  let archivedCount = 0;
  // Iterate in custom display order (häufig genutzte oben, Spezial-Themen unten)
  // Falls neue Docs hinzugefügt werden ohne in DOC_ORDER zu stehen, kommen sie ans Ende
  const orderedDocIds = [...DOC_ORDER, ...Object.keys(DOCS).filter(id => !DOC_ORDER.includes(id))];
  orderedDocIds.forEach(docId => {
    const doc = DOCS[docId];
    if (!doc) return; // safety: skip if id is in DOC_ORDER but not in DOCS
    const docArchived = isArchived(doc.id);
    if (docArchived) archivedCount++;
    if (docArchived !== showArchived) return; // skip if doesn't match filter
    const total = doc.sections.length - 1; // exclude review
    const prevActive = state.activeDocId;
    state.activeDocId = doc.id;
    let done = 0;
    doc.sections.forEach(sec => {
      if (sec.type === "review") return;
      const st = sectionStatus(sec);
      if (st === "done") done++;
    });
    state.activeDocId = prevActive;
    const isAuto = doc.autoGenerated;
    const pct = isAuto ? 100 : Math.round((done / Math.max(total, 1)) * 100);
    const started = pct > 0 || isAuto;

    let actionButtons = "";
    if (docArchived) {
      actionButtons = `
        <button class="btn btn-secondary" onclick="event.stopPropagation(); openDocPreview('${doc.id}')">👁 Anzeigen</button>
        <button class="btn btn-secondary" onclick="event.stopPropagation(); setArchived('${doc.id}', false)" title="Wieder aktivieren">↶ Aktivieren</button>
      `;
    } else if (isAuto) {
      actionButtons = `<button class="btn btn-primary" onclick="event.stopPropagation(); openDocPreview('${doc.id}')">👁 Anzeigen & Drucken</button>`;
    } else {
      actionButtons = `
        <button class="btn btn-primary" onclick="event.stopPropagation(); openDoc('${doc.id}')">${pct > 0 ? "Weiter bearbeiten" : "Starten"}</button>
        ${pct > 0 ? `<button class="btn btn-secondary" onclick="event.stopPropagation(); openDocPreview('${doc.id}')" title="Vorschau">👁</button>
        <button class="btn btn-secondary" onclick="event.stopPropagation(); quickPdf('${doc.id}')" title="Schnell drucken / als PDF">🖨</button>
        <button class="btn btn-secondary" onclick="event.stopPropagation(); setArchived('${doc.id}', true)" title="Archivieren">📦</button>` : ""}
      `;

    cards += `
      <div class="doc-card${docArchived ? ' archived' : ''}" onclick="${docArchived ? `openDocPreview('${doc.id}')` : `openDoc('${doc.id}')`}">
        <div class="icon">${doc.icon}${docArchived ? ' <span style="font-size:14px; color:var(--text-soft);">📦</span>' : ''}</div>
        <h3>${doc.title}</h3>
        <div class="desc">${doc.desc}</div>
        <div class="progress-info ${started ? "started" : ""}" style="margin-bottom:8px;">
          ${docArchived ? '<span class="dot" style="background:var(--text-soft)"></span>Archiviert' : (isAuto ? '<span class="dot" style="background:var(--primary)"></span>Automatisch erstellt' : (started ? `<span class="dot" style="background:var(--accent)"></span>${done} von ${total} Abschnitten · ${pct}%` : "Noch nicht begonnen"))}
        </div>
        ${(() => {
          if (docArchived) return "";
          const dl = getDeadlineInfo(doc.id);
          return dl ? `<div class="deadline-info ${dl.kind}">${esc(dl.message)}</div>` : "";
        })()}
        <div class="card-actions" style="display:flex; gap:6px; flex-wrap:wrap; margin-top:12px;">${actionButtons}</div>
      </div>

  const localInfo = Storage.hasLocal
    ? `<span style="color:var(--accent)">●</span> Lokale Speicherung aktiv (deine Daten bleiben in diesem Browser)`

  // Storage usage bar
  const usage = calcStorageUsage();

      ? `<button class="btn btn-secondary" onclick="disablePin()" title="PIN-Schutz entfernen">🔒 PIN aktiv</button>`

  } catch(e) {}

      <p>Strukturierte Vorlagen für deine Bewährungshelferin. Klick auf eine Karte, um zu starten - du kannst jederzeit pausieren und später weitermachen.</p>
      <div style="margin-top:14px; font-size:12px; color:var(--text-soft);">${localInfo} · <span style="opacity:0.85; padding:1px 8px; background:var(--primary-soft); border-radius:999px; color:var(--primary); font-weight:600;" title="App-Version – nützlich für Support-Anfragen">${APP_VERSION}</span></div>

        <li><strong>💶 Schadenswiedergutmachung</strong> – Tracker mit Zahlungsverlauf, Belegen, Fortschrittsberechnung</li>

      <h2 style="color:var(--primary); font-size:18px; margin:18px 0 10px;">💸 Verfahrenskosten & Geldstrafe – wie funktioniert das?</h2>
      <p>Nach einer Verurteilung musst du als Verurteilter grundsätzlich die <strong>Kosten des Verfahrens</strong> tragen (§ 465 StPO). Dieses Dokument hilft dir, alle Kosten und Zahlungen im Überblick zu behalten:</p>
      <ul style="padding-left:20px;">
        <li><strong>Geldstrafe</strong> – wird von der <strong>Staatsanwaltschaft</strong> verwaltet, mit JUKOS-Rechnung. Bei Nicht-Zahlung droht Ersatzfreiheitsstrafe (1 Tagessatz = 1 Tag Haft).</li>
        <li><strong>Gerichtskosten</strong> – Gebühren + Auslagen, verwaltet von der <strong>Landesjustizkasse</strong> (nicht StA!)</li>
        <li><strong>Anwaltskosten</strong> – Pflichtverteidiger nach RVG, Wahlverteidiger oft individuell vereinbart</li>
        <li><strong>Weitere Kosten</strong> – Gutachter, Sachverständige, Dolmetscher (können hoch sein)</li>
        <li><strong>Zahlungsverlauf</strong> – wer hat wann was bekommen, mit Belegen</li>
        <li><strong>Anträge & Status</strong> – Ratenzahlung, Stundung, Erlass</li>
      </ul>
      <p><strong>💡 Wichtige Optionen bei finanzieller Belastung:</strong></p>
      <ul style="padding-left:20px;">
        <li><strong>Ratenzahlung</strong> (§ 459a StPO) – bei der StA für Geldstrafe, bei der Landesjustizkasse für Gerichtskosten. Brief-Vorlage in der App.</li>
        <li><strong>Stundung</strong> (§§ 459a, 459g StPO) – wenn ein konkreter Geldzufluss in Sicht ist. Brief-Vorlage in der App.</li>
        <li><strong>Erlass / Niederschlagung</strong> (§ 10 KostVfG) – nur in seltenen Härtefällen, schwer zu erreichen</li>
        <li><strong>Gemeinnützige Arbeit</strong> – Alternative zur Geldstrafe</li>
        <li><strong>Schuldnerberatung</strong> – kostenlos bei Caritas, Diakonie, Verbraucherzentrale</li>
      </ul>
      <p style="background:rgba(217, 119, 6, 0.08); padding:12px; border-radius:6px; font-size:13px;"><strong>⚖️ Wichtig:</strong> Diese App ist <strong>kein Ersatz für anwaltlichen Rat oder eine Schuldnerberatung</strong>. Bei größeren Beträgen, drohender Vollstreckung oder bei Härtefällen solltest du dir Hilfe holen. Die Brief-Vorlagen sind ein guter Startpunkt, ersetzen aber keine individuelle Beratung. <strong>Hinweis zur Verwechslungsgefahr:</strong> Die Schadenswiedergutmachung (eigenes Dokument) bezieht sich auf <em>Geldauflagen an Geschädigte oder gemeinnützige Einrichtungen</em>, nicht auf Verfahrenskosten / Geldstrafe.</p>

      <h2 style="color:var(--primary); font-size:18px; margin:18px 0 10px;">📦 Beweismittel & Asservate – wie funktioniert das?</h2>
      <p>Wenn bei einer Hausdurchsuchung oder Beschlagnahme Gegenstände mitgenommen wurden, kannst du diese hier <strong>strukturiert dokumentieren</strong>:</p>
      <ul style="padding-left:20px;">
        <li><strong>Verfahrensdaten</strong>: Aktenzeichen, zuständige Staatsanwaltschaft, Tatvorwurf, Verfahrensstand</li>
        <li><strong>Durchsuchung / Beschlagnahme</strong>: Datum, Uhrzeit, Beschluss-Daten, Anzahl/Namen der Beamten, anwesende Zeugen, Widerspruch, entstandene Schäden, Gedächtnisprotokoll zum Ablauf</li>
        <li><strong>Liste der Gegenstände</strong>: Bezeichnung, Marke, Modell, Seriennummer, Fundort, Eigentümer, Kaufpreis, Status – mit Foto-Belegen</li>
        <li><strong>Antragsverlauf</strong>: wann wurde was bei wem beantragt, welche Rückmeldung kam, Anwaltskontakt</li>
        <li><strong>Schadensersatz (StrEG)</strong>: Falls das Verfahren zu deinen Gunsten endet (Freispruch, Einstellung), kannst du nach dem Strafrechtsentschädigungsgesetz Ersatz für Schäden beantragen</li>
      </ul>
      <p><strong>💡 Praktische Tipps direkt nach einer Hausdurchsuchung:</strong></p>
      <ul style="padding-left:20px;">
        <li><strong>Beschlagnahme-Protokoll fotografieren</strong> - du hast Anspruch darauf (§ 107 StPO)</li>
        <li><strong>Gedächtnisprotokoll schreiben</strong> - Details vergisst man schneller als man denkt</li>
        <li><strong>Schäden fotografieren</strong> - aufgebrochene Türen, beschädigte Möbel etc.</li>
        <li><strong>Kaufbelege sammeln</strong> - aus E-Mails, Online-Shops, Garantiekarten</li>
        <li><strong>Wenn Widerspruch eingelegt wurde</strong>: prüfen, ob er im Protokoll vermerkt ist</li>
      </ul>
      <p>Wenn du die Daten erfasst hast, kannst du im Bereich „✉️ Briefe" das Anschreiben <strong>„Antrag auf Herausgabe (§ 111n StPO)"</strong> nutzen. Die Liste der Gegenstände wird automatisch eingebaut – mit allen Details, die du erfasst hast.</p>
      <p style="background:rgba(217, 119, 6, 0.08); padding:12px; border-radius:6px; font-size:13px;"><strong>⚖️ Wichtig:</strong> Diese App ist <strong>kein Ersatz für anwaltlichen Rat</strong>. Sie hilft dir, deine Daten zu organisieren und einen formal sauberen Antrag zu formulieren. Bei strittigen Fällen, drohender Einziehung oder Unklarheiten zur Rechtslage solltest du immer eine:n Strafverteidiger:in einschalten – die Staatsanwaltschaft selbst darf nicht rechtlich beraten (§ 6 Abs. 2 RDG).</p>
      <p style="font-size:13px; color:var(--text-soft);">Die Herausgabe richtet sich nach § 111n StPO. Im laufenden Verfahren ist eine Herausgabe in der Regel nur möglich, wenn die Voraussetzungen offenkundig sind (§ 111n Abs. 4 StPO). Sonst erfolgt die Herausgabe meist erst nach rechtskräftigem Verfahrensende.</p>

      <h2 style="color:var(--primary); font-size:18px; margin:18px 0 10px;">📄 Wie fülle ich die Dokumente aus?</h2>

        <li><strong>📎 Datei anhängen</strong> – aus Galerie / Dateien</li>

      </ul>
      <p>Beim Drucken kannst du wählen, ob die Belege als Zusatzseiten ans Dokument angehängt werden.</p>

      <h2 style="color:var(--primary); font-size:18px; margin:18px 0 10px;">📊 Heute-Übersicht</h2>

      <h2 style="color:var(--primary); font-size:18px; margin:18px 0 10px;">🔒 PIN-Schutz</h2>
      <p>Optional: Mit „🔓 PIN einrichten" kannst du eine 4–8-stellige PIN setzen. Beim Öffnen der App muss sie eingegeben werden. Während des Setups wirst du auch nach einer <strong>Sicherheitsfrage</strong> gefragt – falls du die PIN vergisst, kannst du sie über deine Antwort wiederherstellen.</p>
      <p style="background:rgba(217, 119, 6, 0.08); padding:10px; border-radius:6px; font-size:13px;"><strong>⚠ Wichtig:</strong> Diese PIN ist ein einfacher Sichtschutz, <strong>kein</strong> kryptographischer Schutz. Wer technisch versiert ist, kann den Hash auslesen. Speichere wirklich sensible Belege zusätzlich verschlüsselt. Wenn du PIN UND Sicherheitsantwort vergisst, kommst du nur durch Browser-Daten-Löschen wieder rein – <em>verlierst dann aber alle Daten</em>! Daher: regelmäßig sichern.</p>

      <h2 style="color:var(--primary); font-size:18px; margin:18px 0 10px;">💾 Wichtig: regelmäßig sichern!</h2>
      <p>Deine Daten liegen <strong>nur</strong> in diesem Browser auf diesem Gerät. Wenn du den Browser-Cache leerst, das Gerät verlierst, oder iOS den App-Speicher aufräumt (passiert manchmal nach längerer Nichtnutzung), sind sie weg. Daher: <strong>regelmäßig „💾 Sichern"</strong> drücken und die JSON-Datei in iCloud Drive, Google Drive oder per E-Mail an dich selbst speichern.</p>

      <h2 style="color:var(--primary); font-size:18px; margin:18px 0 10px;">⏰ Stichtag-Erinnerungen</h2>
      <p>Bei Schadenswiedergutmachung und Sozialstunden zeigen die Karten automatisch an, wie viele Tage bis zur Frist sind. Bei weniger als 30 Tagen wird's gelb, bei Überschreitung rot.</p>

      <h2 style="color:var(--primary); font-size:18px; margin:18px 0 10px;">⌨️ Auto-Format-Tricks</h2>
      <ul style="padding-left:20px;">
        <li><strong>Datum</strong>: <code>15032025</code> tippen → wird automatisch zu <code>15.03.2025</code></li>
        <li><strong>Uhrzeit</strong>: <code>0900</code> → <code>09:00</code></li>

      <h2 style="color:var(--primary); font-size:18px; margin:18px 0 10px;">✉️ Briefe & Anträge</h2>

      <h2 style="color:var(--primary); font-size:18px; margin:18px 0 10px;">📤 Dokumente versenden – mit Belegen!</h2>
      <p>In der Druckansicht jedes Dokuments findest du je nach Gerät <strong>verschiedene Versand-Optionen</strong>:</p>
      <ul style="padding-left:20px;">

      <h2 style="color:var(--primary); font-size:18px; margin:18px 0 10px;">✍️ Bestätigungen / Unterschriften – drei Wege</h2>
      <p>Bei <strong>Sozialstunden, Therapie, Schadenswiedergutmachung und BH-Terminen</strong> kannst du Bestätigungen auf drei Wegen einsammeln – ganz wie es der Einrichtung, Therapeut:in oder Geschädigten am liebsten ist:</p>

// === APP-URL TEILEN / QR-CODE ===
function getCurrentAppUrl() {
  if (typeof window === 'undefined' || !window.location) return 'https://123ichbinmitdabei.github.io/bewaehrungshilfe/';
  // Strip hash and query, but keep path
  return window.location.href.split('#')[0].split('?')[0];
}
function copyAppUrl() {
  const url = getCurrentAppUrl();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(() => showSaveToast("Link kopiert"));
  } else {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = url;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showSaveToast("Link kopiert"); }
    catch (e) { alert("Konnte nicht kopieren. Markiere und kopiere den Link manuell:\n\n" + url); }
    document.body.removeChild(ta);
  }
}
async function shareAppUrl() {
  const url = getCurrentAppUrl();
  if (navigator.share) {
    try {
      await navigator.share({
        title: 'Bewährungshilfe-Assistent',
        text: 'Eine App zur Vorbereitung von Bewährungshilfe-Terminen',
        url: url
      });
    } catch (e) {
      if (e.name !== 'AbortError') copyAppUrl();
    }
  } else {
    copyAppUrl();
  }
}
function generateQrCode() {
  const url = getCurrentAppUrl();
  const container = document.getElementById('qr-code-container');
  if (!container) return;
  if (container.style.display !== 'none' && container.innerHTML.includes('img')) {
    container.style.display = 'none';
    container.innerHTML = '';
    return;
  }
  container.style.display = 'block';
  // QR via api.qrserver.com - free service, no tracking
  container.innerHTML = `<div style="padding: 14px; background: white; border-radius: 10px; display: inline-block;">
    <div style="font-size:11px; color:#666; margin-bottom:8px;" id="qr-loading">Lade QR-Code...</div>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=10&data=${encodeURIComponent(url)}"
      alt="QR-Code"
      style="width:240px; height:240px; display:block; max-width:100%;"
      onload="document.getElementById('qr-loading').style.display='none';"
      onerror="this.parentElement.innerHTML='<div style=&quot;color:#dc2626; padding:14px; font-size:13px;&quot;>QR-Code konnte nicht geladen werden. Pr&uuml;fe deine Internetverbindung oder kopiere den Link manuell.</div>';" />
    <div style="font-size:11px; color:#666; margin-top:8px; text-align:center;">Mit Handy-Kamera scannen, um die App zu &ouml;ffnen</div>
  </div>`;
}

let activeAnschreiben = null;
function selectAnschreiben(key) { activeAnschreiben = key; render(); }
function copyAnschreibenToClipboard() {
  const ta = document.getElementById("anschreiben-textarea");
  if (!ta) return;
  ta.select();
  try {
    navigator.clipboard.writeText(ta.value).then(() => showSaveToast("In Zwischenablage kopiert"));
  } catch (e) {
    document.execCommand("copy");
    showSaveToast("In Zwischenablage kopiert");
  }
}
function downloadAnschreibenTxt() {
  const ta = document.getElementById("anschreiben-textarea");
  if (!ta) return;
  const tpl = ANSCHREIBEN_TEMPLATES[activeAnschreiben];
  const blob = new Blob([ta.value], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const safeName = (state.shared.name || "").replace(/[^a-zA-Z0-9äöüÄÖÜß_-]/g, "_");
  a.href = url; a.download = `Anschreiben_${tpl.title.replace(/[^a-zA-Z0-9äöüÄÖÜß_-]/g, "_")}${safeName ? "_" + safeName : ""}_${todayISO()}.txt`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function printAnschreiben() {
  const ta = document.getElementById("anschreiben-textarea");
  if (!ta) return;
  const text = ta.value;
  const tpl = ANSCHREIBEN_TEMPLATES[activeAnschreiben];
  const win = window.open("", "_blank");
  win.document.write(`<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><title>${esc(tpl.title)}</title><style>body{font-family: 'Times New Roman', serif; max-width: 17cm; margin: 2cm auto; line-height: 1.6; white-space: pre-wrap; font-size: 12pt;} @media print { body { margin: 1.5cm; } }</style></head><body>${esc(text)}</body></html>`);
  win.document.close();
  setTimeout(() => win.print(), 300);
}

  const totalSec = doc.sections.length;

  if (sec.type === "review") body = renderReview(doc);
  else if (sec.type === "info") body = renderFieldsSection(sec, "info");

  else if (sec.type === "freetext") body = renderFieldsSection(sec, "freetext");
  else if (sec.type === "rows") body = renderRowsSection(sec);

function renderFieldsSection(sec, type) {
  let html = "";
  if (type === "money") {
    const t = totalsBySide();
    const hhPart = t.einHH > 0 ? ` (+ ${formatMoney(t.einHH)} weitere Haushaltsmitglieder)` : "";
    html += `<div class="info-box">Aktuell: <strong>${formatMoney(t.ein)}</strong> deine Einnahmen${hhPart} · <strong>${formatMoney(t.aus)}</strong> Ausgaben → Saldo <strong style="color:${t.saldo >= 0 ? 'var(--accent)' : 'var(--danger)'}">${formatMoney(t.saldo)}</strong></div>`;
  }
  sec.fields.forEach(f => {
    const a = getAnswer(sec.id, f.id);
    const skipped = isSkipped(a);
    const value = valueOf(a);
    const isText = f.type === "text" || f.type === "date" || (!f.type && type === "info");
    const isArea = f.type === "textarea";
    const inputCls = (skipped ? "skipped" : "") + (isText ? " text-field" : "");
    const inputType = f.type === "date" ? "date" : "text";
    const placeholder = type === "money" ? "0,00" : "";
    // Spellcheck: on for text/textarea (uses browser's German dictionary via <html lang="de">),
    // off for money fields (would falsely flag numbers) and date fields (no need).
    const isMoney = type === "money";
    const isDate = f.type === "date";
    const spellAttrs = isMoney || isDate
      ? `spellcheck="false" inputmode="${isMoney ? "decimal" : "text"}"`
      : `spellcheck="true" lang="de" autocapitalize="sentences"`;
    const inputHtml = isArea
      ? `<textarea data-fkey="${sec.id}.${f.id}" class="${inputCls}" rows="6" style="width:100%; min-height:140px; resize:vertical;" ${spellAttrs} ${skipped ? "disabled" : ""}>${esc(value)}</textarea>`
      : `<input data-fkey="${sec.id}.${f.id}" type="${inputType}" class="${inputCls}" value="${esc(value)}" placeholder="${placeholder}" ${spellAttrs} ${skipped ? "disabled" : ""} />`;
    const currency = type === "money" ? `<span class="currency">€</span>` : "";
    html += `
      <div class="field ${skipped ? 'skipped' : ''}">
        <label>${esc(f.label)}${f.shared ? ' <span title="Wird in allen Dokumenten geteilt" style="color:var(--primary); font-size:11px;">🔗</span>' : ''}</label>
        <div class="field-input-wrap">
          ${inputHtml}${currency}
          <button class="skip-btn ${skipped ? 'active' : ''}" onclick="toggleSkip('${sec.id}','${f.id}')">${skipped ? '↶ Doch eintragen' : '✕ Nicht zutreffend'}</button>
        </div>
      </div>`;
  });
  return html;
}

function renderRowsSection(sec) {
  const rows = getRows(sec.id);
  const searchTerm = getRowSearch(sec.id);
  // Show search bar if there are 4+ rows
  let html = "";
  if (rows.length >= 4) {
    const matchCount = rows.filter(r => rowMatchesSearch(r, searchTerm)).length;
    html += `
      <div class="row-search">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Einträge durchsuchen..." value="${esc(searchTerm)}"
          oninput="setRowSearch('${sec.id}', this.value); applySearchFilter('${sec.id}', this.value); updateSearchInfo('${sec.id}');" />
        ${searchTerm ? `<button class="clear-search" onclick="setRowSearch('${sec.id}', ''); render();" title="Suche zurücksetzen">✕</button>` : ""}
      </div>
      ${searchTerm ? `<div class="row-search-info" id="search-info-${sec.id}">${matchCount} von ${rows.length} Einträgen passen</div>` : ""}
    `;
  }
  html += `<div class="rows-section">`;
  if (rows.length === 0) {
    html += `<div style="text-align:center; padding:30px; color:var(--text-soft); font-size:14px;">Noch keine Einträge. Klick unten auf „Eintrag hinzufügen“ um den ersten zu erstellen.</div>`;
  }
  rows.forEach((row, idx) => {
    const visible = rowMatchesSearch(row, searchTerm);
    let cols = "";
    sec.columns.forEach(col => {
      // Disable spellcheck for clearly numeric/date columns
      const numericLike = /^(betrag|datum|von|bis|uhrzeit|dauer|pause|stunden)$/.test(col.id);
      const spellAttrs = numericLike
        ? `spellcheck="false"`
        : `spellcheck="true" lang="de" autocapitalize="sentences"`;
      const isTextarea = col.type === "textarea";
      const fieldClass = isTextarea ? "field-mini field-mini-wide" : "field-mini";
      const inputEl = isTextarea
        ? `<textarea data-rowkey="${sec.id}|${idx}|${col.id}" rows="2" placeholder="${esc(col.placeholder || "")}" ${spellAttrs}>${esc(row[col.id] || "")}</textarea>`
        : `<input data-rowkey="${sec.id}|${idx}|${col.id}" type="text" value="${esc(row[col.id] || "")}" placeholder="${esc(col.placeholder || "")}" ${spellAttrs} />`;
      cols += `
        <div class="${fieldClass}">
          <label>${esc(col.label)}</label>
          ${inputEl}
        </div>`;
    });
    let pastMarker = "";
    if (row.datum && isDateInPast(row.datum)) {
      // Show status if available (BH-Termine has 'status' column)
      const status = (row.status || "").toLowerCase();
      if (status.includes("wahrgenommen")) {
        pastMarker = `<span class="past-marker attended">✓ wahrgenommen</span>`;
      } else if (status.includes("abgesagt") || status.includes("nicht")) {
        pastMarker = `<span class="past-marker cancelled">✕ abgesagt</span>`;
      } else {
        pastMarker = `<span class="past-marker">vergangen</span>`;
      }
    }
    let attachmentsHtml = "";
    if (sec.hasAttachments) {
      const atts = getAttachments(sec.id, idx);
      let attList = "";
      atts.forEach(att => {
        const sizeKb = (att.size / 1024).toFixed(0);
        const preview = att.type === "image"
          ? `<img src="${att.dataUrl}" alt="${esc(att.name)}" onclick="viewAttachment('${sec.id}', ${idx}, '${att.id}')" />`
          : `<div class="pdf-icon" onclick="viewAttachment('${sec.id}', ${idx}, '${att.id}')" style="cursor:pointer">📄</div>`;
        attList += `
          <div class="attachment-item">
            ${preview}
            <div class="name" title="${esc(att.name)}">${esc(att.name)}</div>
            <div class="size">${sizeKb} KB</div>
            <div style="display:flex; gap:2px; margin-top:2px;">
              <button class="att-action-btn" onclick="downloadAttachment('${sec.id}', ${idx}, '${att.id}')" title="Beleg runterladen">⬇</button>
              <button class="att-action-btn" onclick="shareAttachment('${sec.id}', ${idx}, '${att.id}')" title="Beleg teilen / per Mail senden">📤</button>
            </div>
            <button class="delete" onclick="deleteAttachment('${sec.id}', ${idx}, '${att.id}')" title="Beleg entfernen">✕</button>
          </div>`;
      });
      attachmentsHtml = `
        <div class="attachments-area">
          <div class="attachment-list">${attList}</div>
          <div style="display:flex; gap:6px; flex-wrap:wrap;">
            <label class="attach-upload-btn">
              📎 Datei anhängen
              <input type="file" accept="image/*,application/pdf" multiple style="display:none" onchange="handleAttachmentUpload('${sec.id}', ${idx}, this.files); this.value='';" />
            </label>
            <label class="attach-upload-btn">
              📷 Foto aufnehmen
              <input type="file" accept="image/*" capture="environment" style="display:none" onchange="handleAttachmentUpload('${sec.id}', ${idx}, this.files); this.value='';" />
            </label>
          </div>
        </div>`;
    }
    let signatureHtml = "";
    if (sec.hasRowSignature) {
      const docId = state.activeDocId;
      const rowSig = getRowSignature(docId, sec.id, idx);
      if (rowSig) {
        signatureHtml = `
          <div class="attachments-area" style="background:transparent; padding:6px 0;">
            <div class="sig-row-mini">
              <img src="${rowSig.dataUrl}" alt="Unterschrift">
              <div>
                ${rowSig.signerName ? `<strong style="font-size:12px;">${esc(rowSig.signerName)}</strong><br>` : ""}
                <span class="sig-row-mini-meta">${esc(fmtSigTimestamp(rowSig.timestamp))}</span>
              </div>
              <button class="sig-row-btn" onclick="removeRowSignature('${docId}', '${sec.id}', ${idx})">✕ Unterschrift löschen</button>
            </div>
          </div>`;
      } else {
        const rowDateLabel = row.datum ? "vom " + row.datum : "Eintrag #" + (idx + 1);
        const rowOptsId = _registerSigOpts({
          docId, sectionId: sec.id, rowIdx: idx,
          title: "Unterschrift " + rowDateLabel,
          subtitle: "Bitte Name eintragen und unterschreiben.",
          defaultName: ""
        });
        signatureHtml = `
          <div class="attachments-area" style="background:transparent; padding:6px 0;">
            <button class="sig-row-btn" onclick="dispatchSignRow('${rowOptsId}')">✍️ Diese Zeile unterzeichnen lassen</button>
          </div>`;
      }
    }
    html += `
      <div class="row-card${visible ? '' : ' search-hidden'}">
        <div class="row-num">#${idx + 1}${pastMarker}</div>
        <div class="row-grid">${cols}</div>
        ${attachmentsHtml}
        ${signatureHtml}
        <div class="row-actions">
          <button class="row-delete" onclick="deleteRow('${sec.id}', ${idx})">🗑 Eintrag entfernen</button>
        </div>
      </div>`;
  });
  html += `<button class="add-row-btn" onclick="addRow('${sec.id}')">+ Eintrag hinzufügen</button>`;
  html += `</div>`;
  return html;
}

function renderCheckboxSection(sec) {

function renderReview(doc) {
  let html = `
    <div style="padding:16px; background:var(--bg); border-radius:10px; margin-bottom:16px; font-size:14px;">
      <strong>Geschafft!</strong> Hier siehst du, was du eingetragen hast. Wenn alles passt, klick unten auf „Vorschau & Drucken“ oder „Word-Dokument erstellen“.
    </div>
  `;
  if (doc.id === "ear") {
    const t = totalsBySide();
    const hasHH = t.einHH > 0;
    if (hasHH) {
      html += `
        <div class="summary-card" style="grid-template-columns: repeat(4, 1fr);">
          <div class="summary-item"><div class="label">Deine Einnahmen</div><div class="value">${formatMoney(t.ein)}</div></div>
          <div class="summary-item"><div class="label">Haushalt weitere</div><div class="value">${formatMoney(t.einHH)}</div></div>
          <div class="summary-item"><div class="label">Ausgaben</div><div class="value">${formatMoney(t.aus)}</div></div>
          <div class="summary-item saldo"><div class="label">Saldo Haushalt</div><div class="value ${t.saldo >= 0 ? 'positive' : 'negative'}">${formatMoney(t.saldo)}</div></div>
        </div>
      `;
    } else {
      html += `
        <div class="summary-card">
          <div class="summary-item"><div class="label">Einnahmen</div><div class="value">${formatMoney(t.ein)}</div></div>
          <div class="summary-item"><div class="label">Ausgaben</div><div class="value">${formatMoney(t.aus)}</div></div>
          <div class="summary-item saldo"><div class="label">Saldo</div><div class="value ${t.saldo >= 0 ? 'positive' : 'negative'}">${formatMoney(t.saldo)}</div></div>
        </div>
      `;
    }
  }
  // Per-section summary
  html += `<div class="review-list">`;
  doc.sections.forEach(sec => {
    if (sec.type === "review") return;
    let items = "";
    if (sec.type === "rows") {
      const rows = getRows(sec.id);
      if (rows.length === 0) return;
      rows.forEach((row, idx) => {
        const summary = sec.columns.map(c => row[c.id]).filter(v => v).slice(0, 3).join(" · ");
        items += `<div class="item"><span>Eintrag #${idx + 1}</span><span class="v">${esc(summary || "(leer)")}</span></div>`;
      });
    } else if (sec.type === "checkboxes") {
      const checks = getChecks(sec.id);
      const selected = sec.options.filter(o => checks[o]);
      if (selected.length === 0) return;
      selected.forEach(o => {
        items += `<div class="item"><span>✓</span><span class="v">${esc(o)}</span></div>`;
      });
    } else if (sec.fields) {
      sec.fields.forEach(f => {
        const a = getAnswer(sec.id, f.id);
        if (a === undefined) return;
        const skipped = isSkipped(a); const v = valueOf(a);
        if (!skipped && !v) return;
        items += `<div class="item ${skipped ? 'skipped' : ''}"><span>${esc(f.label)}</span><span class="v">${skipped ? "Nicht zutreffend" : esc(v)}</span></div>`;
      });
    }
    if (items) html += `<h4>${sec.icon} ${esc(sec.title)}</h4>${items}`;
  });
  html += `</div>`;
  html += `
    <div class="nav">
      <button class="btn btn-secondary" onclick="prev()">← Zurück</button>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn btn-success btn-large" onclick="openPreview()">👁 Vorschau & Drucken</button>

        ${doc.id === "uebersicht" ? "" : `<button class="btn btn-secondary btn-large" onclick="shareDocument('${doc.id}')" title="Dokument als Word-Datei direkt teilen / per Mail senden">📤 Teilen / per Mail</button>`}
        ${state.shared.bh_email && doc.id !== "uebersicht" ? `<button class="btn btn-secondary btn-large" onclick="emailDocument('${doc.id}')" title="Mail an Bewährungshelfer/in vorbereiten">📧 An BH mailen</button>` : ""}
      </div>
    </div>
  `;
  return html;
}

// Confirm before printing sensitive documents
function confirmAndPrint() {
  const id = state.activeDocId;
  const sensitiveTypes = ["thera", "schadens"];
  if (sensitiveTypes.includes(id)) {
    const msg = id === "thera"
      ? "Du druckst gleich ein Dokument mit sensiblen Gesundheitsdaten (Therapie-Informationen). Stelle sicher, dass es in die richtigen Hände kommt.\n\nFortfahren?"
      : "Du druckst gleich ein Dokument mit Finanz- und Auflage-Details. Achte beim Versand auf Vertraulichkeit.\n\nFortfahren?";
    if (!confirm(msg)) return;
  }
  window.print();
}

function countAllAttachments(docId) {
  const ds = state.docs[docId];
  if (!ds || !ds.attachments) return 0;
  let count = 0;
  Object.values(ds.attachments).forEach(secMap => {
    Object.values(secMap).forEach(arr => { if (Array.isArray(arr)) count += arr.length; });
  });
  return count;
}
function togglePrintAttachments() {
  state.printWithAttachments = !state.printWithAttachments;
  render();
}

function updateSaveIndicator() {
  const el = document.getElementById("saveInd");

  el.className = "save-indicator " + saveStatus;
  const t = document.getElementById("saveTxt");
  if (t) t.textContent = saveStatus === "saving" ? "Speichert..." : saveStatus === "saved" ? "Gespeichert" : "Fehler";

function attachListeners() {
  document.querySelectorAll("[data-fkey]").forEach(el => {
    const [sid, fid] = el.dataset.fkey.split(".");
    el.addEventListener("input", e => setAnswer(sid, fid, e.target.value));
  });
  document.querySelectorAll("[data-rowkey]").forEach(el => {
    const [sid, idx, col] = el.dataset.rowkey.split("|");
    el.addEventListener("input", e => {
      const rows = getRows(sid);
      if (!rows[idx]) rows[idx] = {};
      rows[idx][col] = e.target.value;
      setRows(sid, rows);
    });
  });
}

// === EXPORT / IMPORT ===
async function exportAllData() {
  const dump = {
    version: 2,
    appVersion: APP_VERSION,
    exportedAt: new Date().toISOString(),
    shared: state.shared,
    theme: state.theme,
    docs: state.docs,
  };
  const blob = new Blob([JSON.stringify(dump, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const stamp = todayISO();
  const userName = (state.shared.name || "").replace(/[^a-zA-Z0-9äöüÄÖÜß_-]/g, "_");
  a.href = url; a.download = `Bewaehrungshilfe-Daten_${userName ? userName + "_" : ""}${stamp}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showSaveToast("Backup gespeichert");
}

function triggerImport() {
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = ".json,application/json";
  inp.onchange = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!data || typeof data !== "object" || !data.docs) throw new Error("Ungültiges Format - das ist keine Bewährungshilfe-Datensicherung");
      // Version compatibility check
      const fileVer = data.version || 1;
      if (fileVer > 2) {
        if (!confirm(`Diese Sicherungsdatei wurde mit einer neueren Version der App erstellt (Version ${fileVer}, deine App: ${APP_VERSION}). Möglicherweise gehen dabei Daten verloren oder werden falsch eingelesen.\n\nTrotzdem fortfahren?`)) return;
      }
      if (!confirm("Achtung: Importieren überschreibt deine aktuellen Daten in diesem Browser. Fortfahren?")) return;
      // Merge each doc
      Object.keys(data.docs).forEach(docId => {
        if (DOCS[docId]) {
          state.docs[docId] = { ...state.docs[docId], ...data.docs[docId] };
        }
      });
      if (data.shared) state.shared = data.shared;
      if (data.theme === "dark" || data.theme === "light") { state.theme = data.theme; applyTheme(); }
      // Save everything
      for (const id of Object.keys(state.docs)) {
        if (DOCS[id]) await Storage.set(DOCS[id].storageKey, JSON.stringify(state.docs[id]));
      }
      await Storage.set(SHARED_STORAGE_KEY, JSON.stringify(state.shared));
      await Storage.set(THEME_STORAGE_KEY, state.theme);
      const exportedDate = data.exportedAt ? new Date(data.exportedAt).toLocaleDateString("de-DE") : "";
      alert(`Daten erfolgreich importiert!${exportedDate ? "\n\nSicherungsdatum: " + exportedDate : ""}`);
      render();
    } catch (err) {
      alert("Fehler beim Import: " + err.message);
    }
  };
  inp.click();
}
function goHome() { state.view = "home"; state.activeDocId = null; render(); window.scrollTo(0,0); }
function next() {
  const ds = getDocState();
  const total = DOCS[state.activeDocId].sections.length;
  if (ds.currentIdx < total - 1) { ds.currentIdx++; saveActiveDoc(); render(); window.scrollTo(0,0); }
}
function prev() {
  const ds = getDocState();
  if (ds.currentIdx > 0) { ds.currentIdx--; saveActiveDoc(); render(); window.scrollTo(0,0); }
}
function jumpTo(i) { getDocState().currentIdx = i; saveActiveDoc(); render(); window.scrollTo(0,0); }
function toggleSkip(secId, fId) {
  const ds = getDocState();
  const a = ds.answers[`${secId}.${fId}`];  // raw local, no shared fallback
  if (isSkipped(a)) {
    // Unskip - delete so shared fallback can kick in
    delete ds.answers[`${secId}.${fId}`];
  } else {
    ds.answers[`${secId}.${fId}`] = { skipped: true };
  }
  saveActiveDoc(); render();
}
function skipAll(secId) {
  const sec = DOCS[state.activeDocId].sections.find(s => s.id === secId);
  sec.fields.forEach(f => {
    const a = getAnswer(secId, f.id);
    if (!a || a === "") getDocState().answers[`${secId}.${f.id}`] = { skipped: true };
  });
  saveActiveDoc(); render();
}
function addRow(secId) {
  const rows = getRows(secId);
  rows.push({});
  setRows(secId, rows);
  render();
}
function deleteRow(secId, idx) {
  if (!confirm("Eintrag wirklich entfernen?")) return;
  const rows = getRows(secId);
  rows.splice(idx, 1);
  setRows(secId, rows);
  shiftAttachmentsAfterRowDelete(secId, idx);
  saveActiveDoc();
  render();
}
function toggleCheckOption(secId, optIdx) {
  const sec = DOCS[state.activeDocId].sections.find(s => s.id === secId);
  toggleCheck(secId, sec.options[optIdx]);
  render();
}
function openPreview() { state.view = "preview"; render(); window.scrollTo(0,0); }
function closePreview() { state.view = "wizard"; render(); window.scrollTo(0,0); }

// Render document-level signatures section for print (proband + counter-signer)
function renderPrintSignatures(docId, opts) {
  // opts: { counterRoleLabel, probandLabel, hideIfEmpty }
  opts = opts || {};
  const probandSig = getSignature(docId, "gesamt_proband");
  const counterSig = getSignature(docId, "gesamt");
  const counterRoleLabel = opts.counterRoleLabel || "Bestätigt durch";
  const probandLabel = opts.probandLabel || "Proband:in";
  const probandName = (state.shared && state.shared.name) || "";

  if (opts.hideIfEmpty && !probandSig && !counterSig) return "";

  const renderSlot = (sig, fallbackLabel, fallbackName) => {
    if (sig && sig.dataUrl) {
      const deviceStr = (sig.device && sig.device.userAgentShort) ? ` · ${esc(sig.device.userAgentShort)}` : "";
      return `
        <div class="print-sig-slot">
          <div class="print-sig-img-wrap">
            <img src="${sig.dataUrl}" alt="Unterschrift" class="print-sig-img">
          </div>
          <div class="print-sig-line"></div>
          <div class="print-sig-label">
            ${sig.signerName ? `<strong>${esc(sig.signerName)}</strong><br>` : (fallbackName ? `<strong>${esc(fallbackName)}</strong><br>` : "")}
            <span style="font-size:10px; color:#666;">Digital unterzeichnet am ${esc(fmtSigTimestamp(sig.timestamp))}${deviceStr}</span><br>
            <span style="font-size:11px;">${esc(fallbackLabel)}</span>
          </div>
        </div>`;
    }
    // Empty slot for handwritten signature
    return `
      <div class="print-sig-slot">
        <div class="print-sig-img-wrap"><!-- space for handwritten --></div>
        <div class="print-sig-line"></div>
        <div class="print-sig-label">
          ${fallbackName ? `<strong>${esc(fallbackName)}</strong><br>` : ""}
          <span style="font-size:11px;">${esc(fallbackLabel)}</span><br>
          <span style="font-size:10px; color:#888;">(Ort, Datum, Unterschrift)</span>
        </div>
      </div>`;
  };

  return `
    <div class="print-signatures">
      ${renderSlot(probandSig, probandLabel, probandName)}
      ${renderSlot(counterSig, counterRoleLabel, "")}
    </div>`;
}

// Render an inline mini-signature block for a row (used in Sozial/Schadens print tables)
function renderPrintRowSignature(docId, sectionId, rowIdx) {
  const sig = getRowSignature(docId, sectionId, rowIdx);
  if (!sig || !sig.dataUrl) return "";
  return `
    <div class="print-row-sig">
      <img src="${sig.dataUrl}" alt="Unterschrift">
      <div>
        ${sig.signerName ? `<div style="font-weight:600; font-size:9px;">${esc(sig.signerName)}</div>` : ""}
        <div style="font-size:8px; color:#666;">Digital ${esc(fmtSigTimestamp(sig.timestamp))}</div>
      </div>
    </div>`;
}

// Render a verification summary page listing all digital signatures with metadata
// Useful for someone receiving the print: they see at a glance which signatures
// were captured digitally, when, on what device, and can compare with the visible signatures.
function renderPrintVerificationFooter(docId) {
  const ds = state.docs[docId];
  if (!ds || !ds.signatures) return "";
  const sigs = ds.signatures;
  const entries = Object.keys(sigs).map(key => ({ key, sig: sigs[key] })).filter(e => e.sig && e.sig.dataUrl);
  if (entries.length === 0) return "";

  function describeKey(key) {
    if (key === "gesamt_proband") return "Gesamt-Unterschrift Proband:in";
    if (key === "gesamt") return "Gesamt-Unterschrift bestätigende Person";
    const m = key.match(/^row_([^_]+)_(\d+)$/);
    if (m) return `Zeile ${parseInt(m[2]) + 1} (${m[1]})`;
    return key;
  }

  let rows = "";
  entries.forEach((e, i) => {
    const sig = e.sig;
    const dev = sig.device || {};
    rows += `<tr>
      <td>${i + 1}</td>
      <td>${esc(describeKey(e.key))}</td>
      <td>${esc(sig.signerName || "(ohne Name)")}</td>
      <td>${esc(fmtSigTimestamp(sig.timestamp))}</td>
      <td style="font-size:9pt;">${esc((dev.userAgentShort || "") + (dev.timezone ? " · " + dev.timezone : ""))}</td>
    </tr>`;
  });

  return `
    <div class="pagebreak"></div>
    <div class="verification-footer">
      <h2>📋 Verifikation digitaler Unterschriften</h2>
      <p style="font-size:10pt; color:#555; margin-bottom:10pt;">
        Diese Übersicht zeigt alle in diesem Dokument enthaltenen digitalen Unterschriften zum Zeitpunkt des Ausdrucks. Jede Zeile dokumentiert, wann und auf welchem Gerät unterzeichnet wurde - vergleichbar mit dem Logbuch eines DHL-Paket-Tablets.
      </p>
      <table>
        <tr><th>Nr</th><th>Bereich</th><th>Unterzeichnet von</th><th>Zeitpunkt</th><th>Gerät / Zeitzone</th></tr>
        ${rows}
      </table>
      <p style="font-size:9pt; font-style:italic; color:#888; margin-top:10pt;">
        Diese Übersicht ist <strong>kein Beweismittel im Sinne einer qualifizierten elektronischen Signatur</strong> (eIDAS), sondern eine technische Dokumentation der erfassten Unterschriften zum Beweis-/Nachweiszweck im Alltag (vergleichbar einer Quittung).
      </p>
    </div>`;
}

function valOrSkipPrint(secId, fId) {
  const a = getAnswer(secId, fId);
  if (isSkipped(a)) return { skipped: true, value: "" };
  return { skipped: false, value: valueOf(a) };
}
// Filter out skipped pairs - they should not appear in the final document
function filterPairs(pairs) {
  return pairs.filter(p => !p[1].skipped);
}
function tdLabel(label, skipped) {
  return `<td class="label ${skipped ? "strike" : ""}">${esc(label)}</td>`;
}
function tdValue(val) { return `<td>${esc(val) || "&nbsp;"}</td>`; }
function tdEmpty() { return `<td>&nbsp;</td><td>&nbsp;</td>`; }

function renderPrintEAR() {
  const ans = (s, f) => valOrSkipPrint(s, f);
  const personalAll = [
    ["Name, Vorname", ans("personal","name")], ["Geburtsdatum", ans("personal","geburtsdatum")],
    ["Anschrift", ans("personal","anschrift")], ["Telefon", ans("personal","telefon")],
    ["E-Mail", ans("personal","email")], ["Familienstand", ans("personal","familienstand")],
    ["Personen im Haushalt", ans("personal","haushalt")], ["Davon unterhaltspflichtige Kinder", ans("personal","kinder")],
    ["Aktenzeichen Bewährungshilfe", ans("personal","aktenzeichen")], ["Bewährungshelfer/in", ans("personal","bewaehrungshelfer")],
    ["Abrechnungszeitraum", ans("personal","zeitraum")], ["Erstellt am", ans("personal","erstellt")],
  ];
  const personal = filterPairs(personalAll);
  let infoTable = `<table>`;
  if (personal.length === 0) {
    infoTable += `<tr><td>&nbsp;</td></tr>`;
  } else {
    for (let i = 0; i < personal.length; i += 2) {
      const L = personal[i], R = personal[i+1];
      if (R) {
        infoTable += `<tr>${tdLabel(L[0], false)}${tdValue(L[1].value)}${tdLabel(R[0], false)}${tdValue(R[1].value)}</tr>`;
      } else {
        infoTable += `<tr>${tdLabel(L[0], false)}${tdValue(L[1].value)}<td colspan="2">&nbsp;</td></tr>`;
      }
    }
  }
  infoTable += `</table>`;

  function moneyTable(groups, sumLabel) {
    let html = `<table><tr><th style="width:70%">Bezeichnung</th><th>Betrag (EUR)</th></tr>`;
    let sum = 0;
    let anyShown = false;
    groups.forEach(grp => {
      const sec = DOCS.ear.sections.find(s => s.id === grp.id);
      // Collect rows that should be visible (have a value, not skipped)
      const visibleFields = [];
      sec.fields.forEach(f => {
        const a = getAnswer(grp.id, f.id);
        const skipped = isSkipped(a);
        const v = valueOf(a);
        if (!skipped && v) {
          const n = parseMoney(v);
          sum += n;
          visibleFields.push({ label: f.label, value: moneyOnly(n) });
        }
      });
      if (visibleFields.length === 0) return; // skip empty subgroup entirely
      anyShown = true;
      html += `<tr><td class="subhead" colspan="2">${esc(grp.title)}</td></tr>`;
      visibleFields.forEach(f => {
        html += `<tr><td>${esc(f.label)}</td><td>${f.value}</td></tr>`;
      });
    });
    if (!anyShown) {
      html += `<tr><td colspan="2" style="text-align:center; color:#888; font-style:italic;">(keine Einträge)</td></tr>`;
    }
    html += `<tr><td class="sum">${sumLabel}</td><td class="sum">${moneyOnly(sum)}</td></tr></table>`;
    return { html, sum };
  }

  const einGroups = [
    { id: "arbeit", title: "ARBEITSEINKOMMEN" },
    { id: "sozial", title: "SOZIALLEISTUNGEN" },
    { id: "familie_ein", title: "FAMILIENLEISTUNGEN" },
    { id: "renten", title: "RENTEN / VERSORGUNG" },
    { id: "sonst_ein", title: "SONSTIGE EINNAHMEN" },
  ];
  const ausGroups = [
    { id: "wohnen", title: "WOHNEN" }, { id: "vers", title: "VERSICHERUNGEN" },
    { id: "mob", title: "MOBILITÄT" }, { id: "tk", title: "TELEKOMMUNIKATION & MEDIEN" },
    { id: "leben", title: "LEBENSHALTUNG" }, { id: "gesundheit", title: "GESUNDHEIT" },
    { id: "familie_aus", title: "FAMILIE / KINDER" }, { id: "schulden", title: "SCHULDEN / VERPFLICHTUNGEN" },
    { id: "justiz", title: "BEWÄHRUNGSAUFLAGEN / JUSTIZ" }, { id: "freizeit", title: "FREIZEIT / SONSTIGES" },
  ];
  const einR = moneyTable(einGroups, "DEINE EINNAHMEN GESAMT");
  const ausR = moneyTable(ausGroups, "GESAMTAUSGABEN HAUSHALT");

  // Household members' income table
  const hhRows = (getDocState().rows && getDocState().rows.haushalt_ein) || [];
  const hhFiltered = hhRows.filter(r => (r.name || r.beziehung || r.art || r.betrag));
  let hhSum = 0;
  let hhTable = "";
  if (hhFiltered.length > 0) {
    hhTable = `<table><tr><th>Name</th><th>Beziehung</th><th>Art der Einnahme</th><th>Monatlich (EUR)</th></tr>`;
    hhFiltered.forEach(r => {
      const n = parseMoney(r.betrag || "");
      hhSum += n;
      hhTable += `<tr><td>${esc(r.name || "")}</td><td>${esc(r.beziehung || "")}</td><td>${esc(r.art || "")}</td><td>${r.betrag ? moneyOnly(n) : ""}</td></tr>`;
    });
    hhTable += `<tr><td class="sum" colspan="3">Einnahmen weiterer Haushaltsmitglieder gesamt</td><td class="sum">${moneyOnly(hhSum)}</td></tr></table>`;
  }
  const totalEin = einR.sum + hhSum;
  const saldo = totalEin - ausR.sum;

  const note = ans("anmerkung", "notes");
  let noteSection = "";
  if (!note.skipped && note.value) {
    const noteHtml = note.value.split("\n").map(l => `<p>${esc(l) || "&nbsp;"}</p>`).join("");
    noteSection = `<h2>${hhFiltered.length > 0 ? "6" : "5"}. Anmerkungen / Erläuterungen</h2>${noteHtml}`;
  }

  // Build saldo table - different depending on whether household has entries
  let saldoTable;
  if (hhFiltered.length > 0) {
    saldoTable = `<table>
      <tr><th style="width:70%">Position</th><th>Betrag (EUR)</th></tr>
      <tr><td>Deine Einnahmen</td><td>${moneyOnly(einR.sum)}</td></tr>
      <tr><td>Einnahmen weiterer Haushaltsmitglieder</td><td>${moneyOnly(hhSum)}</td></tr>
      <tr><td><strong>Gesamteinnahmen Haushalt</strong></td><td><strong>${moneyOnly(totalEin)}</strong></td></tr>
      <tr><td>Gesamtausgaben Haushalt</td><td>${moneyOnly(ausR.sum)}</td></tr>
      <tr><td class="sum">ÜBERSCHUSS / FEHLBETRAG (Haushalt)</td><td class="sum" style="color:${saldo >= 0 ? '#5BA572' : '#dc2626'}">${moneyOnly(saldo)}</td></tr>
    </table>`;
  } else {
    saldoTable = `<table>
      <tr><th style="width:70%">Position</th><th>Betrag (EUR)</th></tr>
      <tr><td>Gesamteinnahmen</td><td>${moneyOnly(einR.sum)}</td></tr>
      <tr><td>Gesamtausgaben</td><td>${moneyOnly(ausR.sum)}</td></tr>
      <tr><td class="sum">ÜBERSCHUSS / FEHLBETRAG</td><td class="sum" style="color:${saldo >= 0 ? '#5BA572' : '#dc2626'}">${moneyOnly(saldo)}</td></tr>
    </table>`;
  }

  // Build sections with dynamic numbering
  const hhSection = hhFiltered.length > 0 ? `<h2>3. Einnahmen weiterer Haushaltsmitglieder</h2>${hhTable}<div class="pagebreak"></div>` : "";
  const ausNum = hhFiltered.length > 0 ? "4" : "3";
  const saldoNum = hhFiltered.length > 0 ? "5" : "4";

  return `
    <h1>Einnahmen-Ausgaben-Rechnung</h1>
    <div class="subtitle">für die Bewährungshilfe</div>
    <h2>1. Persönliche Angaben</h2>${infoTable}
    <h2>2. Deine Einnahmen</h2>${einR.html}
    <div class="pagebreak"></div>
    ${hhSection}
    <h2>${ausNum}. Ausgaben${hhFiltered.length > 0 ? " (Haushalt gesamt)" : ""}</h2>${ausR.html}
    <div class="pagebreak"></div>
    <h2>${saldoNum}. Zusammenfassung / Saldo</h2>
    ${saldoTable}
    ${noteSection}
    ${renderPrintSignatures("ear", { counterRoleLabel: "Bestätigung (optional)", probandLabel: "Eintragen durch (Proband:in)", hideIfEmpty: false })}
    <p style="font-size:8pt; font-style:italic; color:#666; margin-top:8pt;">Ich versichere, dass die vorstehenden Angaben vollständig und wahrheitsgemäß sind.</p>
  `;
}

function renderPrintZeit() {
  const ans = (s, f) => valOrSkipPrint(s, f);
  // Personal - filter out skipped
  const personalAll = [
    ["Name, Vorname", ans("personal","name")], ["Geburtsdatum", ans("personal","geburtsdatum")],
    ["Geburtsort", ans("personal","geburtsort")], ["Staatsangehörigkeit", ans("personal","staat")],
    ["Aktuelle Anschrift", ans("personal","anschrift")], ["Telefon / E-Mail", ans("personal","kontakt")],
    ["Aktenzeichen", ans("personal","aktenzeichen")], ["Bewährungshelfer/in", ans("personal","bewaehrungshelfer")],
    ["Erstellt am", ans("personal","erstellt")], ["Stand / Zeitraum", ans("personal","stand")],
  ];
  const personal = filterPairs(personalAll);
  let infoTable = `<table>`;
  if (personal.length === 0) {
    infoTable += `<tr><td>&nbsp;</td></tr>`;
  } else {
    for (let i = 0; i < personal.length; i += 2) {
      const L = personal[i], R = personal[i+1];
      if (R) {
        infoTable += `<tr>${tdLabel(L[0], false)}${tdValue(L[1].value)}${tdLabel(R[0], false)}${tdValue(R[1].value)}</tr>`;
      } else {
        infoTable += `<tr>${tdLabel(L[0], false)}${tdValue(L[1].value)}<td colspan="2">&nbsp;</td></tr>`;
      }
    }
  }
  infoTable += `</table>`;

  function rowsTable(secId) {
    const sec = DOCS.zeit.sections.find(s => s.id === secId);
    const rows = getRows(secId);
    // Filter out completely empty rows
    const nonEmpty = rows.filter(r => sec.columns.some(c => r[c.id] && r[c.id].trim()));
    if (nonEmpty.length === 0) return ""; // hide entire section if no entries
    let html = `<table><tr>${sec.columns.map(c => `<th>${esc(c.label)}</th>`).join("")}</tr>`;
    nonEmpty.forEach(r => {
      html += `<tr>${sec.columns.map(c => `<td>${esc(r[c.id] || "")}</td>`).join("")}</tr>`;
    });
    html += `</table>`;
    return html;
  }
  function sectionIfHasContent(num, title, secId) {
    const t = rowsTable(secId);
    return t ? `<h2>${num}. ${title}</h2>${t}` : "";
  }

  const note = ans("anmerkung", "notes");
  const noteSection = (!note.skipped && note.value)
    ? `<h2>10. Anmerkungen / Ergänzungen</h2>${note.value.split("\n").map(l => `<p>${esc(l) || "&nbsp;"}</p>`).join("")}`
    : "";

  // Build sections array - only those with content
  const parts = [];
  parts.push({ kind: "info", html: `<h2>1. Persönliche Angaben</h2>${infoTable}` });
  const dynSections = [
    ["Wohnsitze", "wohnungen"],
    ["Berufliche Tätigkeiten", "arbeit"],
    ["Schulischer und beruflicher Bildungsweg", "bildung"],
    ["Wichtige Lebensereignisse", "lebensereignisse"],
    ["Therapien und Beratungen", "therapie"],
    ["Maßnahmen und Aufenthalte", "massnahmen"],
    ["Justiz / Strafrechtliche Verfahren", "justiz"],
    ["Aktuelles Unterstützungssystem", "hilfen"],
  ];
  dynSections.forEach(([title, sid]) => {
    const t = rowsTable(sid);
    if (t) parts.push({ kind: "rows", html: `<h2>${parts.length + 1}. ${title}</h2>${t}` });
  });
  if (noteSection) parts.push({ kind: "note", html: `<h2>${parts.length + 1}. Anmerkungen / Ergänzungen</h2>${(!note.skipped && note.value) ? note.value.split("\n").map(l => `<p>${esc(l) || "&nbsp;"}</p>`).join("") : ""}` });

  // Insert page breaks every ~2 sections to avoid awkward layouts
  let body = "";
  parts.forEach((p, i) => {
    if (i > 0 && i % 2 === 0) body += `<div class="pagebreak"></div>`;
    body += p.html;
  });

  return `
    <h1>Zeitstrahl / Lebensverlauf</h1>
    <div class="subtitle">Strukturierte Übersicht für die Bewährungshilfe</div>
    ${body}
    ${renderPrintSignatures("zeit", { counterRoleLabel: "Bestätigung (optional)", probandLabel: "Eintragen durch (Proband:in)" })}
    <p style="font-size:8pt; font-style:italic; color:#666; margin-top:8pt;">Ich versichere, dass die vorstehenden Angaben nach bestem Wissen vollständig und wahrheitsgemäß sind.</p>
  `;
}
