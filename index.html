  } else {
    for (let i = 0; i < patient.length; i += 2) {
      const L = patient[i], R = patient[i+1];
      if (R) patTable += `<tr>${tdLabel(L[0], false)}${tdValue(L[1].value)}${tdLabel(R[0], false)}${tdValue(R[1].value)}</tr>`;
      else patTable += `<tr>${tdLabel(L[0], false)}${tdValue(L[1].value)}<td colspan="2">&nbsp;</td></tr>`;
    }
  }
  patTable += `</table>`;

  // Therapie info - filter skipped
  const therInfoAll = [
    ["Therapiebeginn", ans("therapie_info","beginn")], ["Geplantes Ende", ans("therapie_info","ende")],
    ["Verfahren / Methode", ans("therapie_info","methode")], ["Frequenz", ans("therapie_info","frequenz")],
    ["Dauer pro Sitzung", ans("therapie_info","dauer")], ["Setting", ans("therapie_info","setting")],
    ["Sitzungen bewilligt", ans("therapie_info","sitzungen")], ["Kostenträger", ans("therapie_info","kostentraeger")],
    ["Behandlungsanlass / -ziel", ans("therapie_info","anlass")],
  ];
  const therInfo = filterPairs(therInfoAll);
  let therTable = "";
  if (therInfo.length > 0) {
    therTable = `<table>`;
    for (let i = 0; i < therInfo.length; i += 2) {
      const L = therInfo[i], R = therInfo[i+1];
      if (R) therTable += `<tr>${tdLabel(L[0], false)}${tdValue(L[1].value)}${tdLabel(R[0], false)}${tdValue(R[1].value)}</tr>`;
      else therTable += `<tr>${tdLabel(L[0], false)}${tdValue(L[1].value)}<td colspan="2">&nbsp;</td></tr>`;
    }
    therTable += `</table>`;
  }

  // Therapieart - only show CHECKED options
  const therArt = DOCS.thera.sections.find(s => s.id === "therapieart");
  const therChecks = getChecks("therapieart");
  const checkedTherArt = therArt.options.filter(o => therChecks[o]);
  let therArtSection = "";
  if (checkedTherArt.length > 0) {
    let html = `<p style="font-size:9pt; margin-top:6pt;"><strong>Therapieformen:</strong></p><div class="checkbox-list">`;
    checkedTherArt.forEach(opt => { html += `<div class="item">☒ ${esc(opt)}</div>`; });
    html += `</div>`;
    therArtSection = html;
  }

  // Termine - more rows for multiple sessions on one sheet
  const termineRows = getRows("termine");
  let termineHtml = `<table><tr><th>Datum</th><th>Uhrzeit</th><th>Dauer</th><th>Art</th><th>Wahr-<br>genommen</th><th>Notiz / Hausaufgabe</th><th>Unterschrift / Stempel</th></tr>`;
  // Show entered rows + extra empty rows for upcoming sessions, total at least 15
  const minRows = 15;
  const targetRows = Math.max(termineRows.length + 5, minRows);
  for (let i = 0; i < targetRows; i++) {
    const r = termineRows[i] || {};
    const rowSigHtml = (i < termineRows.length) ? renderPrintRowSignature("thera", "termine", i) : "";
    const notizText = esc(r.notiz || "").replace(/\n/g, "<br>");
    termineHtml += `<tr>
      <td>${esc(r.datum || "")}&nbsp;</td>
      <td>${esc(r.uhrzeit || "")}&nbsp;</td>
      <td>${esc(r.dauer || "")}&nbsp;</td>
      <td>${esc(r.art || "")}&nbsp;</td>
      <td style="text-align:center;">☐ ja  ☐ nein</td>
      <td style="font-size:9pt;">${notizText || "&nbsp;"}</td>
      <td style="height:32pt; vertical-align:middle;">${rowSigHtml || "&nbsp;"}</td>
    </tr>`;
  }
  termineHtml += `</table>`;

  // Schweigepflicht - only show CHECKED options
  const sp = DOCS.thera.sections.find(s => s.id === "schweigepflicht");
  const spChecks = getChecks("schweigepflicht");
  const checkedSp = sp.options.filter(o => spChecks[o]);
  const patName = ans("patient","name").value || "_____________________________________";
  let spSection = "";
  if (checkedSp.length > 0) {
    let html = `<p>Hiermit entbinde ich, ${esc(patName)} (Patient/in), die/den oben genannte/n Therapeut/in von der Schweigepflicht im folgenden Umfang gegenüber meiner/meinem Bewährungshelfer/in:</p><div class="checkbox-list" style="margin-top:6pt;">`;
    checkedSp.forEach(opt => { html += `<div class="item">☒ ${esc(opt)}</div>`; });
    html += `</div><p style="margin-top:6pt; font-size:8pt; font-style:italic; color:#666;">Diese Entbindung kann jederzeit schriftlich widerrufen werden.</p>`;
    spSection = html;
  }

  // Bemerkung - hide section heading entirely if no content
  const bem = ans("bemerkung", "notes");
  const bemSection = (!bem.skipped && bem.value)
    ? bem.value.split("\n").map(l => `<p>${esc(l) || "&nbsp;"}</p>`).join("")
    : "";

  // Build sections with dynamic numbering
  const sections = [];
  sections.push(`<h2>${sections.length + 1}. Patient/in</h2>${patTable}`);
  if (therTable || therArtSection) {
    sections.push(`<h2>${sections.length + 1}. Angaben zur Therapie</h2>${therTable}${therArtSection}`);
  }
  sections.push(`<div class="pagebreak"></div><h2>${sections.length + 1}. Übersicht der Termine / Sitzungen</h2>
    <p style="font-size:9pt; font-style:italic; color:#666; margin-bottom:4pt;">Die jeweilige Wahrnehmung wird durch Unterschrift / Stempel der/des Therapeut/in bestätigt.</p>
    ${termineHtml}`);
  if (bemSection) {
    sections.push(`<h2>${sections.length + 1}. Bemerkungen zum Therapieverlauf</h2>${bemSection}`);
  }
  if (spSection) {
    sections.push(`<h2>${sections.length + 1}. Schweigepflichtentbindung</h2>${spSection}`);
  }
  const therBestNum = sections.length + 1;
  sections.push(`<h2>${therBestNum}. Bestätigung & Unterschriften</h2>
    <p style="font-size:11pt;">Ich bestätige hiermit die in dieser Übersicht aufgeführten Angaben sowie die Wahrnehmung der oben angegebenen Termine.</p>
    ${renderPrintSignatures("thera", { counterRoleLabel: "Therapeut:in (Unterschrift / Stempel)", probandLabel: "Patient:in" })}`);
  sections.push(renderPrintVerificationFooter("thera"));

  return `
    ${briefkopf}
    <h1>Bestätigung der Therapieteilnahme</h1>
    <div class="subtitle">zur Vorlage bei der Bewährungshilfe</div>
    ${sections.join("\n")}
  `;
}

// ---- Schadenswiedergutmachung print ----
function renderPrintSchadens() {
  const ans = (s, f) => valOrSkipPrint(s, f);

  const personalAll = [
    ["Name, Vorname", ans("personal","name")], ["Geburtsdatum", ans("personal","geburtsdatum")],
    ["Anschrift", ans("personal","anschrift")], ["Telefon", ans("personal","telefon")],
    ["Aktenzeichen Bewährungshilfe", ans("personal","aktenzeichen")], ["Bewährungshelfer/in", ans("personal","bewaehrungshelfer")],
    ["Erstellt am", ans("personal","erstellt")], ["", { value: "", skipped: false }],
  ];
  const personal = filterPairs(personalAll.filter(p => p[0]));
  function pairsTable(pairs) {
    if (pairs.length === 0) return "";
    let t = `<table>`;
    for (let i=0; i<pairs.length; i+=2) {
      const L = pairs[i], R = pairs[i+1];
      if (R) t += `<tr>${tdLabel(L[0],false)}${tdValue(L[1].value)}${tdLabel(R[0],false)}${tdValue(R[1].value)}</tr>`;
      else t += `<tr>${tdLabel(L[0],false)}${tdValue(L[1].value)}<td colspan="2">&nbsp;</td></tr>`;
    }
    return t + `</table>`;
  }
  const personalTbl = pairsTable(personal);

  const auflageAll = [
    ["Gericht", ans("auflage","gericht")], ["Aktenzeichen Gericht", ans("auflage","az_gericht")],
    ["Datum Urteil/Beschluss", ans("auflage","urteil_datum")], ["Tat / Anlass", ans("auflage","tat")],
    ["Geschädigte/r", ans("auflage","geschaedigte")], ["Gesamtbetrag", ans("auflage","gesamt")],
    ["Monatliche Rate", ans("auflage","rate")], ["Beginn der Zahlungen", ans("auflage","beginn")],
    ["Frist / spätestes Ende", ans("auflage","frist")],
  ];
  const auflage = filterPairs(auflageAll);
  const auflageTbl = pairsTable(auflage);

  const empfaengerAll = [
    ["Empfänger Name", ans("empfaenger","name")], ["Anschrift", ans("empfaenger","anschrift")],
    ["IBAN", ans("empfaenger","iban")], ["BIC", ans("empfaenger","bic")],
    ["Bank", ans("empfaenger","bank")], ["Verwendungszweck/Kassenzeichen", ans("empfaenger","verwendung")],
  ];
  const empfaenger = filterPairs(empfaengerAll);
  const empfaengerTbl = pairsTable(empfaenger);

  // Zahlungen
  const zahlungenRows = (getDocState().rows && getDocState().rows.zahlungen) || [];
  const filtered = zahlungenRows.map((r, origIdx) => ({ ...r, _origIdx: origIdx })).filter(r => r.datum || r.betrag);
  let zahlungTbl = "", gezahlt = 0;
  if (filtered.length > 0) {
    zahlungTbl = `<table><tr><th>Nr</th><th>Datum</th><th>Betrag (EUR)</th><th>Beleg-Nr / Referenz</th><th>Art</th><th>Bemerkung</th><th>Beleg</th><th>Quittung Geschädigte:r</th></tr>`;
    filtered.forEach((r, displayIdx) => {
      const n = parseMoney(r.betrag || ""); gezahlt += n;
      const atts = getAttachments("zahlungen", r._origIdx);
      const attMark = atts.length > 0 ? `📎 ${atts.length}` : "";
      const rowSigHtml = renderPrintRowSignature("schadens", "zahlungen", r._origIdx);
      zahlungTbl += `<tr><td>${displayIdx + 1}</td><td>${esc(r.datum || "")}</td><td>${r.betrag ? moneyOnly(n) : ""}</td><td>${esc(r.beleg || "")}</td><td>${esc(r.art || "")}</td><td>${esc(r.bemerkung || "")}</td><td style="text-align:center;">${attMark}</td><td style="height:36pt; vertical-align:middle;">${rowSigHtml || "&nbsp;"}</td></tr>`;
    });
    zahlungTbl += `<tr><td class="sum" colspan="2">Summe</td><td class="sum">${moneyOnly(gezahlt)}</td><td class="sum" colspan="5">${filtered.length} Zahlung(en)</td></tr></table>`;
  } else {
    zahlungTbl = `<p style="font-style:italic; color:#888;">(noch keine Zahlungen erfasst)</p>`;
  }

  // Berechnung Restbetrag
  const gesamtVal = parseMoney(ans("auflage","gesamt").value || "");
  const rateVal = parseMoney(ans("auflage","rate").value || "");
  const rest = Math.max(0, gesamtVal - gezahlt);
  let progress = "";
  if (gesamtVal > 0) {
    const pct = Math.round((gezahlt / gesamtVal) * 100);
    let voraussichtlich = "";
    if (rateVal > 0 && rest > 0) {
      const monateNoch = Math.ceil(rest / rateVal);
      const ende = new Date();
      ende.setMonth(ende.getMonth() + monateNoch);
      voraussichtlich = `<tr><td>Voraussichtlich abgeschlossen</td><td>in ${monateNoch} Monat(en) (${ende.toLocaleDateString("de-DE", { month: "long", year: "numeric" })})</td></tr>`;
    }
    progress = `<table>
      <tr><th style="width:50%">Position</th><th>Wert</th></tr>
      <tr><td>Gesamtbetrag (laut Auflage)</td><td>${moneyOnly(gesamtVal)} €</td></tr>
      <tr><td>Bisher gezahlt</td><td>${moneyOnly(gezahlt)} €</td></tr>
      <tr><td>Fortschritt</td><td>${pct}%</td></tr>
      <tr><td class="sum">Noch offen</td><td class="sum" style="color:${rest === 0 ? '#5BA572' : '#d97706'}">${moneyOnly(rest)} €</td></tr>
      ${voraussichtlich}
    </table>`;
  }

  const note = ans("anmerkung", "notes");
  const noteSection = (!note.skipped && note.value)
    ? `<h2>Anmerkungen / Erläuterungen</h2>${note.value.split("\n").map(l => `<p>${esc(l) || "&nbsp;"}</p>`).join("")}`
    : "";

  // Build attachment pages if enabled
  let attachmentPages = "";
  if (state.printWithAttachments) {
    filtered.forEach((r, displayIdx) => {
      const atts = getAttachments("zahlungen", r._origIdx);
      atts.forEach((att, i) => {
        const caption = `Zahlung Nr. ${displayIdx + 1}${r.datum ? ` · ${esc(r.datum)}` : ""}${r.betrag ? ` · ${moneyOnly(parseMoney(r.betrag))} €` : ""} – Beleg ${i + 1}/${atts.length} (${esc(att.name)})`;
        if (att.type === "image") {
          attachmentPages += `<div class="attachment-page"><img src="${att.dataUrl}" alt="${esc(att.name)}" /><div class="attachment-caption">${caption}</div></div>`;
        } else {
          attachmentPages += `<div class="attachment-page"><div class="attachment-pdf-note">📄 PDF-Beleg: <strong>${esc(att.name)}</strong><br><span style="font-size:9pt;">PDF-Belege können nicht direkt eingebettet werden. Sie liegen separat vor und sind als Datei in der Datensicherung enthalten.</span></div><div class="attachment-caption">${caption}</div></div>`;
        }
      });
    });
  }

  return `
    <h1>Schadenswiedergutmachung / Geldauflage</h1>
    <div class="subtitle">Nachweis und Zahlungsverlauf</div>
    ${personalTbl ? `<h2>1. Persönliche Angaben</h2>${personalTbl}` : ""}
    ${auflageTbl ? `<h2>2. Auflage / Verurteilung</h2>${auflageTbl}` : ""}
    ${empfaengerTbl ? `<h2>3. Empfänger / Bankverbindung</h2>${empfaengerTbl}` : ""}
    <div class="pagebreak"></div>
    <h2>4. Zahlungsverlauf</h2>${zahlungTbl}
    ${progress ? `<h2>5. Fortschritt / Restbetrag</h2>${progress}` : ""}
    ${noteSection}
    ${renderPrintSignatures("schadens", { counterRoleLabel: "Empfangsbestätigung Geschädigte:r", probandLabel: "Bewährter / Bewährte" })}
    <p style="font-size:8pt; font-style:italic; color:#666; margin-top:8pt;">Belege (Überweisungsnachweise, Quittungen) sind diesem Nachweis ${state.printWithAttachments && filtered.some(r => getAttachments("zahlungen", r._origIdx).length > 0) ? "auf den folgenden Seiten" : "separat"} beigefügt.</p>
    ${renderPrintVerificationFooter("schadens")}
    ${attachmentPages}
  `;
}

// ---- Sozialstunden print ----
function renderPrintSozial() {
  const ans = (s, f) => valOrSkipPrint(s, f);
  function pairsTable(pairsAll) {
    const pairs = filterPairs(pairsAll.filter(p => p[0]));
    if (pairs.length === 0) return "";
    let t = `<table>`;
    for (let i=0; i<pairs.length; i+=2) {
      const L = pairs[i], R = pairs[i+1];
      if (R) t += `<tr>${tdLabel(L[0],false)}${tdValue(L[1].value)}${tdLabel(R[0],false)}${tdValue(R[1].value)}</tr>`;
      else t += `<tr>${tdLabel(L[0],false)}${tdValue(L[1].value)}<td colspan="2">&nbsp;</td></tr>`;
    }
    return t + `</table>`;
  }

  const personalTbl = pairsTable([
    ["Name, Vorname", ans("personal","name")], ["Geburtsdatum", ans("personal","geburtsdatum")],
    ["Anschrift", ans("personal","anschrift")], ["Telefon", ans("personal","telefon")],
    ["Aktenzeichen Bewährungshilfe", ans("personal","aktenzeichen")], ["Bewährungshelfer/in", ans("personal","bewaehrungshelfer")],
    ["Erstellt am", ans("personal","erstellt")], ["", { value: "", skipped: false }],
  ]);
  const auflageTbl = pairsTable([
    ["Gericht", ans("auflage","gericht")], ["Aktenzeichen Gericht", ans("auflage","az_gericht")],
    ["Datum Urteil", ans("auflage","urteil_datum")], ["Auflage Gesamtstunden", ans("auflage","stunden_gesamt")],
    ["Frist (spätestens bis)", ans("auflage","frist")], ["Art der Tätigkeit", ans("auflage","art")],
  ]);
  const einrichtungTbl = pairsTable([
    ["Name der Einrichtung", ans("einrichtung","name")], ["Anschrift", ans("einrichtung","anschrift")],
    ["Ansprechperson", ans("einrichtung","ansprech")], ["Telefon", ans("einrichtung","tel")],
    ["E-Mail", ans("einrichtung","email")], ["Tätigkeitsbereich", ans("einrichtung","taetigkeit")],
  ]);

  // Stunden table
  const stRows = (getDocState().rows && getDocState().rows.stunden) || [];
  const filtered = stRows.map((r, origIdx) => ({ ...r, _origIdx: origIdx })).filter(r => r.datum || r.von || r.stunden);
  let stTbl = "", stundenSum = 0;
  // Always show header + at least 15 rows for handwriting addition
  stTbl = `<table>
    <tr><th>Nr</th><th>Datum</th><th>von</th><th>bis</th><th>Pause<br>(Min)</th><th>Stunden<br>netto</th><th>Tätigkeit / Notiz</th><th>Beleg</th><th>Bestätigt durch (Unterschrift / Stempel)</th></tr>`;
  filtered.forEach((r, i) => {
    const h = parseMoney(r.stunden || "");
    stundenSum += h;
    const atts = getAttachments("stunden", r._origIdx);
    const attMark = atts.length > 0 ? `📎 ${atts.length}` : "";
    const rowSigHtml = renderPrintRowSignature("sozial", "stunden", r._origIdx);
    // Combine tätigkeit + notiz: tätigkeit fett, notiz darunter klein
    const taet = esc(r.taetigkeit || "");
    const notizText = esc(r.notiz || "").replace(/\n/g, "<br>");
    let taetCell = "";
    if (taet && notizText) {
      taetCell = `<strong>${taet}</strong><br><span style="font-size:8pt; color:#555;">${notizText}</span>`;
    } else if (taet) {
      taetCell = taet;
    } else if (notizText) {
      taetCell = `<span style="font-size:8pt; color:#555;">${notizText}</span>`;
    } else {
      taetCell = "&nbsp;";
    }
    stTbl += `<tr>
      <td>${i + 1}</td>
      <td>${esc(r.datum || "")}</td>
      <td>${esc(r.von || "")}</td>
      <td>${esc(r.bis || "")}</td>
      <td>${esc(r.pause || "")}</td>
      <td>${esc(r.stunden || "")}</td>
      <td>${taetCell}</td>
      <td style="text-align:center;">${attMark}</td>
      <td style="height:36pt; vertical-align:middle;">${rowSigHtml || "&nbsp;"}</td>
    </tr>`;
  });
  // Add empty rows for further entries
  const emptyNeeded = Math.max(15 - filtered.length, 5);
  for (let i = 0; i < emptyNeeded; i++) {
    stTbl += `<tr>
      <td>${filtered.length + i + 1}</td>
      <td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td>
      <td style="height:36pt;">&nbsp;</td>
    </tr>`;
  }
  stTbl += `<tr><td class="sum" colspan="5">Geleistete Stunden bisher</td><td class="sum">${stundenSum.toLocaleString("de-DE")} h</td><td class="sum" colspan="3"></td></tr></table>`;

  // Fortschritt
  const stundenGesamt = parseMoney(ans("auflage","stunden_gesamt").value || "");
  let progress = "";
  if (stundenGesamt > 0) {
    const rest = Math.max(0, stundenGesamt - stundenSum);
    const pct = Math.round((stundenSum / stundenGesamt) * 100);
    progress = `<table>
      <tr><th style="width:50%">Position</th><th>Stunden</th></tr>
      <tr><td>Auflage Gesamtstunden</td><td>${stundenGesamt.toLocaleString("de-DE")} h</td></tr>
      <tr><td>Geleistet bisher</td><td>${stundenSum.toLocaleString("de-DE")} h</td></tr>
      <tr><td>Fortschritt</td><td>${pct}%</td></tr>
      <tr><td class="sum">Noch zu leisten</td><td class="sum" style="color:${rest === 0 ? '#5BA572' : '#d97706'}">${rest.toLocaleString("de-DE")} h</td></tr>
    </table>`;
  }

  const note = ans("anmerkung", "notes");
  const noteSection = (!note.skipped && note.value)
    ? `<h2>Anmerkungen</h2>${note.value.split("\n").map(l => `<p>${esc(l) || "&nbsp;"}</p>`).join("")}`
    : "";

  // Build attachment pages if enabled
  let attachmentPages = "";
  if (state.printWithAttachments) {
    filtered.forEach((r, displayIdx) => {
      const atts = getAttachments("stunden", r._origIdx);
      atts.forEach((att, i) => {
        const caption = `Eintrag Nr. ${displayIdx + 1}${r.datum ? ` · ${esc(r.datum)}` : ""}${r.stunden ? ` · ${esc(r.stunden)} h` : ""} – Beleg ${i + 1}/${atts.length} (${esc(att.name)})`;
        if (att.type === "image") {
          attachmentPages += `<div class="attachment-page"><img src="${att.dataUrl}" alt="${esc(att.name)}" /><div class="attachment-caption">${caption}</div></div>`;
        } else {
          attachmentPages += `<div class="attachment-page"><div class="attachment-pdf-note">📄 PDF-Beleg: <strong>${esc(att.name)}</strong></div><div class="attachment-caption">${caption}</div></div>`;
        }
      });
    });
  }

  return `
    <h1>Sozialstunden-Nachweis</h1>
    <div class="subtitle">Gemeinnützige Arbeit / Bewährungsauflage</div>
    ${personalTbl ? `<h2>1. Persönliche Angaben</h2>${personalTbl}` : ""}
    ${auflageTbl ? `<h2>2. Auflage</h2>${auflageTbl}` : ""}
    ${einrichtungTbl ? `<h2>3. Einrichtung</h2>${einrichtungTbl}` : ""}
    <div class="pagebreak"></div>
    <h2>4. Stunden-Nachweis</h2>
    <p style="font-size:9pt; font-style:italic; color:#666; margin-bottom:4pt;">Jeder Einsatz wird durch Unterschrift / Stempel der Einrichtung bestätigt.</p>
    ${stTbl}
    ${progress ? `<div class="pagebreak"></div><h2>5. Fortschritt</h2>${progress}` : ""}
    ${noteSection}
    ${renderPrintSignatures("sozial", { counterRoleLabel: "Bestätigung durch Einrichtung", probandLabel: "Bewährter / Bewährte" })}
    ${renderPrintVerificationFooter("sozial")}
    ${attachmentPages}
  `;
}

// ---- Status-Übersicht (auto-generated from all other docs) ----
function renderPrintUebersicht() {
  // Resolve a shared field by checking state.shared first, then any doc that has it
  function getShared(field) {
    if (state.shared[field]) return state.shared[field];
    // Fallback: look across all docs that have this shared field
    for (const docId of Object.keys(SHARED_FIELD_MAP)) {
      const map = SHARED_FIELD_MAP[docId];
      for (const key of Object.keys(map)) {
        if (map[key] !== field) continue;
        const v = state.docs[docId]?.answers?.[key];
        if (v && typeof v === "string") return v;
      }
    }
    return "";
  }
  function getRowsFor(docId, secId) {
    return state.docs[docId]?.rows?.[secId] || [];
  }
  function getDocAnswer(docId, secId, fId) {
    const v = state.docs[docId]?.answers?.[`${secId}.${fId}`];
    if (v && typeof v === "object" && v.skipped) return "";
    return typeof v === "string" ? v : "";
  }
  function countDoneSections(docId) {
    const prev = state.activeDocId; state.activeDocId = docId;
    let done = 0, total = 0;
    DOCS[docId].sections.forEach(sec => {
      if (sec.type === "review") return;
      total++;
      const st = sectionStatus(sec);
      if (st === "done") done++;
    });
    state.activeDocId = prev;
    return { done, total };
  }

  const name = getShared("name");
  const geb = getShared("geburtsdatum");
  const adr = getShared("anschrift");
  const tel = getShared("telefon");
  const az = getShared("aktenzeichen");
  const bh = getShared("bewaehrungshelfer");

  // EAR snapshot
  let earBlock = "";
  const earState = countDoneSections("ear");
  if (earState.done > 0) {
    const prev = state.activeDocId; state.activeDocId = "ear";
    const t = totalsBySide();
    state.activeDocId = prev;
    earBlock = `<table>
      <tr><th colspan="2">📋 Einnahmen-Ausgaben-Rechnung</th></tr>
      <tr><td>Deine Einnahmen</td><td>${moneyOnly(t.ein)} €</td></tr>
      ${t.einHH > 0 ? `<tr><td>Einnahmen weiterer Haushaltsmitglieder</td><td>${moneyOnly(t.einHH)} €</td></tr>` : ""}
      <tr><td>Ausgaben Haushalt</td><td>${moneyOnly(t.aus)} €</td></tr>
      <tr><td class="sum">Saldo (monatlich)</td><td class="sum" style="color:${t.saldo >= 0 ? '#5BA572' : '#dc2626'}">${moneyOnly(t.saldo)} €</td></tr>
      <tr><td>Bearbeitungsstand</td><td>${earState.done} von ${earState.total} Abschnitten ausgefüllt</td></tr>
    </table>`;
  }

  // Zeitstrahl snapshot
  const zeitState = countDoneSections("zeit");
  let zeitBlock = "";
  if (zeitState.done > 0) {
    const totals = {
      wohnungen: getRowsFor("zeit","wohnungen").filter(r => Object.values(r).some(v => v)).length,
      arbeit: getRowsFor("zeit","arbeit").filter(r => Object.values(r).some(v => v)).length,
      bildung: getRowsFor("zeit","bildung").filter(r => Object.values(r).some(v => v)).length,
      therapie: getRowsFor("zeit","therapie").filter(r => Object.values(r).some(v => v)).length,
      massnahmen: getRowsFor("zeit","massnahmen").filter(r => Object.values(r).some(v => v)).length,
      hilfen: getRowsFor("zeit","hilfen").filter(r => Object.values(r).some(v => v)).length,
    };
    zeitBlock = `<table>
      <tr><th colspan="2">📅 Zeitstrahl / Lebensverlauf</th></tr>
      <tr><td>Erfasste Wohnsitze</td><td>${totals.wohnungen}</td></tr>
      <tr><td>Berufliche Tätigkeiten</td><td>${totals.arbeit}</td></tr>
      <tr><td>Bildungsstationen</td><td>${totals.bildung}</td></tr>
      <tr><td>Therapien / Beratungen</td><td>${totals.therapie}</td></tr>
      <tr><td>Maßnahmen / Aufenthalte</td><td>${totals.massnahmen}</td></tr>
      <tr><td>Aktuelle Hilfen</td><td>${totals.hilfen}</td></tr>
    </table>`;
  }

  // Therapie snapshot
  const theraState = countDoneSections("thera");
  let theraBlock = "";
  if (theraState.done > 0) {
    const beginn = getDocAnswer("thera","therapie_info","beginn");
    const methode = getDocAnswer("thera","therapie_info","methode");
    const frequenz = getDocAnswer("thera","therapie_info","frequenz");
    const termine = getRowsFor("thera","termine").filter(r => Object.values(r).some(v => v)).length;
    theraBlock = `<table>
      <tr><th colspan="2">🧠 Therapie-Bestätigung</th></tr>
      ${beginn ? `<tr><td>Therapiebeginn</td><td>${esc(beginn)}</td></tr>` : ""}
      ${methode ? `<tr><td>Verfahren</td><td>${esc(methode)}</td></tr>` : ""}
      ${frequenz ? `<tr><td>Frequenz</td><td>${esc(frequenz)}</td></tr>` : ""}
      <tr><td>Erfasste Termine</td><td>${termine}</td></tr>
    </table>`;
  }

  // Schadens snapshot
  const schadensState = countDoneSections("schadens");
  let schadensBlock = "";
  if (schadensState.done > 0) {
    const gesamt = parseMoney(getDocAnswer("schadens","auflage","gesamt"));
    const rate = parseMoney(getDocAnswer("schadens","auflage","rate"));
    const rows = getRowsFor("schadens","zahlungen").filter(r => r.datum || r.betrag);
    const gezahlt = rows.reduce((s, r) => s + parseMoney(r.betrag || ""), 0);
    const rest = Math.max(0, gesamt - gezahlt);
    const pct = gesamt > 0 ? Math.round((gezahlt / gesamt) * 100) : 0;
    schadensBlock = `<table>
      <tr><th colspan="2">💶 Schadenswiedergutmachung</th></tr>
      ${gesamt > 0 ? `<tr><td>Gesamtbetrag (Auflage)</td><td>${moneyOnly(gesamt)} €</td></tr>` : ""}
      ${rate > 0 ? `<tr><td>Monatliche Rate</td><td>${moneyOnly(rate)} €</td></tr>` : ""}
      <tr><td>Bisher gezahlt</td><td>${moneyOnly(gezahlt)} €${gesamt > 0 ? ` (${pct}%)` : ""}</td></tr>
      ${gesamt > 0 ? `<tr><td class="sum">Noch offen</td><td class="sum" style="color:${rest === 0 ? '#5BA572' : '#d97706'}">${moneyOnly(rest)} €</td></tr>` : ""}
      <tr><td>Erfasste Zahlungen</td><td>${rows.length}</td></tr>
    </table>`;
  }

  // Sozial snapshot
  const sozialState = countDoneSections("sozial");
  let sozialBlock = "";
  if (sozialState.done > 0) {
    const stundenGesamt = parseMoney(getDocAnswer("sozial","auflage","stunden_gesamt"));
    const rows = getRowsFor("sozial","stunden").filter(r => r.datum || r.stunden);
    const stundenSum = rows.reduce((s, r) => s + parseMoney(r.stunden || ""), 0);
    const rest = Math.max(0, stundenGesamt - stundenSum);
    const pct = stundenGesamt > 0 ? Math.round((stundenSum / stundenGesamt) * 100) : 0;
    sozialBlock = `<table>
      <tr><th colspan="2">🤝 Sozialstunden-Nachweis</th></tr>
      ${stundenGesamt > 0 ? `<tr><td>Auflage Gesamtstunden</td><td>${stundenGesamt.toLocaleString("de-DE")} h</td></tr>` : ""}
      <tr><td>Geleistet bisher</td><td>${stundenSum.toLocaleString("de-DE")} h${stundenGesamt > 0 ? ` (${pct}%)` : ""}</td></tr>
      ${stundenGesamt > 0 ? `<tr><td class="sum">Noch zu leisten</td><td class="sum" style="color:${rest === 0 ? '#5BA572' : '#d97706'}">${rest.toLocaleString("de-DE")} h</td></tr>` : ""}
      <tr><td>Erfasste Einsätze</td><td>${rows.length}</td></tr>
    </table>`;
  }

  // Asservate snapshot
  const asservateState = countDoneSections("asservate");
  let asservateBlock = "";
  if (asservateState.done > 0) {
    const azSta = getDocAnswer("asservate","verfahren","az_sta");
    const behoerde = getDocAnswer("asservate","verfahren","behoerde");
    const rows = getRowsFor("asservate","gegenstaende").filter(r => r.bezeichnung || r.seriennr || r.marke);
    const erhalten = rows.filter(r => (r.status || "").toLowerCase().includes("erhalten")).length;
    const offen = rows.filter(r => !(r.status || "").toLowerCase().includes("erhalten") && !(r.status || "").toLowerCase().includes("eingezogen")).length;
    asservateBlock = `<table>
      <tr><th colspan="2">📦 Beweismittel & Asservate</th></tr>
      ${azSta ? `<tr><td>Aktenzeichen StA</td><td>${esc(azSta)}</td></tr>` : ""}
      ${behoerde ? `<tr><td>Staatsanwaltschaft</td><td>${esc(behoerde)}</td></tr>` : ""}
      <tr><td>Erfasste Gegenstände</td><td>${rows.length}</td></tr>
      ${rows.length > 0 ? `<tr><td>Davon zurückerhalten</td><td>${erhalten}</td></tr>` : ""}
      ${rows.length > 0 ? `<tr><td class="sum">Noch ausstehend</td><td class="sum" style="color:${offen === 0 ? '#5BA572' : '#d97706'}">${offen}</td></tr>` : ""}
    </table>`;
  }

  // BH-Termine snapshot
  const bhtermineState = countDoneSections("bhtermine");
  let bhtermineBlock = "";
  if (bhtermineState.done > 0) {
    const naechsterDatum = getDocAnswer("bhtermine","naechster","datum");
    const naechsterUhrzeit = getDocAnswer("bhtermine","naechster","uhrzeit");
    const rows = getRowsFor("bhtermine","termine").filter(r => r.datum || r.themen);
    const wahrgenommen = rows.filter(r => (r.status || "").toLowerCase().includes("wahrgenommen")).length;
    const abgesagt = rows.filter(r => (r.status || "").toLowerCase().includes("abgesagt") || (r.status || "").toLowerCase().includes("nicht")).length;
    bhtermineBlock = `<table>
      <tr><th colspan="2">📞 BH-Termine & Gespräche</th></tr>
      <tr><td>Erfasste Termine</td><td>${rows.length}</td></tr>
      ${rows.length > 0 ? `<tr><td>Davon wahrgenommen</td><td>${wahrgenommen}</td></tr>` : ""}
      ${abgesagt > 0 ? `<tr><td>Davon abgesagt / nicht wahrgenommen</td><td style="color:#d97706">${abgesagt}</td></tr>` : ""}
      ${naechsterDatum ? `<tr><td class="sum">Nächster Termin</td><td class="sum">${esc(naechsterDatum)}${naechsterUhrzeit ? `, ${esc(naechsterUhrzeit)}` : ""}</td></tr>` : ""}
    </table>`;
  }

  // Verfahrenskosten snapshot
  const kostenState = countDoneSections("kosten");
  let kostenBlock = "";
  if (kostenState.done > 0) {
    const geldstrafeGesamt = parseMoney(getDocAnswer("kosten","geldstrafe","betrag_gesamt"));
    const gerichtskostenGesamt = parseMoney(getDocAnswer("kosten","gerichtskosten","betrag_gesamt"));
    const weitereRows = getRowsFor("kosten","weitere_kosten").filter(r => r.betrag);
    const weitereSum = weitereRows.reduce((s, r) => s + parseMoney(r.betrag || ""), 0);
    const zahlungenRows = getRowsFor("kosten","zahlungen").filter(r => r.betrag);
    const gezahlt = zahlungenRows.reduce((s, r) => s + parseMoney(r.betrag || ""), 0);
    const gesamt = geldstrafeGesamt + gerichtskostenGesamt + weitereSum;
    const rest = Math.max(0, gesamt - gezahlt);
    const pct = gesamt > 0 ? Math.round((gezahlt / gesamt) * 100) : 0;
    kostenBlock = `<table>
      <tr><th colspan="2">💸 Verfahrenskosten & Geldstrafe</th></tr>
      ${geldstrafeGesamt > 0 ? `<tr><td>Geldstrafe</td><td>${moneyOnly(geldstrafeGesamt)} €</td></tr>` : ""}
      ${gerichtskostenGesamt > 0 ? `<tr><td>Gerichtskosten</td><td>${moneyOnly(gerichtskostenGesamt)} €</td></tr>` : ""}
      ${weitereSum > 0 ? `<tr><td>Weitere Kosten (${weitereRows.length})</td><td>${moneyOnly(weitereSum)} €</td></tr>` : ""}
      ${gesamt > 0 ? `<tr><td>Gesamt</td><td><strong>${moneyOnly(gesamt)} €</strong></td></tr>` : ""}
      <tr><td>Bisher gezahlt</td><td>${moneyOnly(gezahlt)} €${gesamt > 0 ? ` (${pct}%)` : ""}</td></tr>
      ${gesamt > 0 ? `<tr><td class="sum">Noch offen</td><td class="sum" style="color:${rest === 0 ? '#5BA572' : '#d97706'}">${moneyOnly(rest)} €</td></tr>` : ""}
    </table>`;
  }

  // Reihenfolge wie auf der Startseite: BH-Termine zuerst, dann Standard-Pflichten, dann Spezial
  const blocks = [bhtermineBlock, earBlock, schadensBlock, kostenBlock, sozialBlock, theraBlock, zeitBlock, asservateBlock].filter(b => b);
  const personalRows = [
    ["Name, Vorname", name], ["Geburtsdatum", geb],
    ["Anschrift", adr], ["Telefon", tel],
    ["Aktenzeichen Bewährungshilfe", az], ["Bewährungshelfer/in", bh],
  ].filter(p => p[1]);
  let personalTbl = "";
  if (personalRows.length > 0) {
    personalTbl = `<table>`;
    for (let i = 0; i < personalRows.length; i += 2) {
      const L = personalRows[i], R = personalRows[i+1];
      if (R) personalTbl += `<tr><td class="label">${esc(L[0])}</td><td>${esc(L[1])}</td><td class="label">${esc(R[0])}</td><td>${esc(R[1])}</td></tr>`;
      else personalTbl += `<tr><td class="label">${esc(L[0])}</td><td>${esc(L[1])}</td><td colspan="2">&nbsp;</td></tr>`;
    }
    personalTbl += `</table>`;
  }

  return `
    <h1>Status-Übersicht</h1>
    <div class="subtitle">Gesamtstand zum ${new Date().toLocaleDateString("de-DE", { day: "2-digit", month: "long", year: "numeric" })}</div>
    ${personalTbl ? `<h2>Persönliche Angaben</h2>${personalTbl}` : ""}
    ${blocks.length > 0 ? blocks.join("\n") : `<p style="font-style:italic; color:#888; margin-top:20pt;">Noch keine Daten in den Dokumenten erfasst. Bitte erst die anderen Dokumente ausfüllen.</p>`}
    <p style="font-size:8pt; font-style:italic; color:#666; margin-top:14pt;">Diese Übersicht wurde automatisch aus den anderen Dokumenten erstellt. Detail-Dokumente liegen separat vor.</p>
  `;
}

// ---- BH-Termine print ----
function renderPrintBhtermine() {
  const ans = (s, f) => valOrSkipPrint(s, f);
  function pairsTable(pairsAll) {
    const pairs = filterPairs(pairsAll.filter(p => p[0]));
    if (pairs.length === 0) return "";
    let t = `<table>`;
    for (let i=0; i<pairs.length; i+=2) {
      const L = pairs[i], R = pairs[i+1];
      if (R) t += `<tr>${tdLabel(L[0],false)}${tdValue(L[1].value)}${tdLabel(R[0],false)}${tdValue(R[1].value)}</tr>`;
      else t += `<tr>${tdLabel(L[0],false)}${tdValue(L[1].value)}<td colspan="2">&nbsp;</td></tr>`;
    }
    return t + `</table>`;
  }
  const personalTbl = pairsTable([
    ["Name, Vorname", ans("personal","name")], ["Geburtsdatum", ans("personal","geburtsdatum")],
    ["Aktenzeichen Bewährungshilfe", ans("personal","aktenzeichen")], ["Bewährungshelfer/in", ans("personal","bewaehrungshelfer")],
  ]);
  const termineRows = (getDocState().rows && getDocState().rows.termine) || [];
  const filtered = termineRows.map((r, i) => ({ ...r, _origIdx: i })).filter(r => r.datum || r.themen);
  let termineTbl = "";
  if (filtered.length > 0) {
    termineTbl = `<table>
      <tr><th>Datum</th><th>Uhrzeit</th><th>Art</th><th>Besprochene Themen</th><th>Vereinbarungen / nächste Schritte</th><th>Status</th><th>Unterschrift BH</th></tr>`;
    filtered.forEach(r => {
      const rowSigHtml = renderPrintRowSignature("bhtermine", "termine", r._origIdx);
      const ver = esc(r.vereinbarungen || "");
      const notizText = esc(r.notiz || "").replace(/\n/g, "<br>");
      let verCell = "";
      if (ver && notizText) {
        verCell = `${ver}<br><span style="font-size:8pt; color:#555; font-style:italic;">📝 ${notizText}</span>`;
      } else if (ver) {
        verCell = ver;
      } else if (notizText) {
        verCell = `<span style="font-size:9pt; font-style:italic;">📝 ${notizText}</span>`;
      } else {
        verCell = "";
      }
      termineTbl += `<tr>
        <td>${esc(r.datum || "")}</td>
        <td>${esc(r.uhrzeit || "")}</td>
        <td>${esc(r.art || "")}</td>
        <td>${esc(r.themen || "")}</td>
        <td>${verCell}</td>
        <td>${esc(r.status || "")}</td>
        <td style="height:30pt; vertical-align:middle;">${rowSigHtml || "&nbsp;"}</td>
      </tr>`;
    });
    termineTbl += `</table>`;
  } else {
    termineTbl = `<p style="font-style:italic; color:#888;">(keine Termine erfasst)</p>`;
  }
  // Nächster Termin
  const nextPairs = [
    ["Datum", ans("naechster","datum")], ["Uhrzeit", ans("naechster","uhrzeit")],
    ["Ort", ans("naechster","ort")],
  ];
  const nextTbl = pairsTable(nextPairs);
  const vorbereitung = ans("naechster", "vorbereitung");
  const vorbereitungSection = (!vorbereitung.skipped && vorbereitung.value)
    ? `<p style="margin-top:8pt;"><strong>Vorbereitung / zu besprechen:</strong></p><p>${esc(vorbereitung.value).replace(/\n/g, "<br>")}</p>`
    : "";
  const note = ans("anmerkung", "notes");
  const noteSection = (!note.skipped && note.value)
    ? `<h2>Notizen</h2>${note.value.split("\n").map(l => `<p>${esc(l) || "&nbsp;"}</p>`).join("")}`
    : "";

  return `
    <h1>Bewährungshilfe-Termine</h1>
    <div class="subtitle">Übersicht der Termine und Gespräche</div>
    ${personalTbl ? `<h2>Persönliche Angaben</h2>${personalTbl}` : ""}
    <h2>Termine</h2>${termineTbl}
    ${nextTbl || vorbereitungSection ? `<h2>Nächster Termin</h2>${nextTbl}${vorbereitungSection}` : ""}
    ${noteSection}
    ${renderPrintSignatures("bhtermine", { counterRoleLabel: "Bewährungshelfer:in (optional)", probandLabel: "Bewährter / Bewährte" })}
    <p style="font-size:8pt; font-style:italic; color:#666; margin-top:14pt;">Persönliche Notizen zur eigenen Vorbereitung und Übersicht.</p>
    ${renderPrintVerificationFooter("bhtermine")}
  `;
}

// ============================================
// DOCX GENERATION (lazy load library)
// ============================================
let docxLoading = null;
function loadDocxLib() {
  if (window.docx) return Promise.resolve();
  if (docxLoading) return docxLoading;
  docxLoading = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/docx/9.5.1/index.umd.js";
    s.onload = () => resolve();
    s.onerror = () => reject(new Error("Konnte docx-Bibliothek nicht laden. Bitte Internetverbindung prüfen oder die Druckansicht nutzen."));
    document.head.appendChild(s);
  });
  return docxLoading;
}

async function generateDoc() {
  const btn = document.getElementById("genBtn");
  if (btn) { btn.disabled = true; btn.textContent = "Erstelle Dokument..."; }
  try {
    await loadDocxLib();
    const id = state.activeDocId;
    let blob, filename;
    if (id === "ear") { blob = await buildEarDocx(); filename = "Einnahmen-Ausgaben-Rechnung"; }
    else if (id === "zeit") { blob = await buildZeitDocx(); filename = "Zeitstrahl-Lebensverlauf"; }
    else if (id === "thera") { blob = await buildTheraDocx(); filename = "Therapie-Terminbestaetigung"; }
    else if (id === "schadens") { blob = await buildSchadensDocx(); filename = "Schadenswiedergutmachung"; }
    else if (id === "sozial") { blob = await buildSozialDocx(); filename = "Sozialstunden-Nachweis"; }
    else if (id === "uebersicht") { alert("Für die Status-Übersicht bitte „Drucken / als PDF speichern“ verwenden."); if (btn) { btn.disabled = false; btn.textContent = "📄 Word-Dokument erstellen"; } return; }
    // Add name suffix if available
    const userName = (state.shared.name || "").replace(/[^a-zA-Z0-9äöüÄÖÜß_-]/g, "_");
    if (userName) filename += "_" + userName;
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename + ".docx";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    if (btn) { btn.disabled = false; btn.textContent = "✓ Heruntergeladen - nochmal erstellen"; }
  } catch (e) {
    console.error(e);
    if (btn) { btn.disabled = false; btn.textContent = "📄 Word-Dokument erstellen"; }
    alert("Fehler: " + e.message + "\n\nTipp: Du kannst stattdessen die Druckansicht verwenden – die funktioniert auch ohne Internetverbindung.");
  }
}

// ---- Shared docx helpers ----
function docxBase() {
  const D = window.docx;
  const border = { style: D.BorderStyle.SINGLE, size: 4, color: "999999" };
  return {
    D, border,
    borders: { top: border, bottom: border, left: border, right: border },
    cellMargins: { top: 80, bottom: 80, left: 120, right: 120 },
    PAGE_W: 11906, PAGE_H: 16838, MARGIN: 1080,
    COLOR_HEADER: "2E5984", COLOR_SUB: "B8CCE4", COLOR_ZEILE: "F2F2F2",
  };
}
function docxP(text, opts = {}) {
  const D = window.docx;
  return new D.Paragraph({
    children: [new D.TextRun({ text: text || "", ...opts })],
    spacing: { after: opts.after || 60 },
    alignment: opts.align,
  });
}
function docxH1(text) {
  const { D, COLOR_HEADER } = docxBase();
  return new D.Paragraph({
    children: [new D.TextRun({ text, bold: true, size: 28, color: "FFFFFF" })],
    shading: { fill: COLOR_HEADER, type: D.ShadingType.CLEAR },
    spacing: { before: 240, after: 120 }, indent: { left: 80 }
  });
}
function docxCell(text, opts = {}) {
  const { D, borders, cellMargins } = docxBase();
  const para = new D.Paragraph({
    children: [new D.TextRun({
      text, bold: opts.bold, size: opts.size || 20,
      strike: opts.strike, color: opts.strike ? "888888" : (opts.color || "000000")
    })],
    alignment: opts.align
  });
  return new D.TableCell({
    borders,
    width: { size: opts.width, type: D.WidthType.DXA },
    shading: opts.shade ? { fill: opts.shade, type: D.ShadingType.CLEAR } : undefined,
    margins: cellMargins,
    children: [para]
  });
}
function docxBlankCell(width) {
  const { D, borders, cellMargins } = docxBase();
  return new D.TableCell({
    borders,
    width: { size: width, type: D.WidthType.DXA },
    margins: cellMargins,
    children: [new D.Paragraph({ children: [new D.TextRun({ text: " " })] })]
  });
}
function docxSignature(width) {
  const { D, border, cellMargins } = docxBase();
  const half = Math.floor(width / 2);
  return new D.Table({
    width: { size: width, type: D.WidthType.DXA },
    columnWidths: [half, width - half],
    rows: [new D.TableRow({ children: [
      new D.TableCell({
        borders: { top: border, bottom: { style: D.BorderStyle.NONE }, left: { style: D.BorderStyle.NONE }, right: { style: D.BorderStyle.NONE }},
        width: { size: half, type: D.WidthType.DXA }, margins: cellMargins,
        children: [docxP("Ort, Datum", { size: 18, color: "666666" })]
      }),
      new D.TableCell({
        borders: { top: border, bottom: { style: D.BorderStyle.NONE }, left: { style: D.BorderStyle.NONE }, right: { style: D.BorderStyle.NONE }},
        width: { size: width - half, type: D.WidthType.DXA }, margins: cellMargins,
        children: [docxP("Unterschrift", { size: 18, color: "666666" })]
      })
    ]})]
  });
}

// Convert base64 dataUrl to Uint8Array for docx ImageRun
function dataUrlToBytes(dataUrl) {
  if (!dataUrl) return null;
  const m = dataUrl.match(/^data:[^;]+;base64,(.+)$/);
  if (!m) return null;
  const b64 = m[1];
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

// New: signature block with optional digital signatures (proband + counter)
function docxSignatureBlock(width, docId, opts) {
  // opts: { counterRoleLabel, probandLabel }
  opts = opts || {};
  const { D, border, cellMargins } = docxBase();
  const half = Math.floor(width / 2);
  const probandSig = getSignature(docId, "gesamt_proband");
  const counterSig = getSignature(docId, "gesamt");
  const probandName = (state.shared && state.shared.name) || "";
  const probandLabel = opts.probandLabel || "Proband:in";
  const counterRoleLabel = opts.counterRoleLabel || "Bestätigt durch";

  function buildCell(sig, fallbackLabel, fallbackName, cellWidth) {
    const cellChildren = [];
    if (sig && sig.dataUrl) {
      try {
        const bytes = dataUrlToBytes(sig.dataUrl);
        if (bytes) {
          cellChildren.push(new D.Paragraph({
            children: [new D.ImageRun({
              data: bytes,
              transformation: { width: 180, height: 60 }
            })]
          }));
        }
      } catch (e) { /* fall through */ }
    }
    // The signature line itself
    cellChildren.push(docxP(sig && sig.signerName ? sig.signerName : (fallbackName || ""),
      { size: 20, bold: !!(sig && sig.signerName), after: 0 }));
    if (sig && sig.timestamp) {
      cellChildren.push(docxP(`Digital unterzeichnet am ${fmtSigTimestamp(sig.timestamp)}`,
        { size: 16, color: "666666", italics: true, after: 0 }));
    }
    cellChildren.push(docxP(fallbackLabel, { size: 18, color: "666666", after: 0 }));
    if (!sig) {
      cellChildren.push(docxP("(Ort, Datum, Unterschrift)", { size: 16, color: "888888", italics: true }));
    }
    return new D.TableCell({
      borders: { top: border, bottom: { style: D.BorderStyle.NONE }, left: { style: D.BorderStyle.NONE }, right: { style: D.BorderStyle.NONE }},
      width: { size: cellWidth, type: D.WidthType.DXA }, margins: cellMargins,
      children: cellChildren
    });
  }

  return new D.Table({
    width: { size: width, type: D.WidthType.DXA },
    columnWidths: [half, width - half],
    rows: [new D.TableRow({ children: [
      buildCell(probandSig, probandLabel, probandName, half),
      buildCell(counterSig, counterRoleLabel, "", width - half)
    ]})]
  });
}

// ---- E-A-R ----
async function buildEarDocx() {
  const { D, PAGE_W, PAGE_H, MARGIN, COLOR_SUB, COLOR_ZEILE } = docxBase();
  const CONTENT_W = PAGE_W - 2 * MARGIN;

  function infoTbl(pairsRaw) {
    // Filter out skipped entries (3rd element = skipped flag)
    const pairs = pairsRaw.filter(p => !p[2]);
    if (pairs.length === 0) {
      // Empty placeholder - return tiny invisible table or skip entirely
      return new D.Paragraph({ children: [new D.TextRun({ text: "" })] });
    }
    const c1=2400, c2=2473, c3=2400, c4=2473;
    const rows = [];
    for (let i=0; i<pairs.length; i+=2) {
      const L = pairs[i], R = pairs[i+1];
      if (R) {
        rows.push(new D.TableRow({ children: [
          docxCell(L[0], { width: c1, bold: true, shade: COLOR_ZEILE }),
          docxCell(L[1] || "", { width: c2 }),
          docxCell(R[0], { width: c3, bold: true, shade: COLOR_ZEILE }),
          docxCell(R[1] || "", { width: c4 }),
        ]}));
      } else {
        rows.push(new D.TableRow({ children: [
          docxCell(L[0], { width: c1, bold: true, shade: COLOR_ZEILE }),
          docxCell(L[1] || "", { width: c2 }),
          docxCell("", { width: c3 }),
          docxCell("", { width: c4 }),
        ]}));
      }
    }
    return new D.Table({ width: { size: c1+c2+c3+c4, type: D.WidthType.DXA }, columnWidths: [c1,c2,c3,c4], rows });
  }
  function moneyTbl(rows) {
    const c1=6500, c2=3246;
    const trs = [new D.TableRow({ tableHeader: true, children: [
      docxCell("Bezeichnung", { width: c1, bold: true, shade: COLOR_SUB }),
      docxCell("Betrag (EUR)", { width: c2, bold: true, shade: COLOR_SUB }),
    ]})];
    rows.forEach((r,i) => {
      const sh = r.sub ? "DDEBF7" : (r.sum ? "FFF2CC" : (i%2===0 ? COLOR_ZEILE : null));
      trs.push(new D.TableRow({ children: [
        docxCell(r.label, { width: c1, bold: r.sub||r.sum, shade: sh }),
        docxCell(r.value, { width: c2, bold: r.sum, shade: sh }),
      ]}));
    });
    return new D.Table({ width: { size: c1+c2, type: D.WidthType.DXA }, columnWidths: [c1,c2], rows: trs });
  }

  const v = (s,f) => valOrSkipPrint(s,f);
  const personalPairs = [
    ["Name, Vorname:", v("personal","name").value, v("personal","name").skipped],
    ["Geburtsdatum:", v("personal","geburtsdatum").value, v("personal","geburtsdatum").skipped],
    ["Anschrift:", v("personal","anschrift").value, v("personal","anschrift").skipped],
    ["Telefon:", v("personal","telefon").value, v("personal","telefon").skipped],
    ["E-Mail:", v("personal","email").value, v("personal","email").skipped],
    ["Familienstand:", v("personal","familienstand").value, v("personal","familienstand").skipped],
    ["Personen im Haushalt:", v("personal","haushalt").value, v("personal","haushalt").skipped],
    ["Davon unterhaltspflichtige Kinder:", v("personal","kinder").value, v("personal","kinder").skipped],
    ["Aktenzeichen Bewährungshilfe:", v("personal","aktenzeichen").value, v("personal","aktenzeichen").skipped],
    ["Bewährungshelfer/in:", v("personal","bewaehrungshelfer").value, v("personal","bewaehrungshelfer").skipped],
    ["Abrechnungszeitraum:", v("personal","zeitraum").value, v("personal","zeitraum").skipped],
    ["Erstellt am:", v("personal","erstellt").value, v("personal","erstellt").skipped],
  ];

  function buildMoneyRows(groups) {
    const rows = []; let sum = 0;
    groups.forEach(grp => {
      const sec = DOCS.ear.sections.find(s => s.id === grp.id);
      // Collect visible fields first (skip skipped + skip empty)
      const visible = [];
      sec.fields.forEach(f => {
        const a = getAnswer(grp.id, f.id);
        const skipped = isSkipped(a); const val = valueOf(a);
        if (!skipped && val) {
          const n = parseMoney(val);
          sum += n;
          visible.push({ label: f.label, value: moneyOnly(n) });
        }
      });
      if (visible.length === 0) return; // hide empty subgroup
      rows.push({ label: grp.title, value: "", sub: true });
      visible.forEach(v => rows.push(v));
    });
    return { rows, sum };
  }
  const ein = buildMoneyRows([
    { id: "arbeit", title: "ARBEITSEINKOMMEN" }, { id: "sozial", title: "SOZIALLEISTUNGEN" },
    { id: "familie_ein", title: "FAMILIENLEISTUNGEN" }, { id: "renten", title: "RENTEN / VERSORGUNG" },
    { id: "sonst_ein", title: "SONSTIGE EINNAHMEN" },
  ]);
  const aus = buildMoneyRows([
    { id: "wohnen", title: "WOHNEN" }, { id: "vers", title: "VERSICHERUNGEN" },
    { id: "mob", title: "MOBILITÄT" }, { id: "tk", title: "TELEKOMMUNIKATION & MEDIEN" },
    { id: "leben", title: "LEBENSHALTUNG" }, { id: "gesundheit", title: "GESUNDHEIT" },
    { id: "familie_aus", title: "FAMILIE / KINDER" }, { id: "schulden", title: "SCHULDEN / VERPFLICHTUNGEN" },
    { id: "justiz", title: "BEWÄHRUNGSAUFLAGEN / JUSTIZ" }, { id: "freizeit", title: "FREIZEIT / SONSTIGES" },
  ]);

  // Household members' income
  const hhRows = (getDocState().rows && getDocState().rows.haushalt_ein) || [];
  const hhFiltered = hhRows.filter(r => (r.name || r.beziehung || r.art || r.betrag));
  let hhSum = 0;
  hhFiltered.forEach(r => { hhSum += parseMoney(r.betrag || ""); });
  const hasHH = hhFiltered.length > 0;

  // Final labels depend on whether household is in play
  ein.rows.push({ label: hasHH ? "DEINE EINNAHMEN GESAMT" : "GESAMTEINNAHMEN", value: moneyOnly(ein.sum), sum: true });
  aus.rows.push({ label: hasHH ? "GESAMTAUSGABEN HAUSHALT" : "GESAMTAUSGABEN", value: moneyOnly(aus.sum), sum: true });

  // Build household table if any entries
  function hhTable() {
    if (!hasHH) return null;
    const c1 = 1900, c2 = 2400, c3 = 3000, c4 = 2473;
    const rows = [new D.TableRow({ tableHeader: true, children: [
      docxCell("Name", { width: c1, bold: true, shade: COLOR_SUB }),
      docxCell("Beziehung", { width: c2, bold: true, shade: COLOR_SUB }),
      docxCell("Art der Einnahme", { width: c3, bold: true, shade: COLOR_SUB }),
      docxCell("Monatlich (EUR)", { width: c4, bold: true, shade: COLOR_SUB }),
    ]})];
    hhFiltered.forEach((r, i) => {
      const sh = i % 2 === 0 ? COLOR_ZEILE : null;
      rows.push(new D.TableRow({ children: [
        docxCell(r.name || "", { width: c1, shade: sh }),
        docxCell(r.beziehung || "", { width: c2, shade: sh }),
        docxCell(r.art || "", { width: c3, shade: sh }),
        docxCell(r.betrag ? moneyOnly(parseMoney(r.betrag)) : "", { width: c4, shade: sh }),
      ]}));
    });
    rows.push(new D.TableRow({ children: [
      docxCell("Einnahmen weiterer Haushaltsmitglieder gesamt", { width: c1+c2+c3, bold: true, shade: "FFF2CC" }),
      docxCell(moneyOnly(hhSum), { width: c4, bold: true, shade: "FFF2CC" }),
    ]}));
    return new D.Table({ width: { size: c1+c2+c3+c4, type: D.WidthType.DXA }, columnWidths: [c1,c2,c3,c4], rows });
  }

  const totalEin = ein.sum + hhSum;
  const saldo = totalEin - aus.sum;
  const saldoRows = hasHH ? [
    { label: "Deine Einnahmen", value: moneyOnly(ein.sum) },
    { label: "Einnahmen weiterer Haushaltsmitglieder", value: moneyOnly(hhSum) },
    { label: "Gesamteinnahmen Haushalt", value: moneyOnly(totalEin), sub: true },
    { label: "Gesamtausgaben Haushalt", value: moneyOnly(aus.sum) },
    { label: "ÜBERSCHUSS / FEHLBETRAG (Haushalt)", value: moneyOnly(saldo), sum: true },
  ] : [
    { label: "Gesamteinnahmen", value: moneyOnly(ein.sum) },
    { label: "Gesamtausgaben", value: moneyOnly(aus.sum) },
    { label: "ÜBERSCHUSS / FEHLBETRAG", value: moneyOnly(saldo), sum: true },
  ];

  const noteVal = v("anmerkung", "notes");
  let secNum = 1;
  const children = [
    new D.Paragraph({ children: [new D.TextRun({ text: "Einnahmen-Ausgaben-Rechnung", bold: true, size: 36, color: "1F3864" })], alignment: D.AlignmentType.CENTER, spacing: { after: 80 } }),
    new D.Paragraph({ children: [new D.TextRun({ text: "für die Bewährungshilfe", italics: true, size: 22, color: "555555" })], alignment: D.AlignmentType.CENTER, spacing: { after: 240 } }),
    docxH1(`${secNum++}. Persönliche Angaben`), infoTbl(personalPairs),
    docxH1(`${secNum++}. ${hasHH ? "Deine Einnahmen" : "Einnahmen"}`), moneyTbl(ein.rows),
  ];
  if (hasHH) {
    children.push(new D.Paragraph({ children: [new D.PageBreak()] }));
    children.push(docxH1(`${secNum++}. Einnahmen weiterer Haushaltsmitglieder`));
    children.push(hhTable());
  }
  children.push(new D.Paragraph({ children: [new D.PageBreak()] }));
  children.push(docxH1(`${secNum++}. Ausgaben${hasHH ? " (Haushalt gesamt)" : ""}`), moneyTbl(aus.rows));
  children.push(new D.Paragraph({ children: [new D.PageBreak()] }));
  children.push(docxH1(`${secNum++}. Zusammenfassung / Saldo`), moneyTbl(saldoRows));

  if (!noteVal.skipped && noteVal.value) {
    children.push(docxH1(`${secNum++}. Anmerkungen / Erläuterungen`));
    noteVal.value.split("\n").forEach(l => children.push(docxP(l || " ")));
  }
  children.push(new D.Paragraph({ spacing: { before: 480 }, children: [new D.TextRun({ text: "" })] }));
  children.push(docxSignatureBlock(CONTENT_W, "ear", { counterRoleLabel: "Bestätigung (optional)", probandLabel: "Eintragen durch (Proband:in)" }));
  children.push(docxP("Ich versichere, dass die vorstehenden Angaben vollständig und wahrheitsgemäß sind.", { size: 18, italics: true, color: "666666" }));

  const doc = new D.Document({
    creator: "Bewährungshilfe-Assistent",
    styles: { default: { document: { run: { font: "Arial", size: 20 } } } },
    sections: [{
      properties: { page: { size: { width: PAGE_W, height: PAGE_H }, margin: { top: MARGIN, right: MARGIN, bottom: MARGIN, left: MARGIN } } },
      children
    }]
  });
  return await D.Packer.toBlob(doc);
}

// ---- Zeitstrahl (landscape) ----
async function buildZeitDocx() {
  const { D, PAGE_W, PAGE_H, MARGIN, COLOR_SUB, COLOR_ZEILE } = docxBase();
  const LAND_CONTENT_W = PAGE_H - 2 * MARGIN;

  function infoTbl(pairsRaw, totalW) {
    const pairs = pairsRaw.filter(p => !p[2]);
    if (pairs.length === 0) return new D.Paragraph({ children: [new D.TextRun({ text: "" })] });
    const c1 = Math.floor(totalW * 0.22), c2 = Math.floor(totalW * 0.28), c3 = Math.floor(totalW * 0.22);
    const c4 = totalW - c1 - c2 - c3;
    const rows = [];
    for (let i=0; i<pairs.length; i+=2) {
      const L = pairs[i], R = pairs[i+1];
      if (R) {
        rows.push(new D.TableRow({ children: [
          docxCell(L[0], { width: c1, bold: true, shade: COLOR_ZEILE }),
          docxCell(L[1] || "", { width: c2 }),
          docxCell(R[0], { width: c3, bold: true, shade: COLOR_ZEILE }),
          docxCell(R[1] || "", { width: c4 }),
        ]}));
      } else {
        rows.push(new D.TableRow({ children: [
          docxCell(L[0], { width: c1, bold: true, shade: COLOR_ZEILE }),
          docxCell(L[1] || "", { width: c2 }),
          docxCell("", { width: c3 }),
          docxCell("", { width: c4 }),
        ]}));
      }
    }
    return new D.Table({ width: { size: totalW, type: D.WidthType.DXA }, columnWidths: [c1,c2,c3,c4], rows });
  }
  // Returns null if section is empty (no rows entered)
  function rowsTbl(secId) {
    const sec = DOCS.zeit.sections.find(s => s.id === secId);
    const rows = getRows(secId);
    const nonEmpty = rows.filter(r => sec.columns.some(c => r[c.id] && r[c.id].trim()));
    if (nonEmpty.length === 0) return null;
    const colCount = sec.columns.length;
    const colW = Math.floor(LAND_CONTENT_W / colCount);
    const widths = sec.columns.map(() => colW);
    const trs = [new D.TableRow({ tableHeader: true, children: sec.columns.map((c, i) =>
      docxCell(c.label, { width: widths[i], bold: true, shade: COLOR_SUB, size: 18 })
    )})];
    nonEmpty.forEach((r, i) => {
      const sh = i % 2 === 0 ? COLOR_ZEILE : null;
      trs.push(new D.TableRow({ children: sec.columns.map((c, ci) =>
        docxCell(r[c.id] || " ", { width: widths[ci], shade: sh, size: 18 })
      )}));
    });
    const sumW = widths.reduce((a,b) => a+b, 0);
    return new D.Table({ width: { size: sumW, type: D.WidthType.DXA }, columnWidths: widths, rows: trs });
  }

  const v = (s,f) => valOrSkipPrint(s,f);
  const personalPairs = [
    ["Name, Vorname:", v("personal","name").value, v("personal","name").skipped],
    ["Geburtsdatum:", v("personal","geburtsdatum").value, v("personal","geburtsdatum").skipped],
    ["Geburtsort:", v("personal","geburtsort").value, v("personal","geburtsort").skipped],
    ["Staatsangehörigkeit:", v("personal","staat").value, v("personal","staat").skipped],
    ["Aktuelle Anschrift:", v("personal","anschrift").value, v("personal","anschrift").skipped],
    ["Telefon / E-Mail:", v("personal","kontakt").value, v("personal","kontakt").skipped],
    ["Aktenzeichen:", v("personal","aktenzeichen").value, v("personal","aktenzeichen").skipped],
    ["Bewährungshelfer/in:", v("personal","bewaehrungshelfer").value, v("personal","bewaehrungshelfer").skipped],
    ["Erstellt am:", v("personal","erstellt").value, v("personal","erstellt").skipped],
    ["Stand / Zeitraum:", v("personal","stand").value, v("personal","stand").skipped],
  ];

  const noteVal = v("anmerkung", "notes");
  const children = [
    new D.Paragraph({ children: [new D.TextRun({ text: "Zeitstrahl / Lebensverlauf", bold: true, size: 36, color: "1F3864" })], alignment: D.AlignmentType.CENTER, spacing: { after: 80 } }),
    new D.Paragraph({ children: [new D.TextRun({ text: "Strukturierte Übersicht für die Bewährungshilfe", italics: true, size: 22, color: "555555" })], alignment: D.AlignmentType.CENTER, spacing: { after: 240 } }),
  ];
  let secNum = 1;
  children.push(docxH1(`${secNum++}. Persönliche Angaben`), infoTbl(personalPairs, LAND_CONTENT_W));

  const dynSections = [
    ["Wohnsitze", "wohnungen"],
    ["Berufliche Tätigkeiten", "arbeit"],
    ["Schulischer und beruflicher Bildungsweg", "bildung"],
    ["Wichtige Lebensereignisse", "lebensereignisse"],
    ["Therapien und Beratungen", "therapie"],
    ["Maßnahmen und Aufenthalte", "massnahmen"],
    ["Justiz / Strafrechtliche Verfahren", "justiz"],
    ["Aktuelles Unterstützungssystem", "hilfen"],
  ];
  let addedSinceBreak = 1;
  dynSections.forEach(([title, sid]) => {
    const t = rowsTbl(sid);
    if (!t) return;
    if (addedSinceBreak >= 2) {
      children.push(new D.Paragraph({ children: [new D.PageBreak()] }));
      addedSinceBreak = 0;
    }
    children.push(docxH1(`${secNum++}. ${title}`), t);
    addedSinceBreak++;
  });
  if (!noteVal.skipped && noteVal.value) {
    children.push(docxH1(`${secNum++}. Anmerkungen / Ergänzungen`));
    noteVal.value.split("\n").forEach(l => children.push(docxP(l || " ")));
  }
  children.push(new D.Paragraph({ spacing: { before: 360 }, children: [new D.TextRun({ text: "" })] }));
  children.push(docxSignatureBlock(LAND_CONTENT_W, "zeit", { counterRoleLabel: "Bestätigung (optional)", probandLabel: "Eintragen durch (Proband:in)" }));
  children.push(docxP("Ich versichere, dass die vorstehenden Angaben nach bestem Wissen vollständig und wahrheitsgemäß sind.", { size: 18, italics: true, color: "666666" }));

  const doc = new D.Document({
    creator: "Bewährungshilfe-Assistent",
    styles: { default: { document: { run: { font: "Arial", size: 20 } } } },
    sections: [{
      properties: { page: { size: { width: PAGE_W, height: PAGE_H, orientation: D.PageOrientation.LANDSCAPE }, margin: { top: MARGIN, right: MARGIN, bottom: MARGIN, left: MARGIN } } },
      children
    }]
  });
  return await D.Packer.toBlob(doc);
}

        shading: sh ? { fill: sh, type: D.ShadingType.CLEAR } : undefined,

      })
    ]}));

    width: { size: termineWidths.reduce((a,b)=>a+b,0), type: D.WidthType.DXA },
    columnWidths: termineWidths, rows: tRows
  });

  const patName = v("patient","name").value || "_____________________________________";
  const bemVal = v("bemerkung","notes");

  const children = [
    briefkopfTable,
    new D.Paragraph({ spacing: { after: 240 }, children: [new D.TextRun({ text: "" })] }),
    new D.Paragraph({ children: [new D.TextRun({ text: "Bestätigung der Therapieteilnahme", bold: true, size: 32, color: "1F3864" })], alignment: D.AlignmentType.CENTER, spacing: { after: 80 } }),
    new D.Paragraph({ children: [new D.TextRun({ text: "zur Vorlage bei der Bewährungshilfe", italics: true, size: 22, color: "555555" })], alignment: D.AlignmentType.CENTER, spacing: { after: 240 } }),
  ];
  let secNum = 1;

  // 1. Patient
  const patTbl = infoTbl(patientPairs);
  if (patTbl) { children.push(docxH1(`${secNum++}. Patient/in`), patTbl); }

  // 2. Therapie info (only if any visible content)
  const therTbl = infoTbl(therPairs);
  if (therTbl || checkedTherArt.length > 0) {
    children.push(docxH1(`${secNum++}. Angaben zur Therapie`));
    if (therTbl) children.push(therTbl);
    if (checkedTherArt.length > 0) {
      children.push(docxP("Therapieformen:", { size: 20, bold: true, after: 80 }));
      checkedTherArt.forEach(opt => {
        children.push(docxP(`☒ ${opt}`, { size: 20, after: 60 }));
      });
    }
  }

  // 3. Termine (always shown - core of the document)
  children.push(new D.Paragraph({ children: [new D.PageBreak()] }));
  children.push(docxH1(`${secNum++}. Übersicht der Termine / Sitzungen`));
  children.push(docxP("Mehrere Termine können auf diesem einen Blatt geführt werden. Die jeweilige Wahrnehmung wird durch Unterschrift / Stempel der/des Therapeut/in bestätigt.", { italics: true, size: 18, color: "666666", after: 120 }));
  children.push(termineTable);

  // 4. Bemerkungen (only if has content)
  if (!bemVal.skipped && bemVal.value) {
    children.push(docxH1(`${secNum++}. Bemerkungen zum Therapieverlauf`));
    bemVal.value.split("\n").forEach(l => children.push(docxP(l || " ")));
  }

  // 5. Schweigepflicht (only if at least one option checked)
  if (checkedSp.length > 0) {
    children.push(docxH1(`${secNum++}. Schweigepflichtentbindung`));
    children.push(docxP(`Hiermit entbinde ich, ${patName} (Patient/in), die/den oben genannte/n Therapeut/in von der Schweigepflicht im folgenden Umfang gegenüber meiner/meinem Bewährungshelfer/in:`, { size: 20, after: 120 }));
    checkedSp.forEach(opt => {
      children.push(docxP(`☒ ${opt}`, { size: 20, after: 60 }));
    });
    children.push(docxP("Diese Entbindung kann jederzeit schriftlich widerrufen werden.", { size: 18, italics: true, color: "666666", after: 360 }));
  } else {
    children.push(new D.Paragraph({ spacing: { before: 360 }, children: [new D.TextRun({ text: "" })] }));
  }

  // Signature blocks
  function sigBlock(label) {
    const half = Math.floor(CONTENT_W / 2);
    return new D.Table({
      width: { size: CONTENT_W, type: D.WidthType.DXA },
      columnWidths: [half, CONTENT_W - half],
      rows: [new D.TableRow({ children: [
        new D.TableCell({
          borders: { top: border, bottom: { style: D.BorderStyle.NONE }, left: { style: D.BorderStyle.NONE }, right: { style: D.BorderStyle.NONE }},
          width: { size: half, type: D.WidthType.DXA }, margins: cellMargins,
          children: [docxP("Ort, Datum", { size: 18, color: "666666" })]
        }),
        new D.TableCell({
          borders: { top: border, bottom: { style: D.BorderStyle.NONE }, left: { style: D.BorderStyle.NONE }, right: { style: D.BorderStyle.NONE }},
          width: { size: CONTENT_W - half, type: D.WidthType.DXA }, margins: cellMargins,
          children: [docxP(label, { size: 18, color: "666666" })]
        })
      ]})]
    });
  }
  children.push(sigBlock("Unterschrift Patient/in"));
  children.push(new D.Paragraph({ spacing: { after: 480 }, children: [new D.TextRun({ text: "" })] }));
  children.push(docxH1(`${secNum++}. Bestätigung durch die/den Therapeut/in`));
  children.push(docxP("Ich bestätige hiermit die in dieser Übersicht aufgeführten Angaben sowie die Wahrnehmung der oben angegebenen Termine.", { size: 20, after: 360 }));
  children.push(sigBlock("Unterschrift / Stempel Therapeut/in"));

  const doc = new D.Document({
    creator: "Bewährungshilfe-Assistent",
    styles: { default: { document: { run: { font: "Arial", size: 20 } } } },
    sections: [{
      properties: { page: { size: { width: PAGE_W, height: PAGE_H }, margin: { top: MARGIN, right: MARGIN, bottom: MARGIN, left: MARGIN } } },
      children
    }]
  });
  return await D.Packer.toBlob(doc);
}

// ---- Schadenswiedergutmachung docx ----
async function buildSchadensDocx() {
  const { D, PAGE_W, PAGE_H, MARGIN, COLOR_SUB, COLOR_ZEILE } = docxBase();
  const CONTENT_W = PAGE_W - 2 * MARGIN;
  const v = (s,f) => valOrSkipPrint(s,f);

  function infoTbl(pairsRaw) {
    const pairs = pairsRaw.filter(p => !p[2] && p[0]);
    if (pairs.length === 0) return null;
    const c1=2400, c2=2473, c3=2400, c4=2473;
    const rows = [];
    for (let i=0; i<pairs.length; i+=2) {
      const L = pairs[i], R = pairs[i+1];
      if (R) rows.push(new D.TableRow({ children: [
        docxCell(L[0], { width: c1, bold: true, shade: COLOR_ZEILE }),
        docxCell(L[1] || "", { width: c2 }),
        docxCell(R[0], { width: c3, bold: true, shade: COLOR_ZEILE }),
        docxCell(R[1] || "", { width: c4 }),
      ]})); else rows.push(new D.TableRow({ children: [
        docxCell(L[0], { width: c1, bold: true, shade: COLOR_ZEILE }),
        docxCell(L[1] || "", { width: c2 }),
        docxCell("", { width: c3 }), docxCell("", { width: c4 }),
      ]}));
    }
    return new D.Table({ width: { size: c1+c2+c3+c4, type: D.WidthType.DXA }, columnWidths: [c1,c2,c3,c4], rows });
  }

  const personalPairs = [
    ["Name, Vorname:", v("personal","name").value, v("personal","name").skipped],
    ["Geburtsdatum:", v("personal","geburtsdatum").value, v("personal","geburtsdatum").skipped],
    ["Anschrift:", v("personal","anschrift").value, v("personal","anschrift").skipped],
    ["Telefon:", v("personal","telefon").value, v("personal","telefon").skipped],
    ["Aktenzeichen Bewährungshilfe:", v("personal","aktenzeichen").value, v("personal","aktenzeichen").skipped],
    ["Bewährungshelfer/in:", v("personal","bewaehrungshelfer").value, v("personal","bewaehrungshelfer").skipped],
    ["Erstellt am:", v("personal","erstellt").value, v("personal","erstellt").skipped],
  ];
  const auflagePairs = [
    ["Gericht:", v("auflage","gericht").value, v("auflage","gericht").skipped],
    ["Aktenzeichen Gericht:", v("auflage","az_gericht").value, v("auflage","az_gericht").skipped],
    ["Datum Urteil/Beschluss:", v("auflage","urteil_datum").value, v("auflage","urteil_datum").skipped],
    ["Tat / Anlass:", v("auflage","tat").value, v("auflage","tat").skipped],
    ["Geschädigte/r:", v("auflage","geschaedigte").value, v("auflage","geschaedigte").skipped],
    ["Gesamtbetrag:", v("auflage","gesamt").value, v("auflage","gesamt").skipped],
    ["Monatliche Rate:", v("auflage","rate").value, v("auflage","rate").skipped],
    ["Beginn der Zahlungen:", v("auflage","beginn").value, v("auflage","beginn").skipped],
    ["Frist / spätestes Ende:", v("auflage","frist").value, v("auflage","frist").skipped],
  ];
  const empfPairs = [
    ["Empfänger Name:", v("empfaenger","name").value, v("empfaenger","name").skipped],
    ["Anschrift:", v("empfaenger","anschrift").value, v("empfaenger","anschrift").skipped],
    ["IBAN:", v("empfaenger","iban").value, v("empfaenger","iban").skipped],
    ["BIC:", v("empfaenger","bic").value, v("empfaenger","bic").skipped],
    ["Bank:", v("empfaenger","bank").value, v("empfaenger","bank").skipped],
    ["Verwendungszweck:", v("empfaenger","verwendung").value, v("empfaenger","verwendung").skipped],
  ];

  // Zahlungen table
  const zahlungenRows = (getDocState().rows && getDocState().rows.zahlungen) || [];
  const filtered = zahlungenRows.filter(r => r.datum || r.betrag);
  let zahlungTbl = null, gezahlt = 0;
  const cols = [1500, 1700, 2300, 1700, 2546]; // 9746 total
  const head = ["Datum", "Betrag (EUR)", "Beleg-Nr / Referenz", "Art", "Bemerkung"];
  const trs = [new D.TableRow({ tableHeader: true, children: head.map((h,i) => docxCell(h, { width: cols[i], bold: true, shade: COLOR_SUB, size: 18 }))})];
  filtered.forEach((r, i) => {
    const n = parseMoney(r.betrag || ""); gezahlt += n;
    const sh = i % 2 === 0 ? COLOR_ZEILE : null;
    trs.push(new D.TableRow({ children: [
      docxCell(r.datum || " ", { width: cols[0], shade: sh, size: 18 }),
      docxCell(r.betrag ? moneyOnly(n) : " ", { width: cols[1], shade: sh, size: 18 }),
      docxCell(r.beleg || " ", { width: cols[2], shade: sh, size: 18 }),
      docxCell(r.art || " ", { width: cols[3], shade: sh, size: 18 }),
      docxCell(r.bemerkung || " ", { width: cols[4], shade: sh, size: 18 }),
    ]}));
  });
  if (filtered.length > 0) {
    trs.push(new D.TableRow({ children: [
      docxCell("Summe", { width: cols[0], bold: true, shade: "FFF2CC" }),
      docxCell(moneyOnly(gezahlt), { width: cols[1], bold: true, shade: "FFF2CC" }),
      docxCell(`${filtered.length} Zahlung(en)`, { width: cols[2]+cols[3]+cols[4], bold: true, shade: "FFF2CC" }),
    ]}));
    zahlungTbl = new D.Table({ width: { size: cols.reduce((a,b)=>a+b,0), type: D.WidthType.DXA }, columnWidths: cols, rows: trs });
  }

  // Fortschritt
  const gesamtVal = parseMoney(v("auflage","gesamt").value || "");
  const rateVal = parseMoney(v("auflage","rate").value || "");
  const rest = Math.max(0, gesamtVal - gezahlt);
  let progressTbl = null;
  if (gesamtVal > 0) {
    const c1 = Math.floor(CONTENT_W * 0.55), c2 = CONTENT_W - c1;
    const pct = Math.round((gezahlt / gesamtVal) * 100);
    const rows = [
      new D.TableRow({ tableHeader: true, children: [
        docxCell("Position", { width: c1, bold: true, shade: COLOR_SUB }),
        docxCell("Wert", { width: c2, bold: true, shade: COLOR_SUB }),
      ]}),
      new D.TableRow({ children: [
        docxCell("Gesamtbetrag (laut Auflage)", { width: c1 }),
        docxCell(moneyOnly(gesamtVal) + " €", { width: c2 }),
      ]}),
      new D.TableRow({ children: [
        docxCell("Bisher gezahlt", { width: c1, shade: COLOR_ZEILE }),
        docxCell(moneyOnly(gezahlt) + " €", { width: c2, shade: COLOR_ZEILE }),
      ]}),
      new D.TableRow({ children: [
        docxCell("Fortschritt", { width: c1 }),
        docxCell(pct + " %", { width: c2 }),
      ]}),
      new D.TableRow({ children: [
        docxCell("Noch offen", { width: c1, bold: true, shade: "FFF2CC" }),
        docxCell(moneyOnly(rest) + " €", { width: c2, bold: true, shade: "FFF2CC" }),
      ]}),
    ];
    if (rateVal > 0 && rest > 0) {
      const monateNoch = Math.ceil(rest / rateVal);
      const ende = new Date(); ende.setMonth(ende.getMonth() + monateNoch);
      rows.push(new D.TableRow({ children: [
        docxCell("Voraussichtlich abgeschlossen", { width: c1, shade: COLOR_ZEILE }),
        docxCell(`in ${monateNoch} Monat(en) (${ende.toLocaleDateString("de-DE", { month: "long", year: "numeric" })})`, { width: c2, shade: COLOR_ZEILE }),
      ]}));
    }
    progressTbl = new D.Table({ width: { size: CONTENT_W, type: D.WidthType.DXA }, columnWidths: [c1, c2], rows });
  }

  const noteVal = v("anmerkung", "notes");
  let secNum = 1;
  const children = [
    new D.Paragraph({ children: [new D.TextRun({ text: "Schadenswiedergutmachung / Geldauflage", bold: true, size: 32, color: "1F3864" })], alignment: D.AlignmentType.CENTER, spacing: { after: 80 } }),
    new D.Paragraph({ children: [new D.TextRun({ text: "Nachweis und Zahlungsverlauf", italics: true, size: 22, color: "555555" })], alignment: D.AlignmentType.CENTER, spacing: { after: 240 } }),
  ];
  const personalT = infoTbl(personalPairs);
  if (personalT) { children.push(docxH1(`${secNum++}. Persönliche Angaben`), personalT); }
  const auflageT = infoTbl(auflagePairs);
  if (auflageT) { children.push(docxH1(`${secNum++}. Auflage / Verurteilung`), auflageT); }
  const empfT = infoTbl(empfPairs);
  if (empfT) { children.push(docxH1(`${secNum++}. Empfänger / Bankverbindung`), empfT); }
  children.push(new D.Paragraph({ children: [new D.PageBreak()] }));
  children.push(docxH1(`${secNum++}. Zahlungsverlauf`));
  if (zahlungTbl) children.push(zahlungTbl);
  else children.push(docxP("(noch keine Zahlungen erfasst)", { italics: true, color: "888888" }));
  if (progressTbl) { children.push(docxH1(`${secNum++}. Fortschritt / Restbetrag`), progressTbl); }
  if (!noteVal.skipped && noteVal.value) {
    children.push(docxH1(`${secNum++}. Anmerkungen`));
    noteVal.value.split("\n").forEach(l => children.push(docxP(l || " ")));
  }
  children.push(new D.Paragraph({ spacing: { before: 480 }, children: [new D.TextRun({ text: "" })] }));
  children.push(docxSignatureBlock(CONTENT_W, "schadens", { counterRoleLabel: "Empfangsbestätigung Geschädigte:r", probandLabel: "Bewährter / Bewährte" }));
  children.push(docxP("Belege (Überweisungsnachweise, Quittungen) sind diesem Nachweis beigefügt.", { size: 18, italics: true, color: "666666" }));

  const doc = new D.Document({
    creator: "Bewährungshilfe-Assistent",
    styles: { default: { document: { run: { font: "Arial", size: 20 } } } },
    sections: [{
      properties: { page: { size: { width: PAGE_W, height: PAGE_H }, margin: { top: MARGIN, right: MARGIN, bottom: MARGIN, left: MARGIN } } },
      children
    }]
  });
  return await D.Packer.toBlob(doc);
}

          c3 = Math.floor(totalW * 0.22), c4 = totalW - c1 - c2 - c3;
    const rows = [];
    for (let i=0; i<pairs.length; i+=2) {

        docxCell("", { width: c3 }), docxCell("", { width: c4 }),

    }
    return new D.Table({ width: { size: totalW, type: D.WidthType.DXA }, columnWidths: [c1,c2,c3,c4], rows });

  const personalPairs = [

    ["Gericht:", v("auflage","gericht").value, v("auflage","gericht").skipped],

    ["Frist (spätestens bis):", v("auflage","frist").value, v("auflage","frist").skipped],
    ["Art der Tätigkeit:", v("auflage","art").value, v("auflage","art").skipped],
  ];
  const einrPairs = [
    ["Name der Einrichtung:", v("einrichtung","name").value, v("einrichtung","name").skipped],
    ["Anschrift:", v("einrichtung","anschrift").value, v("einrichtung","anschrift").skipped],
    ["Ansprechperson:", v("einrichtung","ansprech").value, v("einrichtung","ansprech").skipped],
    ["Telefon:", v("einrichtung","tel").value, v("einrichtung","tel").skipped],
    ["E-Mail:", v("einrichtung","email").value, v("einrichtung","email").skipped],
    ["Tätigkeitsbereich:", v("einrichtung","taetigkeit").value, v("einrichtung","taetigkeit").skipped],
  ];

  // Stunden table
  const stRows = (getDocState().rows && getDocState().rows.stunden) || [];
  const filtered = stRows.filter(r => r.datum || r.von || r.stunden);
  let stundenSum = 0;
  const cols = [600, 1200, 900, 900, 900, 900, 2500, 2546]; // sums to 10446 < land content
  // Recalc to fit: use LAND_CONTENT_W
  const totalCol = LAND_CONTENT_W;
  const proportions = [0.05, 0.10, 0.07, 0.07, 0.06, 0.07, 0.27, 0.31];
  const widths = proportions.map(p => Math.floor(totalCol * p));
  // adjust last column to fill
  widths[widths.length - 1] = totalCol - widths.slice(0, -1).reduce((a,b)=>a+b,0);

  const head = ["Nr", "Datum", "von", "bis", "Pause (Min)", "Stunden netto", "Tätigkeit", "Bestätigt durch (Unterschrift / Stempel)"];

  filtered.forEach((r, i) => {
    const h = parseMoney(r.stunden || ""); stundenSum += h;
    const sh = i % 2 === 0 ? COLOR_ZEILE : null;
    trs.push(new D.TableRow({ children: [
      docxCell(String(i+1), { width: widths[0], shade: sh, size: 18, align: D.AlignmentType.CENTER }),

      docxCell(r.bis || " ", { width: widths[3], shade: sh, size: 18 }),
      docxCell(r.pause || " ", { width: widths[4], shade: sh, size: 18, align: D.AlignmentType.CENTER }),
      docxCell(r.stunden || " ", { width: widths[5], shade: sh, size: 18, align: D.AlignmentType.CENTER }),
      docxCell(r.taetigkeit || " ", { width: widths[6], shade: sh, size: 18 }),

        borders: docxBase().borders,
        width: { size: widths[7], type: D.WidthType.DXA },
        shading: sh ? { fill: sh, type: D.ShadingType.CLEAR } : undefined,
        margins: cellMargins,
        children: [docxP(" "), docxP(" ")]
      })
    ]}));
  });
  // Add empty rows for additional handwritten entries
  const targetEmpty = Math.max(15 - filtered.length, 5);
  for (let i = 0; i < targetEmpty; i++) {
    const num = filtered.length + i + 1;
    const sh = (filtered.length + i) % 2 === 0 ? COLOR_ZEILE : null;
    trs.push(new D.TableRow({ children: [
      docxCell(String(num), { width: widths[0], shade: sh, size: 18, align: D.AlignmentType.CENTER }),
      docxCell(" ", { width: widths[1], shade: sh, size: 18 }),
      docxCell(" ", { width: widths[2], shade: sh, size: 18 }),
      docxCell(" ", { width: widths[3], shade: sh, size: 18 }),
      docxCell(" ", { width: widths[4], shade: sh, size: 18 }),
      docxCell(" ", { width: widths[5], shade: sh, size: 18 }),
      docxCell(" ", { width: widths[6], shade: sh, size: 18 }),
      new D.TableCell({
        borders: docxBase().borders,
        width: { size: widths[7], type: D.WidthType.DXA },
        shading: sh ? { fill: sh, type: D.ShadingType.CLEAR } : undefined,
        margins: cellMargins,
        children: [docxP(" "), docxP(" ")]
